name: Tool Consistency Check

on:
  push:
    paths:
      - 'frontend/tools/**/*.html'
      - 'scripts/audit-tool-consistency.js'
  pull_request:
    paths:
      - 'frontend/tools/**/*.html'
      - 'scripts/audit-tool-consistency.js'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tool consistency audit
        id: audit
        run: |
          node scripts/audit-tool-consistency.js --json > audit-results.json 2>&1 || true
          ISSUES=$(node -e "const r = require('./audit-results.json'); console.log(r.totalIssues || 0)")
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          echo "## Tool Consistency Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total issues: **$ISSUES**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Show compliant tools
          node -e "
            const r = require('./audit-results.json');
            if (r.fullyCompliant && r.fullyCompliant.length) {
              console.log('### Fully Compliant');
              r.fullyCompliant.forEach(t => console.log('- ✅ ' + t));
            }
          " >> $GITHUB_STEP_SUMMARY
          # Show failures
          node -e "
            const r = require('./audit-results.json');
            const tools = r.tools || {};
            let hasFailures = false;
            for (const [name, checks] of Object.entries(tools)) {
              const fails = Object.entries(checks).filter(([k,v]) => v === false);
              if (fails.length > 0) {
                if (!hasFailures) { console.log('### Issues Found'); hasFailures = true; }
                console.log('- **' + name + '**: ' + fails.map(f => f[0]).join(', '));
              }
            }
          " >> $GITHUB_STEP_SUMMARY

      - name: Check regression threshold
        run: |
          ISSUES=${{ steps.audit.outputs.issues }}
          # Baseline: 89 issues (as of 2026-03-04 after auto-fixer)
          # Fail if issues increase above baseline + 5 tolerance
          THRESHOLD=94
          if [ "$ISSUES" -gt "$THRESHOLD" ]; then
            echo "❌ Tool consistency regression: $ISSUES issues (threshold: $THRESHOLD)"
            echo "Run 'node scripts/audit-tool-consistency.js' locally to see details."
            exit 1
          fi
          echo "✅ Tool consistency check passed: $ISSUES issues (threshold: $THRESHOLD)"
