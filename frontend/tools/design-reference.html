<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Reference | Fast Track Program</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @font-face { font-family: 'Plaak';    src: url('module-6-org-structure/Plaak3Trial-43-Bold.woff2') format('woff2'); font-weight: bold; }
    @font-face { font-family: 'Riforma';  src: url('module-6-org-structure/RiformaLL-Regular.woff2')   format('woff2'); font-weight: normal; }
    @font-face { font-family: 'Monument'; src: url('module-6-org-structure/MonumentGrotesk-Mono.woff2') format('woff2'); }

    :root {
      --yellow: #FFF469;
      --red: #DC2626;
      --green: #4ade80;
      --sidebar-bg: #0a0a0a;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Riforma', -apple-system, sans-serif; font-size: 16px; color: #000; background: #000; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    .plaak   { font-family: 'Plaak', sans-serif; font-weight: bold; letter-spacing: -0.02em; line-height: 1.1; }
    .monument { font-family: 'Monument', monospace; letter-spacing: 0.05em; }

    .tool-frame { background: #fff; min-height: 100vh; }
    .tool-inner { background: #fff; min-height: 100vh; }

    .wizard-layout  { display: flex; min-height: 100vh; }
    .wizard-main    { flex: 1; display: flex; flex-direction: column; min-height: 100vh; background: #fff; padding: 0 56px; transition: background 0.6s var(--ease-out-expo); }
    .wizard-sidebar { width: 300px; background: var(--sidebar-bg); min-height: 100vh; padding: 48px 16px; display: flex; flex-direction: column; position: sticky; top: 0; align-self: flex-start; height: 100vh; overflow-y: auto; }

    .step-content   { max-width: 100%; padding: 48px 0 120px; flex: 1; }
    .step-indicator { display: none; }
    .opening-box    { margin-bottom: 32px; }
    .opening-box .step-heading { font-family: 'Plaak', sans-serif; font-size: 36px; color: #000; margin-bottom: 4px; letter-spacing: -0.02em; }
    .opening-box .step-hint    { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 8px; }

    .field-group    { margin-bottom: 32px; }
    .field-group:last-child { margin-bottom: 0; }
    .field-label    { font-weight: 600; font-size: 15px; color: #000; margin-bottom: 4px; display: block; letter-spacing: -0.01em; }
    .field-sub      { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.5; }
    .field-input    { border: 2px solid #E8E8E8; padding: 14px 18px; font-family: 'Riforma', sans-serif; font-size: 16px; width: 100%; color: #000; background: #fff; transition: all 0.3s var(--ease-out-expo); border-radius: 0; }
    .field-input:focus { outline: none; border-color: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .field-input:hover:not(:focus) { border-color: #ccc; }
    .field-textarea { border: 2px solid #E8E8E8; padding: 14px 18px; font-family: 'Riforma', sans-serif; font-size: 16px; width: 100%; min-height: 110px; resize: none !important; color: #000; background: #fff; transition: all 0.3s var(--ease-out-expo); border-radius: 0; }
    .field-textarea:focus { outline: none; border-color: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .field-textarea:hover:not(:focus) { border-color: #ccc; }
    .field-help     { font-size: 11px; color: #aaa; margin-top: -32px; margin-right: 14px; font-family: 'Monument', monospace; letter-spacing: 0.04em; text-align: right; position: relative; z-index: 1; pointer-events: none; }

    .field-split    { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }

    .wizard-footer  { display: flex; justify-content: stretch; align-items: stretch; padding: 0; border-top: none; background: #000; transition: all 0.6s var(--ease-out-expo); margin: 0 -56px; }
    .btn-wiz-back   { background: #000; border: none; border-right: 1px solid #fff; color: #fff; padding: 22px 32px; font-family: 'Riforma', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; cursor: pointer; transition: all 0.3s var(--ease-out-expo); flex: 1; text-align: center; width: 50%; }
    .btn-wiz-back:hover { background: var(--yellow); color: #000; }
    .btn-wiz-next   { background: #000; color: #fff; border: none; padding: 22px 32px; font-family: 'Riforma', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; cursor: pointer; transition: all 0.3s var(--ease-out-expo); position: relative; overflow: hidden; flex: 1; text-align: center; width: 50%; }
    .btn-wiz-next:hover:not(:disabled) { background: var(--yellow); color: #000; }
    .btn-wiz-next:disabled { background: #333; color: #666; cursor: not-allowed; }

    .sidebar-tool-num   { font-family: 'Monument', monospace; font-size: 10px; color: #555; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
    .sidebar-tool-title { font-family: 'Plaak', sans-serif; font-size: 36px; color: #fff; margin-bottom: 0; line-height: 1.05; letter-spacing: -0.02em; }
    .sidebar-step       { padding: 16px 16px; margin: 0 -16px; display: flex; align-items: center; gap: 14px; transition: all 0.3s var(--ease-out-expo); background: #000; border: 1px solid #333; border-bottom: none; cursor: default; } .sidebar-step:last-of-type { border-bottom: 1px solid #333; }
    .sidebar-step:hover { background: #fff; border-color: #fff; } .sidebar-step:hover .sidebar-step-label { color: #000; } .sidebar-step:hover .sidebar-step-dot { background: #000; }
    .sidebar-step-dot   { display: none; }
    .sidebar-step-dot.active { background: #000; box-shadow: none; }
    .sidebar-step-dot.done   { background: #000; }
    .sidebar-step-label { font-family: 'Riforma', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.01em; color: #fff; text-transform: uppercase; transition: all 0.3s ease; }
    .sidebar-step-label.active { color: #000; }
    .sidebar-step-label.done   { color: #fff; }

    /* Animations */
    .animate-in { animation: fadeSlideIn 0.6s var(--ease-out-expo) both; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .animate-fade { animation: fadeIn 0.8s var(--ease-out-expo) both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .animate-scale { animation: scaleIn 0.6s var(--ease-out-expo) both; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .animate-reveal { animation: revealUp 0.8s var(--ease-out-expo) both; }
    @keyframes revealUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    .canvas-split          { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .canvas-split > *      { min-width: 0; }

    .checklist-item { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid #F0F0F0; }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item-text { font-size: 15px; line-height: 1.5; flex: 1; }
    .checklist-toggle { display: flex; gap: 4px; flex-shrink: 0; }
    .checklist-btn { padding: 8px 18px; border: 2px solid #E0E0E0; background: #fff; font-family: 'Monument', monospace; font-size: 10px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.25s var(--ease-out-expo); }
    .checklist-btn:hover { border-color: #000; }
    .checklist-btn.selected-yes { background: #000; color: var(--yellow); border-color: #000; }
    .checklist-btn.selected-no  { background: var(--red); color: #fff; border-color: var(--red); }


    /* Custom range slider */
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 3px; background: #E0E0E0; outline: none; border-radius: 2px; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #000; border-radius: 50%; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.1); }

    /* Noise texture overlay */
    .noise-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }

    @media (max-width: 1200px) {
        .wizard-sidebar { width: 240px; padding: 36px 24px; }
        .wizard-main { padding: 0 36px; }
        .wizard-footer { margin: 0 -36px; }
        .step-content { padding: 36px 0 20px; }
        .opening-box .step-heading { font-size: 30px; }
    }

    @media (max-width: 768px) {
        .wizard-sidebar { display: none; }
        .wizard-main { padding: 0 24px; }
        .wizard-footer { padding: 0; margin: 0 -24px; }
        .field-split { grid-template-columns: 1fr; }
        .canvas-split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="noise-overlay"></div>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const CONFIG = {
        TOOL_SLUG: 'design-reference',
        TOOL_TITLE: 'DESIGN REFERENCE',
        TOOL_NUM: 'REF',
        TOTAL_STEPS: 4,
        COVER_IMAGE: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80',
        TRANSITION_CONTENT: {
            1: {
                completedTitle: 'Strategic Foundation Completed',
                nextTitle: 'MARKET CALCULATOR',
                nextDesc: 'Now that your vision is clear, it\'s time to put numbers behind it. You\'ll quantify your total addressable market and model growth scenarios.',
                brutalTruth: '"If you cannot quantify your market, you are guessing. And guessing is not a strategy — it is a hobby."',
                peerProof: '"We assumed our market was €50M. When we actually calculated it, it was €12M. That single number changed our entire go-to-market approach." — CEO, B2B SaaS, 28 employees',
            },
            2: {
                completedTitle: 'Market Calculator Completed',
                nextTitle: 'PRIORITY MATRIX',
                nextDesc: 'You have the numbers. Now decide what to focus on. You\'ll score initiatives by impact and ease to find your top 3 priorities.',
                brutalTruth: '"Prioritisation is not choosing what to do — it is choosing what to stop doing. If everything is important, nothing is."',
                peerProof: '"We had 23 initiatives running in parallel. After this exercise we cut to 5. Revenue grew 34% in the next quarter — not because we added anything, but because we finally focused." — COO, e-commerce, 85 employees',
            },
            3: {
                completedTitle: 'Priority Matrix Completed',
                nextTitle: 'SPRINT CHECKLIST',
                nextDesc: 'Priorities are ranked. Before you finish, confirm your team has genuinely completed each readiness checkpoint.',
                brutalTruth: '"A checklist without honesty is theatre. If you say yes to something your team has not genuinely completed, you are lying to yourself."',
                peerProof: '"The checklist was humbling. We answered NO to two items and it forced a conversation we had been avoiding for months. Best decision we made." — Founder, logistics startup',
            },
            4: {
                completedTitle: 'Sprint Checklist Completed',
                nextTitle: 'YOUR CANVAS',
                nextDesc: 'Everything is captured. Review your complete strategic output, download as PDF, and submit for your guru\'s review.',
                brutalTruth: '"The canvas is not a summary — it is a commitment. If you cannot stand behind every word on it, go back and fix it."',
                peerProof: '"Seeing all our answers in one place was the moment it clicked. The canvas became our team\'s north star for the quarter." — COO, fintech startup, 52 employees',
            },
        },
    };

    const SIDEBAR_STEPS = [
        { num: 1, label: 'Strategic Foundation', mins: 5 },
        { num: 2, label: 'Market Calculator', mins: 8 },
        { num: 3, label: 'Priority Matrix', mins: 10 },
        { num: 4, label: 'Sprint Checklist', mins: 3 },
    ];

    const fmt = (v) => {
        if (!v && v !== 0) return '—';
        return '€ ' + Math.round(v).toLocaleString('en-US');
    };
    const fmtPct = (v) => {
        if (v === null || v === undefined) return '—';
        return v.toFixed(1) + '%';
    };

    function makeDefaultData() {
        return {
            visionStatement: '',
            currentChallenges: '',
            targetOutcome: '',
            totalCustomers: '',
            avgRevenue: '',
            purchasesPerYear: '',
            grossMargin: '',
            priceIncrease: 0,
            volumeGrowth: 0,
            costReduction: 0,
            priorities: [
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
            ],
            checklist: { q1: null, q2: null, q3: null, q4: null },
        };
    }

    function priorityScore(p) {
        if (!p.impact || !p.ease) return 0;
        return (p.impact * 2) + p.ease;
    }

    // ── Animated Number ──────────────────────────────────────────────────
    function AnimNum({ value, prefix = '', suffix = '', duration = 600 }) {
        const [display, setDisplay] = useState(0);
        const ref = useRef(null);
        useEffect(() => {
            const start = display;
            const end = value;
            if (start === end) return;
            const startTime = performance.now();
            const tick = (now) => {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 4);
                setDisplay(Math.round(start + (end - start) * eased));
                if (progress < 1) ref.current = requestAnimationFrame(tick);
            };
            ref.current = requestAnimationFrame(tick);
            return () => cancelAnimationFrame(ref.current);
        }, [value]);
        return prefix + display.toLocaleString('en-US') + suffix;
    }

    // ── Sidebar ─────────────────────────────────────────────────────────────
    function WizardSidebar({ currentStep, data }) {
        const stepNum = typeof currentStep === 'number' ? currentStep : CONFIG.TOTAL_STEPS + 1;
        const pct = currentStep === 'canvas' ? 100 : Math.round((Math.min(stepNum, CONFIG.TOTAL_STEPS) / CONFIG.TOTAL_STEPS) * 100);
        return (
            <div className="wizard-sidebar">
                <div style={{ marginBottom: 24 }}>
                    <div className="sidebar-tool-title" style={{ marginBottom: 12 }}>{CONFIG.TOOL_TITLE}</div>
                    <p style={{ fontFamily: "Riforma, sans-serif", fontSize: 12, color: "#fff", opacity: 0.8, lineHeight: 1.5 }}>Build your strategic plan in 4 focused steps.</p>
                </div>
                {SIDEBAR_STEPS.map(s => {
                    const isActive = stepNum === s.num;
                    const isDone = stepNum > s.num || currentStep === 'canvas';
                    return (
                        <div className="sidebar-step" key={s.num} style={{ borderBottom: '1px solid rgba(255,255,255,0.1)', ...(isActive ? { background: 'var(--yellow)', borderColor: 'var(--yellow)' } : isDone ? {} : {}) }}>
                            <div className={`sidebar-step-dot ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`} />
                            <div style={{ flex: 1 }}>
                                <span className={`sidebar-step-label ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`}>{s.label}</span>
                            </div>
                            <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: isActive ? "rgba(0,0,0,0.4)" : "rgba(255,255,255,0.8)", letterSpacing: "0.05em", flexShrink: 0 }}>{"["}{s.mins}{" min]"}</span>
                        </div>
                    );
                })}
                </div>
        );
    }

    function SegmentedProgress({ currentStep, totalSteps }) {
        const stepNum = typeof currentStep === 'number' ? currentStep : totalSteps + 1;
        const currentLabel = SIDEBAR_STEPS.find(s => s.num === stepNum);
        return (
            <div style={{ margin: '0 -56px', padding: '16px 56px 12px' }}>
                <div style={{ display: 'flex', gap: 2, marginBottom: 8 }}>
                    {Array.from({ length: totalSteps }, (_, i) => (
                        <div key={i} style={{
                            flex: 1, height: 8,
                            background: i + 1 <= stepNum ? '#000' : '#e0e0e0',
                            transition: 'background 0.4s var(--ease-out-expo)',
                        }} />
                    ))}
                </div>
                {currentLabel && (
                    <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.1em', color: '#999', textTransform: 'uppercase' }}>
                        {currentLabel.label}
                    </span>
                )}
            </div>
        );
    }

    // ── TransitionScreen ─────────────────────────────────────────────────
    function TransitionScreen({ stepNum, totalSteps, onNext }) {
        const t = CONFIG.TRANSITION_CONTENT[stepNum];
        if (!t) { onNext(); return null; }
        const [visible, setVisible] = useState(false);
        useEffect(() => { setTimeout(() => setVisible(true), 50); }, []);

        return (
            <div style={{ position: 'fixed', inset: 0, background: '#000', color: '#fff',
                          zIndex: 200, overflowY: 'auto', display: 'flex', alignItems: 'center',
                          justifyContent: 'center', padding: '64px 32px' }}>
                <div style={{ maxWidth: 680, width: '100%', opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(30px)', transition: 'all 0.8s var(--ease-out-expo)' }}>
                    

                    {/* Completed */}
                    <div className="plaak" style={{ fontSize: 56, color: '#fff', marginBottom: 48, lineHeight: 1.1, opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(10px)', transition: 'all 0.6s var(--ease-out-expo) 0.2s' }}>{t.completedTitle}</div>

                    {/* Next section */}
                    <p style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#fff', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 16, opacity: visible ? 1 : 0, transition: 'opacity 0.6s ease 0.3s' }}>[NEXT UP]</p>
                    <h2 style={{ fontFamily: "'Riforma', sans-serif", fontWeight: 700, fontSize: 32, marginBottom: 20, opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(20px)', transition: 'all 0.8s var(--ease-out-expo) 0.35s' }}>{t.nextTitle}</h2>
                    <p style={{ fontSize: 17, color: '#bbb', lineHeight: 1.8, marginBottom: 48, opacity: visible ? 1 : 0, transition: 'opacity 0.6s ease 0.5s' }}>{t.nextDesc}</p>

                    {/* Brutal truth */}
                    <div style={{ display: 'flex', gap: 20, marginBottom: 36, opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateX(-10px)', transition: 'all 0.6s var(--ease-out-expo) 0.6s' }}>
                        <div style={{ width: 32, height: 32, flexShrink: 0, marginTop: 2 }}>
                            <img src="ft-logo.ico" alt="FT" style={{ width: 32, height: 32, filter: 'invert(1) brightness(2)' }} />
                        </div>
                        <div>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#fff', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 12 }}>[BRUTAL TRUTH]</div>
                            <p style={{ fontSize: 17, lineHeight: 1.6 }}>{t.brutalTruth}</p>
                        </div>
                    </div>

                    {/* Peer proof */}
                    <div style={{ borderLeft: '3px solid #fff', paddingLeft: 28, marginBottom: 56, opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateX(-10px)', transition: 'all 0.6s var(--ease-out-expo) 0.75s' }}>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#fff', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 12 }}>[PEER PROOF]</div>
                        <p style={{ fontSize: 16, color: '#bbb', lineHeight: 1.8, fontStyle: 'italic' }}>{t.peerProof}</p>
                    </div>

                    {/* Mini journey map */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 36, opacity: visible ? 1 : 0, transition: 'all 0.6s var(--ease-out-expo) 0.8s' }}>
                        {SIDEBAR_STEPS.map((s, i) => {
                            const state = s.num <= stepNum ? 'done' : s.num === stepNum + 1 ? 'current' : 'upcoming';
                            return (
                                <React.Fragment key={s.num}>
                                    {i > 0 && <div style={{ width: 24, height: 2, background: state === 'upcoming' ? '#333' : '#fff', flexShrink: 0, transition: 'background 0.4s ease' }} />}
                                    <div style={{
                                        padding: '12px 16px', border: state === 'current' ? '2px solid var(--yellow)' : state === 'done' ? '2px solid #fff' : '2px solid #333',
                                        background: state === 'current' ? 'var(--yellow)' : 'transparent',
                                        color: state === 'current' ? '#000' : state === 'done' ? '#fff' : '#555',
                                        flex: 1, transition: 'all 0.4s var(--ease-out-expo)',
                                    }}>
                                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, letterSpacing: '0.1em', opacity: 0.5, marginBottom: 4 }}>0{s.num}</div>
                                        <div style={{ fontFamily: "'Riforma', sans-serif", fontSize: 11, fontWeight: 600 }}>{s.label}</div>
                                    </div>
                                </React.Fragment>
                            );
                        })}
                    </div>

                    <button onClick={onNext} className="plaak"
                        style={{ background: 'var(--yellow)', color: '#000', border: 'none', padding: '20px 56px', fontSize: 18, cursor: 'pointer', letterSpacing: '0.03em', transition: 'all 0.3s var(--ease-out-expo)', opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(10px)' }}
                        onMouseOver={e => { e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = '0 8px 32px rgba(255,244,105,0.3)'; }}
                        onMouseOut={e => { e.target.style.transform = 'none'; e.target.style.boxShadow = 'none'; }}>
                        CONTINUE &rarr;
                    </button>
                </div>
            </div>
        );
    }

    // ── JourneyMap ─────────────────────────────────────────────────────
    function JourneyMap({ currentStep, onBegin }) {
        const [loaded, setLoaded] = useState(false);
        useEffect(() => { setTimeout(() => setLoaded(true), 100); }, []);

        const sections = [
            { num: 1, title: 'Strategic Foundation', desc: 'Vision, challenges & target outcome' },
            { num: 2, title: 'Market Calculator', desc: 'Market sizing & growth scenarios' },
            { num: 3, title: 'Priority Matrix', desc: 'Score & rank your initiatives' },
            { num: 4, title: 'Sprint Checklist', desc: 'Readiness confirmation' },
        ];

        const getState = (num) => {
            if (typeof currentStep === 'number' && currentStep >= 1) {
                if (num < currentStep) return 'done';

    // ── NumField + Lever — stable components ──────────────────────────────
    function NumField({ label, hint, field, prefix, suffix, max, value, onChange }) {
        return (
            <div className="field-group">
                <label className="field-label">{label}</label>
                {hint && <p className="field-sub">{hint}</p>}
                <div style={{ position: 'relative' }}>
                    {prefix && <span style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', color: '#aaa', fontSize: 15, pointerEvents: 'none' }}>{prefix}</span>}
                    <input type="number" className="field-input"
                        style={{ paddingLeft: prefix ? 34 : 18, paddingRight: suffix ? 38 : 18 }}
                        value={value}
                        onChange={e => onChange(field, e.target.value)}
                        placeholder="0"
                        min="0"
                        max={max}
                    />
                    {suffix && <span style={{ position: 'absolute', right: 16, top: '50%', transform: 'translateY(-50%)', color: '#aaa', fontSize: 15, pointerEvents: 'none' }}>{suffix}</span>}
                </div>
            </div>
        );
    }

    function Lever({ label, field, unit, min, max, step, value, onChange, compact }) {
        if (compact) {
            return (
                <div style={{ padding: '16px 36px', borderRight: '1px solid #f0f0f0' }}>
                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#999', letterSpacing: '0.12em', marginBottom: 8 }}>{label.toUpperCase()}</div>
                    <span className="plaak" style={{ fontSize: 28, color: value > 0 ? '#000' : '#ccc', lineHeight: 1 }}>
                        {value > 0 ? '+' : ''}{value}{unit}
                    </span>
                    <input type="range" min={min} max={max} step={step} value={value}
                        onChange={e => onChange(field, parseFloat(e.target.value))}
                        style={{ width: '100%', marginTop: 10 }}
                    />
                </div>
            );
        }
        return (
            <div style={{ marginBottom: 24 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                    <span style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.01em' }}>{label}</span>
                    <span className="plaak" style={{ fontSize: 40, color: value > 0 ? '#000' : '#ccc', lineHeight: 1 }}>
                        {value > 0 ? '+' : ''}{value}{unit}
                    </span>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                    onChange={e => onChange(field, parseFloat(e.target.value))}
                    style={{ width: '100%' }}
                />
            </div>
        );
    }

    function RatingBtn({ label, value, selected, color, onClick }) {
        return (
            <button onClick={onClick} style={{
                padding: '7px 16px',
                border: `2px solid ${selected ? color : '#E8E8E8'}`,
                background: selected ? color : '#fff',
                color: selected ? (color === 'var(--yellow)' || color === '#FFF469' ? '#000' : '#fff') : '#aaa',
                fontFamily: "'Monument', monospace",
                fontSize: 10,
                letterSpacing: '0.06em',
                cursor: 'pointer',
                transition: 'all 0.2s var(--ease-out-expo)',
                textTransform: 'uppercase',
                whiteSpace: 'nowrap',
            }}
            onMouseOver={e => { if (!selected) e.target.style.borderColor = color; }}
            onMouseOut={e => { if (!selected) e.target.style.borderColor = '#E8E8E8'; }}
            >{label}</button>
        );
    }

    // ── STEP 1 ────────────────────────────────────────────────────────────
    function Step1({ data, updateData }) {
        const visionDone = (data.visionStatement || '').trim().length >= 20;
        const challengesDone = (data.currentChallenges || '').trim().length >= 20;
        return (
            <div className="step-content animate-in">
                <p className="step-indicator">STEP 1 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Strategic Foundation</h1>
                    <p className="step-hint">Define your strategic direction. Once you fill in the box below, the next questions (Current Challenges, Target Outcome) will appear automatically.</p>
                </div>

                <div className="field-group">
                    <label className="field-label">Vision Statement</label>
                    <p className="field-sub">Describe your company's long-term vision in 2-3 sentences. Be specific and ambitious.</p>
                    <textarea className="field-textarea" style={{ minHeight: 130 }}
                        value={data.visionStatement}
                        onChange={e => updateData('visionStatement', e.target.value)}
                        placeholder="e.g. We will become the leading provider of sustainable packaging solutions in Europe by 2028, serving 500+ enterprise clients."
                        maxLength={600}
                    />
                    <p className="field-help">{(data.visionStatement || '').length}/600</p>
                </div>

                {visionDone && (
                    <div className="field-split animate-in" style={{ marginTop: 36 }}>
                        <div className="field-group">

                            <textarea className="field-textarea"
                                value={data.currentChallenges}
                                onChange={e => updateData('currentChallenges', e.target.value)}
                                placeholder="e.g. Slow decision-making, unclear priorities across departments..."
                                maxLength={400}
                            />
                            <p className="field-help">{(data.currentChallenges || '').length}/400</p>
                        </div>
                        <div className="field-group">
                            <label className="field-label">Target Outcome</label>

                            <textarea className="field-textarea"
                                value={data.targetOutcome}
                                onChange={e => updateData('targetOutcome', e.target.value)}
                                placeholder="e.g. Clear strategic priorities communicated to all teams, 3 key initiatives launched..."
                                maxLength={400}

                            <p className="field-help">{(data.targetOutcome || '').length}/400</p>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 2 ────────────────────────────────────────────────────────────
    function Step2({ data, updateData, subStep, setSubStep }) {
        const customers = parseFloat(data.totalCustomers) || 0;
        const avgRev = parseFloat(data.avgRevenue) || 0;
        const purchases = parseFloat(data.purchasesPerYear) || 0;
        const margin = parseFloat(data.grossMargin) || 0;
        const marketSize = customers * avgRev * purchases;
        const profitPool = marketSize * (margin / 100);
        const hasCalc = customers > 0 && avgRev > 0 && purchases > 0 && margin > 0;

        const priceImpact = marketSize * (data.priceIncrease / 100);
        const volumeImpact = marketSize * (data.volumeGrowth / 100);
        const costSavings = (marketSize - profitPool) * (data.costReduction / 100);
        const newRevenue = marketSize + priceImpact + volumeImpact;
        const newProfit = profitPool + priceImpact + volumeImpact + costSavings;

        if (subStep === 1) {
            return (
                <div className="step-content animate-in" key="growth">
                    <p className="step-indicator">STEP 2 OF {CONFIG.TOTAL_STEPS} — GROWTH SCENARIO</p>
                    <div className="opening-box">
                        <h1 className="step-heading">Growth Scenario</h1>
                        <p className="step-hint">Use the sliders to model what-if scenarios. See how price, volume, and cost changes impact your revenue and profit.</p>
                    </div>

                    {/* Scenario impact — always visible, updates live */}
                    <div style={{ border: '2px solid #000', marginBottom: 32 }}>
                        <div style={{ background: '#000', color: '#fff', padding: '20px 36px' }}>
                            <span style={{ fontFamily: "'Monument', monospace", fontSize: 13, letterSpacing: '0.12em' }}>SCENARIO IMPACT</span>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 0 }}>
                            {[
                                { label: 'CURRENT', val: fmt(marketSize) },
                                { label: 'NEW REVENUE', val: fmt(newRevenue) },
                                { label: 'CHANGE', val: '+ ' + fmt(newRevenue - marketSize), pct: marketSize > 0 && (newRevenue - marketSize) > 0 ? '+ ' + ((newRevenue - marketSize) / marketSize * 100).toFixed(1) + '%' : '', color: '#16a34a' },
                            ].map((item, i) => (
                                <div key={i} style={{ padding: '24px 36px', borderRight: i < 2 ? '1px solid #f0f0f0' : 'none' }}>
                                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#999', letterSpacing: '0.12em', marginBottom: 10 }}>{item.label}</div>
                                    <p className="plaak" style={{ fontSize: 36, color: item.color || '#000' }}>{item.val}</p>
                                    {item.pct ? <p className="plaak" style={{ fontSize: 36, color: item.color, marginTop: 4 }}>{item.pct}</p> : <p style={{ height: 40 }} />}
                                </div>
                            ))}
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 0, borderTop: '1px solid #f0f0f0' }}>
                            {[
                                { label: 'CURRENT PROFIT', val: fmt(profitPool) },
                                { label: 'NEW PROFIT', val: fmt(newProfit) },
                                { label: 'ADDITIONAL', val: '+ ' + fmt(newProfit - profitPool), pct: profitPool > 0 && (newProfit - profitPool) > 0 ? '+ ' + ((newProfit - profitPool) / profitPool * 100).toFixed(1) + '%' : '', color: '#16a34a' },
                            ].map((item, i) => (
                                <div key={i} style={{ padding: '24px 36px', borderRight: i < 2 ? '1px solid #f0f0f0' : 'none' }}>
                                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#999', letterSpacing: '0.12em', marginBottom: 10 }}>{item.label}</div>
                                    <p className="plaak" style={{ fontSize: 36, color: item.color || '#000' }}>{item.val}</p>
                                    {item.pct ? <p className="plaak" style={{ fontSize: 36, color: item.color, marginTop: 4 }}>{item.pct}</p> : <p style={{ height: 40 }} />}
                                </div>
                            ))}
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 0, borderTop: '2px solid #000' }}>
                            <Lever label="Price Increase" field="priceIncrease" unit="%" min={0} max={20} step={0.5} value={data.priceIncrease} onChange={updateData} compact />
                            <Lever label="Volume Growth" field="volumeGrowth" unit="%" min={0} max={50} step={1} value={data.volumeGrowth} onChange={updateData} compact />
                            <Lever label="Cost Reduction" field="costReduction" unit="%" min={0} max={30} step={0.5} value={data.costReduction} onChange={updateData} compact />
                        </div>
                    </div>
                </div>
            );
        }

        return (
            <div className="step-content animate-in" key="inputs">
                <p className="step-indicator">STEP 2 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Market Calculator</h1>
                    <p className="step-hint">Enter your core market data. The tool calculates your total market size in real time.</p>
                </div>

                <div className="field-split">
                    <NumField label="Total Customers" hint="Total addressable customers in your market" field="totalCustomers" value={data.totalCustomers} onChange={updateData} />
                    <NumField label="Avg Revenue per Customer" hint="Annual revenue per customer" field="avgRevenue" prefix="€" value={data.avgRevenue} onChange={updateData} />
                </div>
                <div className="field-split">
                    <NumField label="Purchases per Year" hint="Average transactions per customer annually" field="purchasesPerYear" value={data.purchasesPerYear} onChange={updateData} />
                    <NumField label="Gross Margin" hint="Your gross profit margin" field="grossMargin" suffix="%" max="100" value={data.grossMargin} onChange={updateData} />
                </div>

                {hasCalc && (
                    <div className="animate-scale" style={{ background: '#000', color: '#fff', padding: '44px 40px', marginBottom: 32 }}>
                        <div style={{ display: 'flex', gap: 48 }}>
                            <div style={{ flex: 1 }}>
                                <p style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: 'var(--yellow)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 14 }}>[ TOTAL MARKET SIZE ]</p>
                                <p className="plaak" style={{ fontSize: 52, color: '#fff', lineHeight: 1, marginBottom: 18 }}>{fmt(marketSize)}</p>
                                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, flexWrap: 'wrap' }}>
                                    <span className="plaak" style={{ fontSize: 22, color: '#fff' }}>{customers.toLocaleString()}</span>
                                    <span style={{ fontSize: 11, color: '#666' }}>customers</span>
                                    <span className="plaak" style={{ fontSize: 22, color: 'var(--yellow)' }}>&times;</span>
                                    <span className="plaak" style={{ fontSize: 22, color: '#fff' }}>{fmt(avgRev)}</span>
                                    <span style={{ fontSize: 11, color: '#666' }}>avg</span>
                                    <span className="plaak" style={{ fontSize: 22, color: 'var(--yellow)' }}>&times;</span>
                                    <span className="plaak" style={{ fontSize: 22, color: '#fff' }}>{purchases}</span>
                                    <span style={{ fontSize: 11, color: '#666' }}>purchases/yr</span>
                                </div>
                            </div>
                            <div style={{ width: 1, background: '#222', flexShrink: 0 }} />
                            <div style={{ flex: 1 }}>
                                <p style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: 'var(--yellow)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 14 }}>[ PROFIT POOL ]</p>
                                <p className="plaak" style={{ fontSize: 52, color: 'var(--yellow)', lineHeight: 1, marginBottom: 18 }}>{fmt(profitPool)}</p>
                                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, flexWrap: 'wrap' }}>
                                    <span className="plaak" style={{ fontSize: 22, color: 'var(--yellow)' }}>{fmt(marketSize)}</span>
                                    <span style={{ fontSize: 11, color: '#666' }}>market size</span>
                                    <span className="plaak" style={{ fontSize: 22, color: 'var(--yellow)' }}>&times;</span>
                                    <span className="plaak" style={{ fontSize: 22, color: 'var(--yellow)' }}>{fmtPct(margin)}</span>
                                    <span style={{ fontSize: 11, color: '#666' }}>margin</span>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 3 ────────────────────────────────────────────────────────────
    function Step3({ data, updateData }) {
        const priorities = data.priorities;
        const filled = priorities.filter(p => (p.name || '').trim()).length;
        const allScored = priorities.filter(p => (p.name || '').trim() && p.impact > 0 && p.ease > 0).length;
        const allFilled = filled >= 5;

        const updatePriority = (idx, field, val) => {
            const next = priorities.map((p, i) => i === idx ? { ...p, [field]: val } : p);
            updateData('priorities', next);
        };
        const addRow = () => {
            if (priorities.length < 10) updateData('priorities', [...priorities, { name: '', impact: 0, ease: 0 }]);
        };
        const removeRow = (idx) => {
            if (priorities.length <= 3) return;
            updateData('priorities', priorities.filter((_, i) => i !== idx));
        };

        const IMPACT_OPTS = [
            { label: 'Low',  val: 1, color: '#DC2626' },
            { label: 'Med',  val: 2, color: '#f59e0b' },
            { label: 'High', val: 3, color: '#22c55e' },
        ];
        const EASE_OPTS = [
            { label: 'Hard', val: 1, color: '#DC2626' },
            { label: 'Med',  val: 2, color: '#f59e0b' },
            { label: 'Easy', val: 3, color: '#22c55e' },
        ];

        const scored = priorities
            .map((p, i) => ({ ...p, idx: i, score: priorityScore(p) }))
            .filter(p => (p.name || '').trim())
            .sort((a, b) => b.score - a.score);

        return (
            <div className="step-content animate-in">
                <p className="step-indicator">STEP 3 OF {CONFIG.TOTAL_STEPS}</p>

                <div className="opening-box">
                    <h1 className="step-heading">Priority Matrix</h1>
                    <p className="step-hint">List your initiatives, then rate each by impact and ease. Score = (Impact &times; 2) + Ease. Max: 9.</p>
                </div>

                {/* Priority table — impact/ease columns hidden until all 5 filled */}
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                    <thead>
                        <tr style={{ borderBottom: '2px solid #000' }}>
                            <th style={{ textAlign: 'left', padding: '10px 0', fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.08em', color: '#999', width: 40 }}>#</th>
                            <th style={{ textAlign: 'left', padding: '10px 0', fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.08em', color: '#999' }}>INITIATIVE</th>
                            {allFilled && <th style={{ textAlign: 'center', padding: '10px 16px', fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.08em', color: '#999', width: 180, borderLeft: '1px solid #000' }}>IMPACT</th>}
                            {allFilled && <th style={{ textAlign: 'center', padding: '10px 16px', fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.08em', color: '#999', width: 180, borderLeft: '1px solid #000' }}>EASE</th>}
                            {allFilled && <th style={{ textAlign: 'center', padding: '10px 16px', fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.08em', color: '#999', width: 80, borderLeft: '1px solid #000' }}>SCORE</th>}
                            <th style={{ width: 30 }}></th>
                        </tr>
                    </thead>
                    <tbody>
                        {priorities.map((p, idx) => {
                            const score = priorityScore(p);
                            const isTop3 = (p.name || '').trim() && scored.findIndex(s => s.idx === idx) < 3 && score > 0;
                            return (
                                <tr key={idx} style={{ borderBottom: '1px solid #f0f0f0', background: isTop3 ? '#FFFDE7' : 'transparent', transition: 'background 0.3s ease' }}>
                                    <td style={{ padding: '14px 0', verticalAlign: 'middle' }}>
                                        <span className="plaak" style={{ fontSize: 18, color: '#000' }}>{String(idx+1).padStart(2,'0')}</span>
                                    </td>
                                    <td style={{ padding: '10px 8px 10px 0', verticalAlign: 'middle' }}>
                                        <input type="text" className="field-input" style={{ padding: '10px 16px', fontSize: 15, width: '100%', border: '2px solid #f0f0f0' }}
                                            value={p.name}
                                            onChange={e => updatePriority(idx, 'name', e.target.value)}
                                            placeholder={idx === 0 ? 'e.g. Launch new product line' : idx === 1 ? 'e.g. Hire senior developer' : 'Add an initiative...'}
                                        />
                                    </td>
                                    {allFilled && (
                                        <td style={{ padding: '10px 16px', textAlign: 'center', verticalAlign: 'middle', borderLeft: '1px solid #000' }}>
                                            {(p.name || '').trim() && (
                                                <div style={{ display: 'flex', gap: 3, justifyContent: 'center' }} className="animate-fade">
                                                    {IMPACT_OPTS.map(o => (
                                                        <RatingBtn key={o.val} label={o.label} value={o.val} selected={p.impact === o.val} color={o.color}
                                                            onClick={() => updatePriority(idx, 'impact', o.val)} />
                                                    ))}
                                                </div>
                                            )}
                                        </td>
                                    )}
                                    {allFilled && (
                                        <td style={{ padding: '10px 16px', textAlign: 'center', verticalAlign: 'middle', borderLeft: '1px solid #000' }}>
                                            {(p.name || '').trim() && (
                                                <div style={{ display: 'flex', gap: 3, justifyContent: 'center' }} className="animate-fade">
                                                    {EASE_OPTS.map(o => (
                                                        <RatingBtn key={o.val} label={o.label} value={o.val} selected={p.ease === o.val} color={o.color}
                                                            onClick={() => updatePriority(idx, 'ease', o.val)} />
                                                    ))}
                                                </div>
                                            )}
                                        </td>
                                    )}
                                    {allFilled && (
                                        <td style={{ padding: '10px 16px', textAlign: 'center', verticalAlign: 'middle', borderLeft: '1px solid #000' }}>
                                            {(p.name || '').trim() && (
                                                <span className="plaak animate-fade" style={{
                                                    fontSize: 28,
                                                    color: score >= 7 ? '#000' : score > 0 ? '#999' : '#e0e0e0',
                                                    background: score >= 7 ? 'var(--yellow)' : 'transparent',
                                                    padding: '4px 12px',
                                                    transition: 'all 0.3s var(--ease-out-expo)',
                                                }}>{score > 0 ? score : '\u2014'}</span>
                                            )}
                                        </td>
                                    )}
                                    <td style={{ padding: '10px 0', textAlign: 'center', verticalAlign: 'middle' }}>
                                        <button onClick={() => removeRow(idx)} disabled={priorities.length <= 3}
                                            style={{ background: 'transparent', border: 'none', fontSize: 20, color: '#ddd', cursor: priorities.length <= 3 ? 'not-allowed' : 'pointer', opacity: priorities.length <= 3 ? 0.3 : 1, transition: 'color 0.2s', lineHeight: 1 }}
                                            onMouseOver={e => { if (priorities.length > 3) e.target.style.color = '#000'; }}
                                            onMouseOut={e => { e.target.style.color = '#ddd'; }}
                                        >&times;</button>
                                    </td>
                                </tr>
                            );
                        })}
                    </tbody>
                </table>

                {priorities.length < 10 && (
                    <button onClick={addRow} style={{ marginTop: 12, background: '#000', border: '2px solid #000', padding: '14px 24px', fontFamily: "'Monument', monospace", fontSize: 11, color: '#fff', cursor: 'pointer', letterSpacing: '0.06em', transition: 'all 0.3s var(--ease-out-expo)', width: '100%' }}
                        onMouseOver={e => { e.target.style.background = '#222'; }}
                        onMouseOut={e => { e.target.style.background = '#000'; }}>
                        + ADD INITIATIVE
                    </button>
                )}

                {allFilled && allScored >= 5 && (
                    <div style={{ marginTop: 28, border: '2px solid #000', padding: 24 }} className="animate-scale">
                        <div style={{ marginBottom: 20 }}>
                            <h3 className="plaak" style={{ fontSize: 32, color: '#000', marginBottom: 0, display: 'flex', alignItems: 'center', gap: 14 }}>
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                                TOP 3 BY SCORE
                            </h3>
                        </div>
                        {scored.slice(0, 3).map((p, rank) => (
                            <div key={rank} style={{ display: 'flex', alignItems: 'center', gap: 18, padding: '14px 0', borderBottom: rank < 2 ? '1px solid #f0f0f0' : 'none' }}>
                                <span className="plaak" style={{ fontSize: 36, color: '#000' }}>{rank+1}</span>
                                <span style={{ fontSize: 17, flex: 1, fontWeight: 600 }}>{p.name}</span>
                                <span className="plaak" style={{ fontSize: 28, color: '#000' }}>{p.score}</span>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 4 ────────────────────────────────────────────────────────────
    function Step4({ data, updateData }) {
        const { checklist } = data;
        const questions = [
            { key: 'q1', text: 'We have a clearly articulated vision statement that the entire team can recite.', fix: 'Go back to Step 1 and sharpen your vision statement until every team member can repeat it.' },
            { key: 'q2', text: 'Our top priorities are ranked by impact and ease, not by who shouted loudest.', fix: 'Revisit Step 3 and re-score your priorities using only the Impact × 2 + Ease formula.' },
            { key: 'q3', text: 'Every initiative has a named owner and a measurable 90-day target.', fix: 'Assign a specific person and a concrete 90-day metric to each of your top 3 priorities.' },
            { key: 'q4', text: 'We have identified what we will STOP doing to make room for the top priorities.', fix: 'List at least 2 current activities or projects you will stop or pause to free up capacity.' },
        ];
        const noItems = questions.filter(q => checklist[q.key] === false);
        const allAnswered = questions.every(q => checklist[q.key] !== null);
        const setAnswer = (key, val) => updateData('checklist', { ...checklist, [key]: val });

        return (
            <div className="step-content animate-in" style={{ paddingBottom: 0 }}>
                <p className="step-indicator">STEP 4 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Sprint Checklist</h1>
                    <p className="step-hint">Confirm your team has genuinely completed each item. Be honest — partial credit is worse than no credit.</p>
                </div>

                <div style={{ background: 'var(--yellow)', padding: '28px 32px' }}>
                    {questions.map((q, i) => (
                        <div key={q.key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20, padding: '18px 0', borderBottom: i < questions.length - 1 ? '1px solid rgba(0,0,0,0.08)' : 'none' }}>
                            <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start', flex: 1 }}>
                                <span style={{ fontSize: 28, fontWeight: 700, color: '#000', marginTop: -2, minWidth: 48, fontFamily: "'Monument', monospace", opacity: 0.4 }}>[{String(i+1).padStart(2,'0')}]</span>
                                <p style={{ fontSize: 15, lineHeight: 1.6 }}>{q.text}</p>
                            </div>
                            <div className="checklist-toggle">
                                <button style={{
                                    padding: '8px 18px', border: '2px solid #000', fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.06em', cursor: 'pointer', transition: 'all 0.25s var(--ease-out-expo)',
                                    background: checklist[q.key] === true ? '#000' : '#000', color: checklist[q.key] === true ? 'var(--yellow)' : '#fff',
                                    opacity: checklist[q.key] === true ? 1 : 0.6,
                                }} onClick={() => setAnswer(q.key, true)}>YES</button>
                                <button style={{
                                    padding: '8px 18px', border: '2px solid #000', fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.06em', cursor: 'pointer', transition: 'all 0.25s var(--ease-out-expo)',
                                    background: checklist[q.key] === false ? 'var(--red)' : '#000', color: '#fff',
                                    borderColor: checklist[q.key] === false ? 'var(--red)' : '#000',
                                    opacity: checklist[q.key] === false ? 1 : 0.6,
                                }} onClick={() => setAnswer(q.key, false)}>NO</button>
                            </div>
                        </div>
                    ))}
                </div>

                {allAnswered && noItems.length > 0 && (
                    <div className="animate-in" style={{ background: '#000', padding: '22px 28px', marginTop: 20 }}>
                        <p className="plaak" style={{ fontSize: 20, marginBottom: 14, color: 'var(--red)' }}>ACTION REQUIRED BEFORE CONTINUING</p>
                        {noItems.map(q => (
                            <div key={q.key} style={{ display: 'flex', gap: 10, marginBottom: 8 }}>
                                <span style={{ color: 'var(--red)', flexShrink: 0, marginTop: 1 }}>&bull;</span>
                                <p style={{ fontSize: 14, color: '#fff', lineHeight: 1.6, opacity: 0.8 }}>{q.fix}</p>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // ── Canvas ─────────────────────────────────────────────────────────────
    function CanvasStep({ data }) {
        const [caseStudyOpen, setCaseStudyOpen] = useState(false);
        const scored = data.priorities
            .filter(p => (p.name || '').trim())
            .map(p => ({ ...p, score: priorityScore(p) }))
            .sort((a, b) => b.score - a.score);

        const customers = parseFloat(data.totalCustomers) || 0;
        const avgRev = parseFloat(data.avgRevenue) || 0;
        const purchases = parseFloat(data.purchasesPerYear) || 0;
        const margin = parseFloat(data.grossMargin) || 0;
        const marketSize = customers * avgRev * purchases;
        const profitPool = marketSize * (margin / 100);
        const hasMarket = marketSize > 0;

        const checkQuestions = [
            'Vision statement the team can recite',
            'Priorities ranked by impact and ease',
            'Named owner + 90-day target per initiative',
            'Identified what to STOP doing',
        ];

        return (
            <div className="step-content animate-in">
                <p className="step-indicator">CANVAS</p>
                <div className="opening-box">
                    <h1 className="step-heading">Your Canvas</h1>
                    <p className="step-hint">Review your complete output, then submit.</p>
                </div>

                {/* Unified canvas block */}
                <div style={{ border: '1px solid #e8e8e8' }}>
                    <div style={{ padding: '28px 32px', borderBottom: '1px solid #e8e8e8' }}>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#999', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 12 }}>YOUR VISION</div>
                        <p className="plaak" style={{ fontSize: 28, lineHeight: 1.4, color: '#000' }}>{data.visionStatement || '—'}</p>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', borderBottom: '1px solid #e8e8e8' }}>
                        <div style={{ padding: '22px 28px', borderRight: '1px solid #e8e8e8' }}>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: 'var(--red)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 10 }}>CHALLENGES</div>
                            <p style={{ fontSize: 14, lineHeight: 1.7, color: '#333' }}>{data.currentChallenges || '—'}</p>
                        </div>
                        <div style={{ padding: '22px 28px' }}>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#16a34a', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 10 }}>TARGET OUTCOME</div>
                            <p style={{ fontSize: 14, lineHeight: 1.7, color: '#333' }}>{data.targetOutcome || '—'}</p>
                        </div>
                    </div>

                    {hasMarket && (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', borderBottom: '1px solid #e8e8e8' }}>
                            <div style={{ padding: '22px 28px', borderRight: '1px solid #e8e8e8' }}>
                                <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#999', letterSpacing: '0.12em', marginBottom: 10 }}>MARKET SIZE</div>
                                <p className="plaak" style={{ fontSize: 40, color: '#000' }}>{fmt(marketSize)}</p>
                            </div>
                            <div style={{ padding: '22px 28px' }}>
                                <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: '#999', letterSpacing: '0.12em', marginBottom: 10 }}>PROFIT POOL</div>
                                <p className="plaak" style={{ fontSize: 40, color: '#000' }}>{fmt(profitPool)}</p>
                            </div>
                        </div>
                    )}

                    {scored.length > 0 && (
                        <div style={{ borderBottom: '1px solid #e8e8e8' }}>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 'bold', color: '#999', padding: '20px 28px 0' }}>TOP PRIORITIES</div>
                            {scored.slice(0, 5).map((p, i) => (
                                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 18, padding: '16px 28px', borderTop: '1px solid #e8e8e8', marginTop: i === 0 ? 10 : 0 }}>
                                    <span className="plaak" style={{ fontSize: 36, color: '#000', minWidth: 40 }}>{i + 1}</span>
                                    <span style={{ fontSize: 16, flex: 1, letterSpacing: '-0.01em' }}>{p.name}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    <div>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 'bold', color: '#999', padding: '20px 28px 0' }}>READINESS CHECK</div>
                        {['q1', 'q2', 'q3', 'q4'].map((key, i) => (
                            <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 28px', borderTop: '1px solid #e8e8e8', marginTop: i === 0 ? 10 : 0 }}>
                                <span style={{
                                    width: 22, height: 22, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 'bold', flexShrink: 0,
                                    background: data.checklist[key] === true ? '#000' : data.checklist[key] === false ? 'var(--red)' : '#e8e8e8',
                                    color: data.checklist[key] === null ? '#aaa' : '#fff',
                                    transition: 'all 0.3s var(--ease-out-expo)',
                                }}>{data.checklist[key] === true ? '\u2713' : data.checklist[key] === false ? '\u2717' : '\u2014'}</span>
                                <span style={{ fontSize: 14, color: '#333' }}>{checkQuestions[i]}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Case study — grey section */}
                <div style={{ background: '#f5f5f5', marginTop: 20, border: '1px solid #e8e8e8' }}>
                    <div onClick={() => setCaseStudyOpen(!caseStudyOpen)}
                        style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 28px', cursor: 'pointer', transition: 'opacity 0.2s' }}
                        onMouseOver={e => e.currentTarget.style.opacity = '0.7'}
                        onMouseOut={e => e.currentTarget.style.opacity = '1'}>
                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 'bold', color: '#000' }}>CASE STUDY</span>
                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#000', letterSpacing: '0.08em', transition: 'all 0.2s' }}>{caseStudyOpen ? 'CLOSE \u2715' : 'READ CASE STUDY \u2192'}</span>
                    </div>
                    {caseStudyOpen && (
                        <div style={{ padding: '0 28px 28px' }} className="animate-in">
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 9, color: 'rgba(0,0,0,0.5)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 16 }}>LUXOTTICA GROUP — EYEWEAR INDUSTRY</div>
                            <p style={{ fontSize: 15, lineHeight: 1.9, color: '#000', marginBottom: 18 }}>
                                When Luxottica's CEO Andrea Guerra took over in 2004, the company had a clear vision but fragmented priorities. They were the world's largest eyewear manufacturer, yet their market share was only 12% of a $65B global market.
                            </p>
                            <p style={{ fontSize: 15, lineHeight: 1.9, color: '#000', marginBottom: 18 }}>
                                Guerra used a simple framework: score every growth initiative by strategic impact and execution ease. Three priorities surfaced clearly:
                            </p>
                            <div style={{ background: 'rgba(0,0,0,0.06)', padding: '20px 24px', marginBottom: 18 }}>
                                {[
                                    ['Vertical integration', 'acquire retail chains (LensCrafters, Sunglass Hut) to control the full value chain'],
                                    ['License premium brands', 'sign Chanel, Prada, Dolce & Gabbana'],
                                    ['Expand insurance partnerships', 'integrate EyeMed into the retail experience'],
                                ].map(([title, desc], i) => (
                                    <div key={i} style={{ display: 'flex', gap: 14, marginBottom: i < 2 ? 12 : 0, paddingBottom: i < 2 ? 12 : 0, borderBottom: i < 2 ? '1px solid rgba(0,0,0,0.1)' : 'none' }}>
                                        <span className="plaak" style={{ fontSize: 22, minWidth: 28, color: '#000' }}>{i+1}</span>
                                        <p style={{ fontSize: 14, color: '#000', lineHeight: 1.6 }}><strong>{title}</strong> — {desc}</p>
                                    </div>
                                ))}
                            </div>
                            <p style={{ fontSize: 15, lineHeight: 1.9, color: '#000', marginBottom: 20 }}>
                                By 2014, market share grew from 12% to 25%, revenue tripled from $4.2B to $10.5B. The key: doing only 3 things extremely well.
                            </p>
                            <div style={{ borderLeft: '3px solid #000', paddingLeft: 20 }}>
                                <p style={{ fontSize: 14, fontStyle: 'italic', color: 'rgba(0,0,0,0.7)', lineHeight: 1.7 }}>
                                    "We had 40 initiatives on the board. We killed 37 of them. That's when the company started moving." — Andrea Guerra, CEO Luxottica (2004-2014)
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ── Success Page ──────────────────────────────────────────────────────
    function SuccessPage() {
        const [visible, setVisible] = useState(false);
        useEffect(() => { setTimeout(() => setVisible(true), 100); }, []);

        return (
            <div style={{ minHeight: '100vh', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '64px 32px' }}>
                <div style={{ maxWidth: 640, width: '100%', opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(20px)', transition: 'all 0.8s var(--ease-out-expo)' }}>
                    {/* Top row: circle left, text right */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 32, marginBottom: 40 }}>
                        <div style={{
                            width: 88, height: 88, borderRadius: '50%', background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                            transform: visible ? 'scale(1)' : 'scale(0.5)', transition: 'transform 0.6s var(--ease-out-expo) 0.2s',
                        }}>
                            <span style={{ color: 'var(--yellow)', fontSize: 40 }}>&#10003;</span>
                        </div>
                        <div>
                            <h1 className="plaak" style={{ fontSize: 44, marginBottom: 8, opacity: visible ? 1 : 0, transition: 'opacity 0.6s ease 0.4s' }}>SUBMISSION COMPLETE</h1>
                            <p style={{ fontSize: 16, color: '#888', lineHeight: 1.8, opacity: visible ? 1 : 0, transition: 'opacity 0.6s ease 0.5s' }}>
                                Your answers have been saved. Your guru will review them before your next session.
                            </p>
                        </div>
                    </div>

                    {/* What's next — full width */}
                    <div style={{ background: '#fafafa', padding: '24px 28px', marginBottom: 36, border: '1px solid #f0f0f0', opacity: visible ? 1 : 0, transition: 'opacity 0.6s ease 0.6s' }}>
                        <p style={{ fontFamily: "'Monument', monospace", fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#999', marginBottom: 16 }}>WHAT'S NEXT</p>
                        {[
                            'Download your canvas as PDF and share it with your team.',
                            'Continue to the next sprint section when it unlocks.',
                            'Prepare for your guru meeting — they will review your answers and challenge your thinking.',
                        ].map((text, i) => (
                            <div key={i} style={{ display: 'flex', gap: 14, marginBottom: i < 2 ? 14 : 0 }}>
                                <span className="plaak" style={{ fontSize: 18, minWidth: 24 }}>{i+1}</span>
                                <p style={{ fontSize: 14, color: '#555', lineHeight: 1.7 }}>{text}</p>
                            </div>
                        ))}
                    </div>
                    <a href="/dashboard" style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#000', letterSpacing: '0.08em', textDecoration: 'none', borderBottom: '2px solid #000', paddingBottom: 4, transition: 'all 0.2s ease' }}
                        onMouseOver={e => { e.target.style.borderColor = 'var(--yellow)'; e.target.style.color = '#666'; }}
                        onMouseOut={e => { e.target.style.borderColor = '#000'; e.target.style.color = '#000'; }}
                    >&larr; BACK TO DASHBOARD</a>
                </div>
            </div>
        );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
        const saved = (() => { try { return JSON.parse(localStorage.getItem('designRefState')); } catch { return null; } })();
        const [step, setStep]               = useState(saved?.step ?? 0);
        const [data, setData]               = useState(saved?.data ?? makeDefaultData());
        const [submitStatus, setSubmitStatus] = useState('idle');
        const [s2Sub, setS2Sub]             = useState(saved?.s2Sub ?? 0);

        useEffect(() => {
            localStorage.setItem('designRefState', JSON.stringify({ step, data, s2Sub }));
        }, [step, data, s2Sub]);

        const totalSteps = CONFIG.TOTAL_STEPS;

        const updateData = useCallback((field, val) => {
            setData(prev => ({ ...prev, [field]: val }));
        }, []);

        const canProceed = () => {
            if (step === 1) {
                return (data.visionStatement || '').trim().length >= 20
                    && (data.currentChallenges || '').trim().length >= 20
                    && (data.targetOutcome || '').trim().length >= 20;
            }
            if (step === 2) {
                if (s2Sub === 0) {
                    return parseFloat(data.totalCustomers) > 0
                        && parseFloat(data.avgRevenue) > 0
                        && parseFloat(data.purchasesPerYear) > 0
                        && parseFloat(data.grossMargin) > 0;
                }
                return true;
            }
            if (step === 3) {
                return data.priorities.filter(p => (p.name || '').trim() && p.impact > 0 && p.ease > 0).length >= 3;
            }
            if (step === 4) {
                return ['q1','q2','q3','q4'].every(k => data.checklist[k] !== null);
            }
            return true;
        };

        const handleNext = () => {
            if (!canProceed()) return;
            if (step === 2 && s2Sub === 0) { setS2Sub(1); return; }
            setStep(step + 0.5);
        };

        const handleTransitionNext = () => {
            const next = Math.floor(step) + 1;
            if (Math.floor(step) === totalSteps) {
                setStep('canvas');
            } else {
                setStep(next);
                if (next === 2) setS2Sub(0);
            }
        };

        const handleBack = () => {
            if (step === 'canvas') { setStep(totalSteps); return; }
            if (step === 2 && s2Sub === 1) { setS2Sub(0); return; }
            if (step === 1) { setStep('map'); return; }
            setStep(step - 1);
            if (step - 1 === 2) setS2Sub(1);
        };

        const handleSubmit = () => {
            setSubmitStatus('success');
        };

        const isWizardStep = Number.isInteger(step) && step >= 1 && step <= totalSteps;
        const isTransition = !Number.isInteger(step) && step > 0.5 && step !== 'canvas';

        if (submitStatus === 'success') return <SuccessPage />;

        return (
            <div className="tool-frame">
                {(step === 0 || step === 0.5) && (
                    <CoverIntro onStart={() => setStep('map')} />
                )}

                {step === 'map' && (
                    <JourneyMap currentStep={1} onBegin={() => setStep(1)} />
                )}

                {isTransition && (
                    <TransitionScreen stepNum={Math.floor(step)} totalSteps={totalSteps} onNext={handleTransitionNext} />
                )}

                {(isWizardStep || step === 'canvas') && (
                    <div className="tool-inner">
                        <div className="wizard-layout">
                            <div className="wizard-main" style={step === 4 ? { background: 'var(--yellow)' } : {}}>
                                <div style={{ flex: 1 }}>
                                    {step === 1 && <Step1 data={data} updateData={updateData} />}
                                    {step === 2 && <Step2 data={data} updateData={updateData} subStep={s2Sub} setSubStep={setS2Sub} />}
                                    {step === 3 && <Step3 data={data} updateData={updateData} />}
                                    {step === 4 && <Step4 data={data} updateData={updateData} />}
                                    {step === 'canvas' && <CanvasStep data={data} />}
                                </div>
                                <div className="wizard-footer" style={step === 4 ? { background: 'var(--yellow)', borderTopColor: 'rgba(0,0,0,0.08)' } : {}}>
                                    <button className="btn-wiz-back" onClick={handleBack} style={step === 4 ? { background: '#000', color: '#fff' } : {}}>&larr; BACK</button>
                                    {step !== 'canvas' ? (
                                        <button className="btn-wiz-next" onClick={handleNext} disabled={!canProceed()}>
                                            {step === 2 && s2Sub === 0 ? 'GROWTH SCENARIO \u2192' : 'NEXT \u2192'}
                                        </button>
                                    ) : (
                                        <button className="btn-wiz-next" onClick={handleSubmit}>
                                            SUBMIT ANSWERS &rarr;
                                        </button>
                                    )}
                                </div>
                            </div>
                            <WizardSidebar currentStep={step} data={data} />
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
