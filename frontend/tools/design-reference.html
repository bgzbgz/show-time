<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Reference | Fast Track Program</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @font-face { font-family: 'Plaak';    src: url('module-6-org-structure/Plaak3Trial-43-Bold.woff2') format('woff2'); font-weight: bold; }
    @font-face { font-family: 'Riforma';  src: url('module-6-org-structure/RiformaLL-Regular.woff2')   format('woff2'); font-weight: normal; }
    @font-face { font-family: 'Monument'; src: url('module-6-org-structure/MonumentGrotesk-Mono.woff2') format('woff2'); }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Riforma', -apple-system, sans-serif; font-size: 16px; color: #000; background: #000; -webkit-font-smoothing: antialiased; }

    .plaak   { font-family: 'Plaak', sans-serif; font-weight: bold; letter-spacing: -0.01em; line-height: 1.2; }
    .monument { font-family: 'Monument', monospace; letter-spacing: 0.05em; }

    .tool-frame { background: #fff; min-height: 100vh; }
    .tool-inner { background: #fff; min-height: 100vh; }

    .wizard-layout  { display: flex; min-height: 100vh; }
    .wizard-main    { flex: 1; display: flex; flex-direction: column; min-height: 100vh; background: #fff; padding: 0 48px; }
    .wizard-sidebar { width: 280px; background: #1a1a1a; min-height: 100vh; padding: 48px 32px; display: flex; flex-direction: column; position: sticky; top: 0; align-self: flex-start; height: 100vh; overflow-y: auto; }

    .step-content   { max-width: 100%; padding: 40px 0 24px; flex: 1; }
    .step-indicator { font-family: 'Monument', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 8px; }
    .opening-box    { margin-bottom: 32px; }
    .opening-box .step-heading { font-family: 'Plaak', sans-serif; font-size: 32px; color: #000; margin-bottom: 6px; }
    .opening-box .step-hint    { font-size: 14px; color: #666; line-height: 1.5; }

    .field-group    { margin-bottom: 28px; }
    .field-group:last-child { margin-bottom: 0; }
    .field-label    { font-weight: 600; font-size: 15px; color: #000; margin-bottom: 6px; display: block; }
    .field-sub      { font-size: 13px; color: #666; margin-bottom: 6px; line-height: 1.5; }
    .field-input    { border: 1px solid #E0E0E0; padding: 12px 16px; font-family: 'Riforma', sans-serif; font-size: 16px; width: 100%; color: #000; background: #fff; transition: border-color 0.2s; }
    .field-input:focus { outline: none; border-color: #000; }
    .field-textarea { border: 1px solid #E0E0E0; padding: 12px 16px; font-family: 'Riforma', sans-serif; font-size: 16px; width: 100%; min-height: 100px; resize: none !important; color: #000; background: #fff; transition: border-color 0.2s; }
    .field-textarea:focus { outline: none; border-color: #000; }
    .field-help     { font-size: 13px; color: #666; margin-top: 4px; }

    .field-split    { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    .wizard-footer  { display: flex; justify-content: space-between; align-items: center; padding: 24px 48px; border-top: 1px solid #e5e7eb; background: #fff; }
    .btn-wiz-back   { background: transparent; border: 2px solid #d1d5db; color: #6b7280; padding: 12px 28px; font-family: 'Monument', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-wiz-back:hover { border-color: #000; color: #000; }
    .btn-wiz-next   { background: #000; color: #fff; border: 2px solid #000; padding: 12px 36px; font-family: 'Monument', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-wiz-next:hover:not(:disabled) { background: #FFF469; color: #000; border-color: #FFF469; }
    .btn-wiz-next:disabled { background: #E0E0E0; color: #9CA3AF; border-color: #E0E0E0; cursor: not-allowed; }

    .sidebar-tool-num   { font-family: 'Monument', monospace; font-size: 11px; color: #999; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    .sidebar-tool-title { font-family: 'Plaak', sans-serif; font-size: 22px; color: #fff; margin-bottom: 32px; line-height: 1.1; }
    .sidebar-step       { padding: 10px 0; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 10px; }
    .sidebar-step:last-child { border-bottom: none; }
    .sidebar-step-dot   { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; transition: background 0.2s; }
    .sidebar-step-dot.active { background: #FFF469; }
    .sidebar-step-dot.done   { background: #4ade80; }
    .sidebar-step-label { font-family: 'Monument', monospace; font-size: 11px; letter-spacing: 0.08em; color: #777; text-transform: uppercase; transition: color 0.2s; }
    .sidebar-step-label.active { color: #FFF469; }
    .sidebar-step-label.done   { color: #4ade80; }

    .ai-message { background: #FFF9C4; border: 1px solid #FFF469; border-left: 4px solid #FFF469; padding: 12px 16px; font-size: 14px; color: #333; margin-bottom: 16px; line-height: 1.6; }

    .animate-in { animation: fadeSlideIn 0.4s ease both; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .canvas-split          { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .canvas-split > *      { min-width: 0; }
    .canvas-field          { margin-bottom: 16px; min-width: 0; }
    .canvas-field-label    { font-family: 'Monument', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 6px; }
    .canvas-field-value    { font-size: 15px; color: #000; line-height: 1.6; white-space: pre-wrap; overflow-wrap: break-word; word-break: break-word; }

    .checklist-item { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid #F0F0F0; }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item-text { font-size: 15px; line-height: 1.5; flex: 1; }
    .checklist-toggle { display: flex; gap: 4px; flex-shrink: 0; }
    .checklist-btn { padding: 6px 16px; border: 2px solid #E0E0E0; background: #fff; font-family: 'Monument', monospace; font-size: 10px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; }
    .checklist-btn.selected-yes { background: #000; color: #FFF469; border-color: #000; }
    .checklist-btn.selected-no  { background: #DC2626; color: #fff; border-color: #DC2626; }

    .closing-box { background: #F9F9F9; border-left: 4px solid #000; padding: 16px 20px; margin-top: 16px; }
    .closing-title { font-family: 'Monument', monospace; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; font-weight: 600; }

    .progress-bar-wrap { height: 4px; background: #333; margin-bottom: 0; border-radius: 2px; }
    .progress-bar-fill { height: 4px; background: #FFF469; transition: width 0.3s ease; border-radius: 2px; }

    .mobile-step-bar { display: none; }
    @media (max-width: 768px) {
        .wizard-sidebar { display: none; }
        .wizard-main { padding: 0 24px; }
        .mobile-step-bar { display: flex; align-items: center; gap: 8px; padding: 16px 24px; background: #1a1a1a; }
        .mobile-step-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.2s; }
        .mobile-step-dot.active { background: #FFF469; }
        .mobile-step-dot.done   { background: #4ade80; }
        .mobile-step-text { font-family: 'Monument', monospace; font-size: 11px; color: #fff; letter-spacing: 0.06em; margin-right: 8px; }
        .wizard-footer { padding: 16px 24px; }
        .field-split { grid-template-columns: 1fr; }
        .canvas-split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const CONFIG = {
        TOOL_SLUG: 'design-reference',
        TOOL_TITLE: 'DESIGN REFERENCE',
        TOOL_SUBTITLE: 'A complete showcase of every UI pattern used across Fast Track tools.',
        TOOL_NUM: 'REF',
        TOTAL_STEPS: 3,
        COVER_IMAGE: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80',
        TRANSITION_CONTENT: {
            1: {
                brutalTruth: '"Most companies confuse having a strategy with writing it down. If your team cannot recite your value proposition in one sentence, you do not have one."',
                peerProof: '"We thought everyone understood our direction — until we asked. Six different team members gave six different answers. That was the moment we realised we needed this exercise." — CEO, SaaS company, 42 employees',
                insight: 'Companies with a clearly articulated vision are 2.4x more likely to achieve their strategic objectives. The specificity of your language determines the alignment of your team\'s execution.'
            },
            2: {
                brutalTruth: '"Prioritisation is not choosing what to do — it is choosing what to stop doing. If everything is important, nothing is."',
                peerProof: '"We had 23 initiatives running in parallel. After this exercise we cut to 5. Revenue grew 34% in the next quarter — not because we added anything, but because we finally focused." — COO, e-commerce, 85 employees',
                insight: 'Research shows teams with more than 5 priorities effectively have zero priorities. The scoring matrix forces objectivity over politics.'
            },
            3: {
                brutalTruth: '"A checklist without honesty is theatre. If you say yes to something your team has not genuinely completed, you are lying to yourself — and your guru will see through it."',
                peerProof: '"The checklist was humbling. We answered NO to two items and it forced a conversation we had been avoiding for months. Best decision we made." — Founder, logistics startup',
                insight: 'Teams that complete honest self-assessments improve execution speed by 40% in the following quarter. The gaps you identify today become your roadmap.'
            },
        },
        CLOSING_MESSAGES: {
            1: { title: 'STEP 1 COMPLETE', text: 'Your strategic foundation is set. Everything that follows will be anchored to this.' },
            2: { title: 'STEP 2 COMPLETE', text: 'Your priorities are ranked. The data speaks — now trust it.' },
            3: { title: 'STEP 3 COMPLETE', text: 'Honest self-assessment is the hardest part. Well done.' },
        },
    };

    const SIDEBAR_STEPS = [
        { num: 1, label: 'Strategic Foundation' },
        { num: 2, label: 'Priority Matrix' },
        { num: 3, label: 'Sprint Checklist' },
    ];

    function makeDefaultData() {
        return {
            visionStatement: '',
            currentChallenges: '',
            targetOutcome: '',
            priorities: [
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
            ],
            checklist: { q1: null, q2: null, q3: null, q4: null },
        };
    }

    function priorityScore(p) {
        if (!p.impact || !p.ease) return 0;
        return (p.impact * 2) + p.ease;
    }

    // ── Sidebar ─────────────────────────────────────────────────────────────
    function WizardSidebar({ currentStep, data }) {
        const stepNum = typeof currentStep === 'number' ? currentStep : CONFIG.TOTAL_STEPS + 1;
        const pct = currentStep === 'canvas' ? 100 : Math.round((Math.min(stepNum, CONFIG.TOTAL_STEPS) / CONFIG.TOTAL_STEPS) * 100);

        return (
            <div className="wizard-sidebar">
                <div className="sidebar-tool-num">TOOL {CONFIG.TOOL_NUM}</div>
                <div className="sidebar-tool-title">{CONFIG.TOOL_TITLE}</div>

                {SIDEBAR_STEPS.map(s => {
                    const isActive = stepNum === s.num;
                    const isDone = stepNum > s.num || currentStep === 'canvas';
                    return (
                        <div className="sidebar-step" key={s.num}>
                            <div className={`sidebar-step-dot ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`} />
                            <span className={`sidebar-step-label ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`}>{s.label}</span>
                        </div>
                    );
                })}

                <div style={{ marginTop: 'auto', paddingTop: 24 }}>
                    <p style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#ddd', letterSpacing: '0.1em', marginBottom: 8 }}>PROGRESS</p>
                    <div className="progress-bar-wrap">
                        <div className="progress-bar-fill" style={{ width: `${pct}%` }} />
                    </div>
                    <p style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#FFF469', marginTop: 6, fontWeight: 'bold' }}>{pct}%</p>
                </div>
            </div>
        );
    }

    function MobileStepBar({ currentStep, totalSteps }) {
        return (
            <div className="mobile-step-bar">
                <span className="mobile-step-text">Step {currentStep}/{totalSteps}</span>
                {Array.from({ length: totalSteps }, (_, i) => (
                    <div key={i} className={`mobile-step-dot ${i + 1 === currentStep ? 'active' : ''} ${i + 1 < currentStep ? 'done' : ''}`} />
                ))}
            </div>
        );
    }

    // ── TransitionScreen — clean, single-flow layout ────────────────────────
    function TransitionScreen({ stepNum, totalSteps, onNext }) {
        const t = CONFIG.TRANSITION_CONTENT[stepNum];
        const c = CONFIG.CLOSING_MESSAGES[stepNum];
        if (!t) { onNext(); return null; }
        const pct = Math.round((stepNum / totalSteps) * 100);
        return (
            <div style={{ position: 'fixed', inset: 0, background: '#000', color: '#fff',
                          zIndex: 200, overflowY: 'auto', display: 'flex', alignItems: 'center',
                          justifyContent: 'center', padding: '64px 32px' }}>
                <div style={{ maxWidth: 720, width: '100%' }} className="animate-in">
                    {/* Progress bar */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 48 }}>
                        <div style={{ flex: 1, height: 4, background: '#333', borderRadius: 2 }}>
                            <div style={{ height: 4, background: '#FFF469', borderRadius: 2, width: `${pct}%`, transition: 'width 0.5s ease' }} />
                        </div>
                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 13, color: '#FFF469', fontWeight: 'bold', letterSpacing: '0.08em' }}>{pct}%</span>
                    </div>

                    {c && <div style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#4ade80', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 32 }}>&#10003; {c.title}</div>}

                    {/* Single content block — brutal truth quote, then peer proof inline */}
                    <p className="plaak" style={{ fontSize: 28, lineHeight: 1.4, marginBottom: 32, color: '#fff' }}>{t.brutalTruth}</p>

                    <p style={{ fontSize: 16, color: '#ddd', lineHeight: 1.8, marginBottom: 48, fontStyle: 'italic' }}>{t.peerProof}</p>

                    {/* Insight as a subtle line */}
                    {t.insight && (
                        <p style={{ fontSize: 14, color: '#fff', lineHeight: 1.7, borderTop: '1px solid #333', paddingTop: 24, marginBottom: 48 }}>{t.insight}</p>
                    )}

                    <button onClick={onNext} className="plaak"
                        style={{ background: '#FFF469', color: '#000', border: 'none', padding: '18px 48px', fontSize: 18, cursor: 'pointer', letterSpacing: '0.05em', transition: 'all 0.2s' }}>
                        CONTINUE &rarr;
                    </button>
                </div>
            </div>
        );
    }

    // ── RatingBtn ────────────────────────────────────────────────────────────
    function RatingBtn({ label, value, selected, color, onClick }) {
        return (
            <button onClick={onClick} style={{
                padding: '6px 14px',
                border: `2px solid ${selected ? color : '#E0E0E0'}`,
                background: selected ? color : '#fff',
                color: selected ? (color === '#FFF469' ? '#000' : '#fff') : '#999',
                fontFamily: "'Monument', monospace",
                fontSize: 11,
                letterSpacing: '0.05em',
                cursor: 'pointer',
                transition: 'all 0.15s',
                textTransform: 'uppercase',
                whiteSpace: 'nowrap',
            }}>{label}</button>
        );
    }

    // ── STEP 1: Strategic Foundation — progressive reveal ───────────────────
    function Step1({ data, updateData }) {
        const visionDone = (data.visionStatement || '').trim().length >= 20;
        const challengesDone = (data.currentChallenges || '').trim().length >= 20;
        const outcomeDone = (data.targetOutcome || '').trim().length >= 20;

        return (
            <div className="step-content animate-in">
                <p className="step-indicator">STEP 1 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Strategic Foundation</h1>
                    <p className="step-hint">Define your strategic direction. Each question unlocks the next — complete them in sequence to build your foundation.</p>
                </div>

                <div className="field-group">
                    <label className="field-label">Vision Statement</label>
                    <p className="field-sub">Describe your company's long-term vision in 2-3 sentences. Be specific and ambitious.</p>
                    <textarea className="field-textarea" style={{ minHeight: 120 }}
                        value={data.visionStatement}
                        onChange={e => updateData('visionStatement', e.target.value)}
                        placeholder="e.g. We will become the leading provider of sustainable packaging solutions in Europe by 2028, serving 500+ enterprise clients."
                        maxLength={600}
                    />
                    <p className="field-help">{(data.visionStatement || '').length}/600 {!visionDone && '(min 20 characters to continue)'}</p>
                </div>

                {visionDone && (
                    <div className="field-group animate-in" style={{ marginTop: 32 }}>
                        <label className="field-label">Current Challenges</label>
                        <p className="field-sub">What is blocking progress right now? Be honest about the obstacles.</p>
                        <textarea className="field-textarea"
                            value={data.currentChallenges}
                            onChange={e => updateData('currentChallenges', e.target.value)}
                            placeholder="e.g. Slow decision-making, unclear priorities across departments, lack of alignment between teams..."
                            maxLength={400}
                        />
                        <p className="field-help">{(data.currentChallenges || '').length}/400 {!challengesDone && '(min 20 characters to continue)'}</p>
                    </div>
                )}

                {visionDone && challengesDone && (
                    <div className="field-group animate-in" style={{ marginTop: 32 }}>
                        <label className="field-label">Target Outcome</label>
                        <p className="field-sub">What does success look like in 90 days? Paint the picture.</p>
                        <textarea className="field-textarea"
                            value={data.targetOutcome}
                            onChange={e => updateData('targetOutcome', e.target.value)}
                            placeholder="e.g. Clear strategic priorities communicated to all teams, 3 key initiatives launched, weekly rhythm established..."
                            maxLength={400}
                        />
                        <p className="field-help">{(data.targetOutcome || '').length}/400 {!outcomeDone && '(min 20 characters to continue)'}</p>
                    </div>
                )}

                {visionDone && challengesDone && outcomeDone && (
                    <div className="closing-box animate-in" style={{ marginTop: 32 }}>
                        <p className="closing-title">{CONFIG.CLOSING_MESSAGES[1].title}</p>
                        <p style={{ fontSize: 14, color: '#555', lineHeight: 1.6 }}>{CONFIG.CLOSING_MESSAGES[1].text}</p>
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 2: Priority Matrix ─────────────────────────────────────────────
    function Step2({ data, updateData }) {
        const priorities = data.priorities;
        const filled = priorities.filter(p => (p.name || '').trim()).length;
        const allScored = priorities.filter(p => (p.name || '').trim() && p.impact > 0 && p.ease > 0).length;
        const allFilled = filled >= 5;

        const updatePriority = (idx, field, val) => {
            const next = priorities.map((p, i) => i === idx ? { ...p, [field]: val } : p);
            updateData('priorities', next);
        };
        const addRow = () => {
            if (priorities.length < 10) updateData('priorities', [...priorities, { name: '', impact: 0, ease: 0 }]);
        };
        const removeRow = (idx) => {
            if (priorities.length <= 3) return;
            updateData('priorities', priorities.filter((_, i) => i !== idx));
        };

        const IMPACT_OPTS = [
            { label: 'Low',  val: 1, color: '#DC2626' },
            { label: 'Med',  val: 2, color: '#f59e0b' },
            { label: 'High', val: 3, color: '#22c55e' },
        ];
        const EASE_OPTS = [
            { label: 'Hard', val: 1, color: '#DC2626' },
            { label: 'Med',  val: 2, color: '#f59e0b' },
            { label: 'Easy', val: 3, color: '#22c55e' },
        ];

        const scored = priorities
            .map((p, i) => ({ ...p, idx: i, score: priorityScore(p) }))
            .filter(p => (p.name || '').trim())
            .sort((a, b) => b.score - a.score);

        return (
            <div className="step-content animate-in">
                <p className="step-indicator">STEP 2 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Priority Matrix</h1>
                    <p className="step-hint">List your initiatives, then rate each by strategic impact and execution ease. Score = (Impact x 2) + Ease. Max score: 9.</p>
                </div>

                {priorities.map((p, idx) => {
                    const score = priorityScore(p);
                    const isTop3 = (p.name || '').trim() && scored.findIndex(s => s.idx === idx) < 3;
                    return (
                        <div key={idx} style={{
                            marginBottom: 16,
                            padding: '20px 24px',
                            background: isTop3 ? '#FFFDE7' : '#fff',
                            border: `2px solid ${isTop3 ? '#FFF469' : '#E0E0E0'}`,
                            transition: 'all 0.2s',
                        }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: (p.name || '').trim() ? 12 : 0 }}>
                                <span className="plaak" style={{ fontSize: 20, color: '#000', minWidth: 28 }}>{String(idx+1).padStart(2,'0')}</span>
                                <input type="text" className="field-input" style={{ padding: '10px 14px', fontSize: 15, flex: 1 }}
                                    value={p.name}
                                    onChange={e => updatePriority(idx, 'name', e.target.value)}
                                    placeholder={idx === 0 ? 'e.g. Launch new product line' : idx === 1 ? 'e.g. Hire senior developer' : idx === 2 ? 'e.g. Expand to new market' : 'Add an initiative...'}
                                />
                                <div style={{
                                    fontFamily: "'Plaak', sans-serif",
                                    fontSize: 24,
                                    fontWeight: 'bold',
                                    color: score >= 7 ? '#000' : score >= 5 ? '#000' : score > 0 ? '#666' : '#ddd',
                                    background: score >= 7 ? '#FFF469' : score >= 5 ? '#F0F0F0' : 'transparent',
                                    padding: '4px 12px',
                                    minWidth: 52,
                                    textAlign: 'center',
                                    transition: 'all 0.2s',
                                }}>
                                    {score > 0 ? score : '\u2014'}
                                </div>
                                <button onClick={() => removeRow(idx)} disabled={priorities.length <= 3}
                                    style={{ background: 'transparent', border: 'none', fontSize: 20, color: '#ccc', cursor: priorities.length <= 3 ? 'not-allowed' : 'pointer', opacity: priorities.length <= 3 ? 0.3 : 1 }}>&times;</button>
                            </div>

                            {(p.name || '').trim() && (
                                <div style={{ display: 'flex', alignItems: 'center', gap: 24, paddingLeft: 40 }} className="animate-in">
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', textTransform: 'uppercase', letterSpacing: '0.08em', minWidth: 50 }}>Impact</span>
                                        <div style={{ display: 'flex', gap: 4 }}>
                                            {IMPACT_OPTS.map(o => (
                                                <RatingBtn key={o.val} label={o.label} value={o.val} selected={p.impact === o.val} color={o.color}
                                                    onClick={() => updatePriority(idx, 'impact', o.val)} />
                                            ))}
                                        </div>
                                    </div>
                                    <div style={{ width: 1, height: 24, background: '#E0E0E0', flexShrink: 0 }}></div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', textTransform: 'uppercase', letterSpacing: '0.08em', minWidth: 50 }}>Ease</span>
                                        <div style={{ display: 'flex', gap: 4 }}>
                                            {EASE_OPTS.map(o => (
                                                <RatingBtn key={o.val} label={o.label} value={o.val} selected={p.ease === o.val} color={o.color}
                                                    onClick={() => updatePriority(idx, 'ease', o.val)} />
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                })}

                {priorities.length < 10 && (
                    <button onClick={addRow} style={{ marginTop: 4, background: 'transparent', border: '2px dashed #E0E0E0', padding: '12px 24px', fontFamily: "'Monument', monospace", fontSize: 11, color: '#999', cursor: 'pointer', letterSpacing: '0.06em', transition: 'all 0.2s', width: '100%' }}
                        onMouseOver={e => { e.target.style.borderColor = '#000'; e.target.style.color = '#000'; }}
                        onMouseOut={e => { e.target.style.borderColor = '#E0E0E0'; e.target.style.color = '#999'; }}>
                        + Add Initiative
                    </button>
                )}

                {/* Top 3 — only after all 5 slots filled */}
                {allFilled && allScored >= 3 && (
                    <div style={{ marginTop: 24, border: '2px solid #000', padding: 20 }} className="animate-in">
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#000', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 16, fontWeight: 'bold' }}>TOP 3 BY SCORE</div>
                        {scored.slice(0, 3).map((p, rank) => (
                            <div key={rank} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '10px 0', borderBottom: rank < 2 ? '1px solid #F0F0F0' : 'none' }}>
                                <span className="plaak" style={{ fontSize: 24, color: '#000' }}>{rank+1}</span>
                                <span style={{ fontSize: 15, flex: 1, fontWeight: 600 }}>{p.name}</span>
                                <span className="plaak" style={{ fontSize: 20, color: '#000' }}>{p.score}</span>
                            </div>
                        ))}
                    </div>
                )}

                {allFilled && allScored >= 3 && (
                    <div className="closing-box animate-in" style={{ marginTop: 16 }}>
                        <p className="closing-title">{CONFIG.CLOSING_MESSAGES[2].title}</p>
                        <p style={{ fontSize: 14, color: '#555', lineHeight: 1.6 }}>{CONFIG.CLOSING_MESSAGES[2].text}</p>
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 3: Sprint Checklist — tight layout ─────────────────────────────
    function Step3({ data, updateData }) {
        const { checklist } = data;
        const questions = [
            { key: 'q1', text: 'We have a clearly articulated vision statement that the entire team can recite.' },
            { key: 'q2', text: 'Our top priorities are ranked by impact and ease, not by who shouted loudest.' },
            { key: 'q3', text: 'Every initiative has a named owner and a measurable 90-day target.' },
            { key: 'q4', text: 'We have identified what we will STOP doing to make room for the top priorities.' },
        ];
        const allAnswered = questions.every(q => checklist[q.key] !== null);
        const setAnswer = (key, val) => updateData('checklist', { ...checklist, [key]: val });

        return (
            <div className="step-content animate-in" style={{ paddingBottom: 0 }}>
                <p className="step-indicator">STEP 3 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Sprint Checklist</h1>
                    <p className="step-hint">Before you proceed, confirm your team has genuinely completed each item. Be honest — partial credit is worse than no credit.</p>
                </div>

                <div>
                    {questions.map((q, i) => (
                        <div key={q.key} className="checklist-item">
                            <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start', flex: 1 }}>
                                <span className="plaak" style={{ fontSize: 18, color: '#000', marginTop: 1, minWidth: 28 }}>{String(i+1).padStart(2,'0')}</span>
                                <p className="checklist-item-text">{q.text}</p>
                            </div>
                            <div className="checklist-toggle">
                                <button className={`checklist-btn ${checklist[q.key] === true ? 'selected-yes' : ''}`}
                                    onClick={() => setAnswer(q.key, true)}>YES</button>
                                <button className={`checklist-btn ${checklist[q.key] === false ? 'selected-no' : ''}`}
                                    onClick={() => setAnswer(q.key, false)}>NO</button>
                            </div>
                        </div>
                    ))}
                </div>

                {allAnswered && questions.some(q => checklist[q.key] === false) && (
                    <div style={{ background: '#FEF2F2', border: '1px solid #FCA5A5', borderLeft: '4px solid #DC2626', padding: 16, marginTop: 12, fontSize: 14, color: '#333', lineHeight: 1.6 }}>
                        <strong>Some items are incomplete.</strong> You can still proceed, but your guru will prioritise the gaps in your review.
                    </div>
                )}

                {allAnswered && (
                    <div className="closing-box animate-in">
                        <p className="closing-title">{CONFIG.CLOSING_MESSAGES[3].title}</p>
                        <p style={{ fontSize: 14, color: '#555', lineHeight: 1.6 }}>{CONFIG.CLOSING_MESSAGES[3].text}</p>
                    </div>
                )}
            </div>
        );
    }

    // ── Canvas Step — bold, memorable, magazine-style layout ─────────────────
    function CanvasStep({ data, submitStatus }) {
        const scored = data.priorities
            .filter(p => (p.name || '').trim())
            .map(p => ({ ...p, score: priorityScore(p) }))
            .sort((a, b) => b.score - a.score);

        const checkQuestions = [
            'Vision statement the team can recite',
            'Priorities ranked by impact and ease',
            'Named owner + 90-day target per initiative',
            'Identified what to STOP doing',
        ];

        return (
            <div className="step-content animate-in">
                <p className="step-indicator">CANVAS</p>
                <div className="opening-box">
                    <h1 className="step-heading">Your Canvas</h1>
                    <p className="step-hint">Review your complete output. Download it as a PDF to share with your team, then submit your answers.</p>
                </div>

                {/* Hero vision block — full-width black */}
                <div style={{ background: '#000', color: '#fff', padding: '48px 40px', marginBottom: 24 }}>
                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#FFF469', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 16 }}>YOUR VISION</div>
                    <p className="plaak" style={{ fontSize: 28, lineHeight: 1.4, color: '#fff' }}>
                        {data.visionStatement || 'Not filled'}
                    </p>
                </div>

                {/* Challenges + Outcome — side by side with strong visual weight */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0, marginBottom: 24 }}>
                    <div style={{ background: '#1a1a1a', color: '#fff', padding: '32px 28px' }}>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#DC2626', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>CHALLENGES</div>
                        <p style={{ fontSize: 15, lineHeight: 1.7, color: '#fff' }}>{data.currentChallenges || '\u2014'}</p>
                    </div>
                    <div style={{ background: '#111', color: '#fff', padding: '32px 28px' }}>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#4ade80', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>TARGET OUTCOME</div>
                        <p style={{ fontSize: 15, lineHeight: 1.7, color: '#fff' }}>{data.targetOutcome || '\u2014'}</p>
                    </div>
                </div>

                {/* Priorities — bold numbered list */}
                <div style={{ marginBottom: 24 }}>
                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#000', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 16, fontWeight: 'bold' }}>TOP PRIORITIES</div>
                    {scored.length > 0 ? scored.slice(0, 5).map((p, i) => (
                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 20, padding: '16px 0', borderBottom: '1px solid #E0E0E0' }}>
                            <span className="plaak" style={{ fontSize: 36, color: '#000', minWidth: 48 }}>{String(i+1).padStart(2,'0')}</span>
                            <div style={{ flex: 1 }}>
                                <p style={{ fontSize: 17, fontWeight: 600, marginBottom: 2 }}>{p.name}</p>
                                <p style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#999', letterSpacing: '0.06em' }}>
                                    Impact: {p.impact === 3 ? 'HIGH' : p.impact === 2 ? 'MED' : 'LOW'} &middot; Ease: {p.ease === 3 ? 'EASY' : p.ease === 2 ? 'MED' : 'HARD'}
                                </p>
                            </div>
                            <span className="plaak" style={{ fontSize: 28, color: p.score >= 7 ? '#000' : '#999' }}>{p.score}</span>
                        </div>
                    )) : (
                        <p style={{ color: '#999', fontSize: 14 }}>No priorities added yet</p>
                    )}
                </div>

                {/* Checklist results — compact inline */}
                <div style={{ background: '#F9F9F9', padding: '24px 28px', marginBottom: 24 }}>
                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#000', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 16, fontWeight: 'bold' }}>READINESS CHECK</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px 32px' }}>
                        {['q1', 'q2', 'q3', 'q4'].map((key, i) => (
                            <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                <span style={{
                                    width: 20, height: 20, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 'bold', flexShrink: 0,
                                    background: data.checklist[key] === true ? '#000' : data.checklist[key] === false ? '#DC2626' : '#E0E0E0',
                                    color: data.checklist[key] === null ? '#999' : '#fff',
                                }}>
                                    {data.checklist[key] === true ? '\u2713' : data.checklist[key] === false ? '\u2717' : '\u2014'}
                                </span>
                                <span style={{ fontSize: 13, color: data.checklist[key] === false ? '#DC2626' : '#333' }}>{checkQuestions[i]}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Case study — accent block */}
                <div style={{ borderLeft: '4px solid #FFF469', paddingLeft: 24, marginBottom: 8 }}>
                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#999', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>CASE STUDY</div>
                    <p style={{ fontSize: 14, lineHeight: 1.8, color: '#555' }}>
                        This is where a relevant case study reinforces the learning with a real-world example that connects to the user's work. The left border accent draws attention without heavy visual weight.
                    </p>
                </div>
            </div>
        );
    }

    // ── IntroPage — only BEFORE WE START in Plaak, rest in Riforma ──────────
    function IntroPage({ onNext }) {
        return (
            <div style={{ background: '#000', color: '#fff', minHeight: '100vh', padding: '64px' }}>
                <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
                    <h1 className="plaak animate-in" style={{ fontSize: '100px', marginBottom: '64px' }}>
                        BEFORE WE START
                    </h1>

                    {/* Purpose */}
                    <div className="animate-in" style={{ marginBottom: '48px', animationDelay: '0.08s' }}>
                        <p style={{ fontSize: 14, color: '#ddd', textTransform: 'uppercase', letterSpacing: '0.1em', fontFamily: "'Monument', monospace", marginBottom: 16 }}>PURPOSE</p>
                        <div style={{ borderLeft: '4px solid #fff', paddingLeft: '24px', marginBottom: '24px' }}>
                            <p style={{ fontSize: '28px', fontStyle: 'italic', marginBottom: '8px' }}>
                                "Strategy without process is a daydream. Process without strategy is a nightmare."
                            </p>
                            <p style={{ fontSize: '16px', color: '#ddd' }}>&mdash; Sun Tzu</p>
                        </div>
                        <p style={{ fontSize: '20px', lineHeight: 1.7, marginBottom: '16px' }}>
                            This tool will guide you through defining your strategic foundation, prioritising initiatives with an objective scoring system, and completing an honest assessment of your team's readiness.
                        </p>
                        <p style={{ fontSize: '17px', color: '#ddd', lineHeight: 1.7 }}>
                            You will work through 3 structured steps, each building on the previous. At the end, you will have a clear canvas summarising your strategic priorities — ready to share with your team and guru.
                        </p>
                    </div>

                    {/* The Journey */}
                    <div className="animate-in" style={{ marginBottom: '48px', animationDelay: '0.15s' }}>
                        <p style={{ fontSize: 14, color: '#ddd', textTransform: 'uppercase', letterSpacing: '0.1em', fontFamily: "'Monument', monospace", marginBottom: 24 }}>THE JOURNEY</p>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '16px', textAlign: 'center' }}>
                            {[
                                ['01', 'Foundation',    'Define your vision, challenges, and target outcome'],
                                ['02', 'Prioritise',     'Score initiatives by impact and ease'],
                                ['03', 'Checklist',      'Honest assessment of readiness'],
                                ['04', 'Canvas',         'Review and submit your work'],
                            ].map(([num, title, sub]) => (
                                <div key={num} style={{ border: '1px solid #333', padding: '28px 16px' }}>
                                    <p style={{ fontSize: '48px', fontWeight: 'bold', marginBottom: '12px', color: '#fff' }}>{num}</p>
                                    <p style={{ fontWeight: 600, marginBottom: '8px', fontSize: '15px', color: '#fff' }}>{title}</p>
                                    <p style={{ fontSize: '12px', color: '#ddd', lineHeight: 1.5 }}>{sub}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* How it works — no white box, all white text */}
                    <div className="animate-in" style={{ marginBottom: '48px', animationDelay: '0.2s' }}>
                        <p style={{ fontSize: 14, color: '#ddd', textTransform: 'uppercase', letterSpacing: '0.1em', fontFamily: "'Monument', monospace", marginBottom: 24 }}>HOW IT WORKS</p>
                        {[
                            ['Answer honestly', 'Each question unlocks the next. The tool guides you through a logical sequence — do not skip ahead.'],
                            ['AI Coach reviews', 'After each step, an AI coach will review your answers and challenge weak thinking. You can revise or proceed.'],
                            ['Between steps', 'Transition screens share a Brutal Truth, Peer Proof from other founders, and a Fast Track Insight to deepen your understanding.'],
                            ['Submit your canvas', 'At the end, review all your answers in one summary view. Download as PDF and submit for your guru\'s review.'],
                        ].map(([title, desc], i) => (
                            <div key={i} style={{ display: 'flex', gap: 20, marginBottom: 28 }}>
                                <span style={{ fontSize: 32, fontWeight: 'bold', color: '#fff', minWidth: 36, lineHeight: 1 }}>{i + 1}</span>
                                <div>
                                    <p style={{ fontWeight: 600, fontSize: 17, marginBottom: 4, color: '#fff' }}>{title}</p>
                                    <p style={{ fontSize: 14, color: '#ddd', lineHeight: 1.7 }}>{desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Mistakes to Avoid — red heading */}
                    <div className="animate-in" style={{ marginBottom: '48px', animationDelay: '0.3s' }}>
                        <p style={{ fontSize: 14, color: '#DC2626', textTransform: 'uppercase', letterSpacing: '0.1em', fontFamily: "'Monument', monospace", marginBottom: 24 }}>MISTAKES TO AVOID</p>
                        {[
                            'Rushing through the questions \u2014 give each step focused time. The quality of your output determines the quality of your execution.',
                            'Being vague \u2014 "grow revenue" is not a vision. "Become the #1 provider of X in Y market by Z date" is a vision.',
                            'Ignoring team input \u2014 this is a collaborative tool. Every voice in the room strengthens the definitions.',
                            'Choosing easy priorities over impactful ones \u2014 if a priority does not change your trajectory, replace it.',
                        ].map((item, i) => (
                            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', marginBottom: '20px', gap: 16 }}>
                                <span style={{ color: '#DC2626', fontSize: 14, fontFamily: "'Monument', monospace", marginTop: 3, flexShrink: 0 }}>{String(i+1).padStart(2,'0')}</span>
                                <p style={{ fontSize: '17px', lineHeight: 1.7, color: '#fff' }}>{item}</p>
                            </div>
                        ))}
                    </div>

                    <button onClick={onNext} style={{ width: '100%', padding: '24px', background: '#FFF469', color: '#000', border: 'none', fontSize: '20px', fontWeight: 600, cursor: 'pointer', letterSpacing: '0.03em', transition: 'opacity 0.2s', fontFamily: "'Riforma', sans-serif" }}>
                        LET'S START &rarr;
                    </button>
                </div>
            </div>
        );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
        const [step, setStep]               = useState(0);
        const [data, setData]               = useState(makeDefaultData());
        const [submitStatus, setSubmitStatus] = useState('idle');

        const totalSteps = CONFIG.TOTAL_STEPS;

        const updateData = useCallback((field, val) => {
            setData(prev => ({ ...prev, [field]: val }));
        }, []);

        const canProceed = () => {
            if (step === 1) {
                return (data.visionStatement || '').trim().length >= 20
                    && (data.currentChallenges || '').trim().length >= 20
                    && (data.targetOutcome || '').trim().length >= 20;
            }
            if (step === 2) {
                return data.priorities.filter(p => (p.name || '').trim() && p.impact > 0 && p.ease > 0).length >= 3;
            }
            if (step === 3) {
                const { checklist } = data;
                return ['q1','q2','q3','q4'].every(k => checklist[k] !== null);
            }
            return true;
        };

        const handleNext = () => {
            if (!canProceed()) return;
            setStep(step + 0.5);
        };

        const handleTransitionNext = () => {
            const next = Math.floor(step) + 1;
            if (Math.floor(step) === totalSteps) {
                setStep('canvas');
            } else {
                setStep(next);
            }
        };

        const handleBack = () => {
            if (step === 'canvas') { setStep(totalSteps); return; }
            if (step === 1) { setStep(0.5); return; }
            setStep(step - 1);
        };

        const handleSubmit = () => {
            setSubmitStatus('success');
        };

        const isWizardStep = Number.isInteger(step) && step >= 1 && step <= totalSteps;
        const isTransition = !Number.isInteger(step) && step > 0.5 && step !== 'canvas';

        return (
            <div className="tool-frame">
                {step === 0 && (
                    <div style={{ minHeight: '100vh', background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>
                        <div style={{ position: 'absolute', inset: 0, backgroundImage: `url(${CONFIG.COVER_IMAGE})`, backgroundSize: 'cover', backgroundPosition: 'center', opacity: 0.4 }} />
                        <div style={{ position: 'relative', textAlign: 'center', color: '#fff', padding: '0 32px' }} className="animate-in">
                            <h1 className="plaak" style={{ fontSize: 80, marginBottom: 16 }}>{CONFIG.TOOL_TITLE}</h1>
                            <p style={{ fontSize: 18, color: '#ddd', marginBottom: 48, maxWidth: 560, margin: '0 auto 48px' }}>{CONFIG.TOOL_SUBTITLE}</p>
                            <button onClick={() => setStep(0.5)}
                                style={{ background: '#fff', color: '#000', border: 'none', padding: '16px 48px', fontSize: 16, fontFamily: "'Monument', monospace", letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer', transition: 'all 0.2s' }}
                                onMouseOver={e => { e.target.style.background = '#FFF469'; }}
                                onMouseOut={e => { e.target.style.background = '#fff'; }}>
                                START
                            </button>
                        </div>
                    </div>
                )}

                {step === 0.5 && (
                    <IntroPage onNext={() => setStep(1)} />
                )}

                {isTransition && (
                    <TransitionScreen stepNum={Math.floor(step)} totalSteps={totalSteps} onNext={handleTransitionNext} />
                )}

                {(isWizardStep || step === 'canvas') && (
                    <div className="tool-inner">
                        <div className="wizard-layout">
                            <div className="wizard-main">
                                <MobileStepBar currentStep={typeof step === 'number' ? step : totalSteps + 1} totalSteps={totalSteps} />
                                <div style={{ flex: 1 }}>
                                    {step === 1 && <Step1 data={data} updateData={updateData} />}
                                    {step === 2 && <Step2 data={data} updateData={updateData} />}
                                    {step === 3 && <Step3 data={data} updateData={updateData} />}
                                    {step === 'canvas' && <CanvasStep data={data} submitStatus={submitStatus} />}
                                </div>
                                <div className="wizard-footer">
                                        <button className="btn-wiz-back" onClick={handleBack}>&larr; BACK</button>
                                        {step !== 'canvas' ? (
                                            <button className="btn-wiz-next" onClick={handleNext} disabled={!canProceed()}>
                                                NEXT &rarr;
                                            </button>
                                        ) : null}
                                        {step === 'canvas' && submitStatus === 'success' ? (
                                            <div style={{ color: '#16a34a', fontFamily: "'Monument', monospace", fontSize: 13, display: 'flex', alignItems: 'center', gap: 8, letterSpacing: '0.06em' }}>
                                                &#10003; Submitted successfully!
                                            </div>
                                        ) : step === 'canvas' ? (
                                            <button className="btn-wiz-next" onClick={handleSubmit}>
                                                SUBMIT ANSWERS &rarr;
                                            </button>
                                        ) : null}
                                    </div>
                            </div>
                            <WizardSidebar currentStep={step} data={data} />
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
