<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Reference | Fast Track Program</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @font-face { font-family: 'Plaak';    src: url('module-6-org-structure/Plaak3Trial-43-Bold.woff2') format('woff2'); font-weight: bold; }
    @font-face { font-family: 'Riforma';  src: url('module-6-org-structure/RiformaLL-Regular.woff2')   format('woff2'); font-weight: normal; }
    @font-face { font-family: 'Monument'; src: url('module-6-org-structure/MonumentGrotesk-Mono.woff2') format('woff2'); }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Riforma', -apple-system, sans-serif; font-size: 16px; color: #000; background: #000; -webkit-font-smoothing: antialiased; }

    .plaak   { font-family: 'Plaak', sans-serif; font-weight: bold; letter-spacing: -0.01em; line-height: 1.2; }
    .monument { font-family: 'Monument', monospace; letter-spacing: 0.05em; }

    .tool-frame { background: #fff; min-height: 100vh; }
    .tool-inner { background: #fff; min-height: 100vh; }

    .wizard-layout  { display: flex; min-height: 100vh; }
    .wizard-main    { flex: 1; display: flex; flex-direction: column; min-height: 100vh; background: #fff; padding: 0 48px; }
    .wizard-sidebar { width: 280px; background: #1a1a1a; min-height: 100vh; padding: 48px 32px; display: flex; flex-direction: column; position: sticky; top: 0; align-self: flex-start; height: 100vh; overflow-y: auto; }

    .step-content   { max-width: 100%; padding: 40px 0 24px; flex: 1; }
    .step-indicator { font-family: 'Monument', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 8px; }
    .opening-box    { margin-bottom: 32px; }
    .opening-box .step-heading { font-family: 'Plaak', sans-serif; font-size: 32px; color: #000; margin-bottom: 6px; }
    .opening-box .step-hint    { font-size: 14px; color: #666; line-height: 1.5; }

    .field-group    { margin-bottom: 28px; }
    .field-group:last-child { margin-bottom: 0; }
    .field-label    { font-weight: 600; font-size: 15px; color: #000; margin-bottom: 6px; display: block; }
    .field-sub      { font-size: 13px; color: #666; margin-bottom: 6px; line-height: 1.5; }
    .field-input    { border: 1px solid #E0E0E0; padding: 12px 16px; font-family: 'Riforma', sans-serif; font-size: 16px; width: 100%; color: #000; background: #fff; transition: border-color 0.2s; }
    .field-input:focus { outline: none; border-color: #000; }
    .field-textarea { border: 1px solid #E0E0E0; padding: 12px 16px; font-family: 'Riforma', sans-serif; font-size: 16px; width: 100%; min-height: 100px; resize: none !important; color: #000; background: #fff; transition: border-color 0.2s; }
    .field-textarea:focus { outline: none; border-color: #000; }
    .field-help     { font-size: 13px; color: #666; margin-top: 4px; }

    .field-split    { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    .wizard-footer  { display: flex; justify-content: space-between; align-items: center; padding: 24px 48px; border-top: 1px solid #e5e7eb; background: #fff; }
    .btn-wiz-back   { background: transparent; border: 2px solid #d1d5db; color: #6b7280; padding: 12px 28px; font-family: 'Monument', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-wiz-back:hover { border-color: #000; color: #000; }
    .btn-wiz-next   { background: #000; color: #fff; border: 2px solid #000; padding: 12px 36px; font-family: 'Monument', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-wiz-next:hover:not(:disabled) { background: #FFF469; color: #000; border-color: #FFF469; }
    .btn-wiz-next:disabled { background: #E0E0E0; color: #9CA3AF; border-color: #E0E0E0; cursor: not-allowed; }

    .sidebar-tool-num   { font-family: 'Monument', monospace; font-size: 11px; color: #999; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    .sidebar-tool-title { font-family: 'Plaak', sans-serif; font-size: 22px; color: #fff; margin-bottom: 32px; line-height: 1.1; }
    .sidebar-step       { padding: 10px 0; border-bottom: 1px solid #fff; display: flex; align-items: center; gap: 10px; }
    .sidebar-step:last-child { border-bottom: none; }
    .sidebar-step-dot   { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; transition: background 0.2s; }
    .sidebar-step-dot.active { background: #FFF469; }
    .sidebar-step-dot.done   { background: #4ade80; }
    .sidebar-step-label { font-family: 'Monument', monospace; font-size: 11px; letter-spacing: 0.08em; color: #777; text-transform: uppercase; transition: color 0.2s; }
    .sidebar-step-label.active { color: #FFF469; }
    .sidebar-step-label.done   { color: #4ade80; }

    .animate-in { animation: fadeSlideIn 0.4s ease both; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .canvas-split          { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .canvas-split > *      { min-width: 0; }

    .checklist-item { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid #F0F0F0; }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item-text { font-size: 15px; line-height: 1.5; flex: 1; }
    .checklist-toggle { display: flex; gap: 4px; flex-shrink: 0; }
    .checklist-btn { padding: 6px 16px; border: 2px solid #E0E0E0; background: #fff; font-family: 'Monument', monospace; font-size: 10px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; }
    .checklist-btn.selected-yes { background: #000; color: #FFF469; border-color: #000; }
    .checklist-btn.selected-no  { background: #DC2626; color: #fff; border-color: #DC2626; }

    .progress-bar-wrap { height: 4px; background: #333; margin-bottom: 0; border-radius: 2px; }
    .progress-bar-fill { height: 4px; background: #FFF469; transition: width 0.3s ease; border-radius: 2px; }

    .mobile-step-bar { display: none; }
    @media (max-width: 768px) {
        .wizard-sidebar { display: none; }
        .wizard-main { padding: 0 24px; }
        .mobile-step-bar { display: flex; align-items: center; gap: 8px; padding: 16px 24px; background: #1a1a1a; }
        .mobile-step-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.2s; }
        .mobile-step-dot.active { background: #FFF469; }
        .mobile-step-dot.done   { background: #4ade80; }
        .mobile-step-text { font-family: 'Monument', monospace; font-size: 11px; color: #fff; letter-spacing: 0.06em; margin-right: 8px; }
        .wizard-footer { padding: 16px 24px; }
        .field-split { grid-template-columns: 1fr; }
        .canvas-split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const CONFIG = {
        TOOL_SLUG: 'design-reference',
        TOOL_TITLE: 'DESIGN REFERENCE',
        TOOL_NUM: 'REF',
        TOTAL_STEPS: 4,
        COVER_IMAGE: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80',
        // Transition content is about the NEXT step (shown after current step completes)
        TRANSITION_CONTENT: {
            1: {
                completedTitle: 'Strategic Foundation Completed',
                nextTitle: 'MARKET CALCULATOR',
                nextDesc: 'Now that your vision is clear, it\'s time to put numbers behind it. You\'ll quantify your total addressable market and model growth scenarios.',
                brutalTruth: '"If you cannot quantify your market, you are guessing. And guessing is not a strategy — it is a hobby."',
                peerProof: '"We assumed our market was €50M. When we actually calculated it, it was €12M. That single number changed our entire go-to-market approach." — CEO, B2B SaaS, 28 employees',
            },
            2: {
                completedTitle: 'Market Calculator Completed',
                nextTitle: 'PRIORITY MATRIX',
                nextDesc: 'You have the numbers. Now decide what to focus on. You\'ll score initiatives by impact and ease to find your top 3 priorities.',
                brutalTruth: '"Prioritisation is not choosing what to do — it is choosing what to stop doing. If everything is important, nothing is."',
                peerProof: '"We had 23 initiatives running in parallel. After this exercise we cut to 5. Revenue grew 34% in the next quarter — not because we added anything, but because we finally focused." — COO, e-commerce, 85 employees',
            },
            3: {
                completedTitle: 'Priority Matrix Completed',
                nextTitle: 'SPRINT CHECKLIST',
                nextDesc: 'Priorities are ranked. Before you finish, confirm your team has genuinely completed each readiness checkpoint.',
                brutalTruth: '"A checklist without honesty is theatre. If you say yes to something your team has not genuinely completed, you are lying to yourself."',
                peerProof: '"The checklist was humbling. We answered NO to two items and it forced a conversation we had been avoiding for months. Best decision we made." — Founder, logistics startup',
            },
            4: {
                completedTitle: 'Sprint Checklist Completed',
                nextTitle: 'YOUR CANVAS',
                nextDesc: 'Everything is captured. Review your complete strategic output, download as PDF, and submit for your guru\'s review.',
                brutalTruth: '"The canvas is not a summary — it is a commitment. If you cannot stand behind every word on it, go back and fix it."',
                peerProof: '"Seeing all our answers in one place was the moment it clicked. The canvas became our team\'s north star for the quarter." — COO, fintech startup, 52 employees',
            },
        },
    };

    const SIDEBAR_STEPS = [
        { num: 1, label: 'Strategic Foundation' },
        { num: 2, label: 'Market Calculator' },
        { num: 3, label: 'Priority Matrix' },
        { num: 4, label: 'Sprint Checklist' },
    ];

    const fmt = (v) => {
        if (!v && v !== 0) return '—';
        return '€ ' + Math.round(v).toLocaleString('en-US');
    };
    const fmtPct = (v) => {
        if (v === null || v === undefined) return '—';
        return v.toFixed(1) + '%';
    };

    function makeDefaultData() {
        return {
            visionStatement: '',
            currentChallenges: '',
            targetOutcome: '',
            totalCustomers: '',
            avgRevenue: '',
            purchasesPerYear: '',
            grossMargin: '',
            priceIncrease: 0,
            volumeGrowth: 0,
            costReduction: 0,
            priorities: [
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
                { name: '', impact: 0, ease: 0 },
            ],
            checklist: { q1: null, q2: null, q3: null, q4: null },
        };
    }

    function priorityScore(p) {
        if (!p.impact || !p.ease) return 0;
        return (p.impact * 2) + p.ease;
    }

    // ── Sidebar ─────────────────────────────────────────────────────────────
    function WizardSidebar({ currentStep, data }) {
        const stepNum = typeof currentStep === 'number' ? currentStep : CONFIG.TOTAL_STEPS + 1;
        const pct = currentStep === 'canvas' ? 100 : Math.round((Math.min(stepNum, CONFIG.TOTAL_STEPS) / CONFIG.TOTAL_STEPS) * 100);
        return (
            <div className="wizard-sidebar">
                <div className="sidebar-tool-num">TOOL {CONFIG.TOOL_NUM}</div>
                <div className="sidebar-tool-title">{CONFIG.TOOL_TITLE}</div>
                {SIDEBAR_STEPS.map(s => {
                    const isActive = stepNum === s.num;
                    const isDone = stepNum > s.num || currentStep === 'canvas';
                    return (
                        <div className="sidebar-step" key={s.num}>
                            <div className={`sidebar-step-dot ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`} />
                            <span className={`sidebar-step-label ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`}>{s.label}</span>
                        </div>
                    );
                })}
                <div style={{ marginTop: 'auto', paddingTop: 24 }}>
                    <p style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#ddd', letterSpacing: '0.1em', marginBottom: 8 }}>PROGRESS</p>
                    <div className="progress-bar-wrap">
                        <div className="progress-bar-fill" style={{ width: `${pct}%` }} />
                    </div>
                    <p style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#FFF469', marginTop: 6, fontWeight: 'bold' }}>{pct}%</p>
                </div>
            </div>
        );
    }

    function MobileStepBar({ currentStep, totalSteps }) {
        return (
            <div className="mobile-step-bar">
                <span className="mobile-step-text">Step {currentStep}/{totalSteps}</span>
                {Array.from({ length: totalSteps }, (_, i) => (
                    <div key={i} className={`mobile-step-dot ${i + 1 === currentStep ? 'active' : ''} ${i + 1 < currentStep ? 'done' : ''}`} />
                ))}
            </div>
        );
    }

    // ── TransitionScreen — old centered style, about the NEXT section ─────
    function TransitionScreen({ stepNum, totalSteps, onNext }) {
        const t = CONFIG.TRANSITION_CONTENT[stepNum];
        if (!t) { onNext(); return null; }
        const pct = Math.round((stepNum / totalSteps) * 100);
        return (
            <div style={{ position: 'fixed', inset: 0, background: '#000', color: '#fff',
                          zIndex: 200, overflowY: 'auto', display: 'flex', alignItems: 'center',
                          justifyContent: 'center', padding: '64px 32px' }}>
                <div style={{ maxWidth: 720, width: '100%' }} className="animate-in">
                    {/* Progress bar */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 48 }}>
                        <div style={{ flex: 1, height: 4, background: '#333', borderRadius: 2 }}>
                            <div style={{ height: 4, background: '#FFF469', borderRadius: 2, width: `${pct}%`, transition: 'width 0.5s ease' }} />
                        </div>
                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 13, color: '#FFF469', fontWeight: 'bold', letterSpacing: '0.08em' }}>{pct}%</span>
                    </div>

                    {/* Completed header */}
                    <div style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#4ade80', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 40 }}>&#10003; {t.completedTitle}</div>

                    {/* Next section info */}
                    <p style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#FFF469', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 12 }}>NEXT UP</p>
                    <h2 className="plaak" style={{ fontSize: 48, marginBottom: 16 }}>{t.nextTitle}</h2>
                    <p style={{ fontSize: 17, color: '#ddd', lineHeight: 1.7, marginBottom: 40 }}>{t.nextDesc}</p>

                    {/* Brutal truth */}
                    <div style={{ borderLeft: '4px solid #DC2626', paddingLeft: 24, marginBottom: 32 }}>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#DC2626', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 10 }}>BRUTAL TRUTH</div>
                        <p style={{ fontSize: 16, lineHeight: 1.6 }}>{t.brutalTruth}</p>
                    </div>

                    {/* Peer proof */}
                    <div style={{ borderLeft: '4px solid #FFF469', paddingLeft: 24, marginBottom: 48 }}>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#FFF469', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 10 }}>PEER PROOF</div>
                        <p style={{ fontSize: 15, color: '#ddd', lineHeight: 1.7, fontStyle: 'italic' }}>{t.peerProof}</p>
                    </div>

                    <button onClick={onNext} className="plaak"
                        style={{ background: '#FFF469', color: '#000', border: 'none', padding: '18px 48px', fontSize: 18, cursor: 'pointer', letterSpacing: '0.05em', transition: 'all 0.2s' }}>
                        CONTINUE &rarr;
                    </button>
                </div>
            </div>
        );
    }

    // ── CoverIntro — split screen ─────────────────────────────────────────
    function CoverIntro({ onStart }) {
        const [expanded, setExpanded] = useState(null);
        const journeyItems = [
            { num: '01', title: 'Foundation', desc: 'Define your vision statement, identify current challenges, and set a clear 90-day target outcome. This becomes the anchor for everything else.' },
            { num: '02', title: 'Calculator', desc: 'Enter your core market data — customers, revenue, frequency, margin. The tool calculates your total market size and lets you model growth scenarios with sliders.' },
            { num: '03', title: 'Prioritise', desc: 'List your initiatives and score each by strategic impact and execution ease. The scoring matrix ranks your top 3 priorities objectively.' },
            { num: '04', title: 'Checklist', desc: 'Confirm your team has genuinely completed each readiness checkpoint before proceeding. Honesty here determines the quality of your guru review.' },
        ];

        return (
            <div style={{ display: 'flex', minHeight: '100vh', background: '#000', color: '#fff' }}>
                {/* LEFT — hero */}
                <div style={{ width: '45%', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', minHeight: '100vh' }}>
                    <div style={{ position: 'absolute', inset: 0, backgroundImage: `url(${CONFIG.COVER_IMAGE})`, backgroundSize: 'cover', backgroundPosition: 'center', opacity: 0.5 }} />
                    <div style={{ position: 'relative', zIndex: 1, padding: '48px 40px' }}>
                        <p style={{ fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.15em', color: '#ddd', textTransform: 'uppercase', marginBottom: 16 }}>TOOL {CONFIG.TOOL_NUM}</p>
                        <h1 className="plaak" style={{ fontSize: 96, lineHeight: 0.9, maxWidth: 420 }}>{CONFIG.TOOL_TITLE}</h1>
                    </div>
                </div>

                {/* RIGHT — scrollable content */}
                <div style={{ width: '55%', background: '#111', overflowY: 'auto', maxHeight: '100vh' }}>
                    <div style={{ padding: '48px 48px 40px' }}>
                        <p className="plaak animate-in" style={{ fontSize: 36, marginBottom: 32 }}>BEFORE WE START</p>

                        {/* Purpose quote */}
                        <div className="animate-in" style={{ borderLeft: '4px solid #FFF469', paddingLeft: 20, marginBottom: 36, animationDelay: '0.06s' }}>
                            <p style={{ fontSize: 18, fontStyle: 'italic', lineHeight: 1.6, marginBottom: 6 }}>
                                "Strategy without process is a daydream. Process without strategy is a nightmare."
                            </p>
                            <p style={{ fontSize: 13, color: '#ddd', fontFamily: "'Monument', monospace", letterSpacing: '0.06em' }}>&mdash; SUN TZU</p>
                        </div>

                        <p className="animate-in" style={{ fontSize: 15, lineHeight: 1.7, color: '#ddd', marginBottom: 40, animationDelay: '0.1s' }}>
                            4 steps. Each builds on the previous. At the end, a canvas summarising your strategic priorities — ready for your team and guru.
                        </p>

                        {/* THE JOURNEY — expandable boxes */}
                        <div className="animate-in" style={{ marginBottom: 36, animationDelay: '0.14s' }}>
                            <p className="plaak" style={{ fontSize: 28, marginBottom: 20 }}>THE JOURNEY</p>
                            {journeyItems.map((item, i) => (
                                <div key={item.num}
                                    style={{ border: '1px solid #333', marginBottom: 8, cursor: 'pointer', transition: 'border-color 0.2s' }}
                                    onClick={() => setExpanded(expanded === i ? null : i)}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                                            <span className="plaak" style={{ fontSize: 22, color: '#FFF469' }}>{item.num}</span>
                                            <span style={{ fontWeight: 600, fontSize: 15 }}>{item.title}</span>
                                        </div>
                                        <span style={{ color: '#ddd', fontSize: 18, transition: 'transform 0.2s', transform: expanded === i ? 'rotate(45deg)' : 'none' }}>+</span>
                                    </div>
                                    {expanded === i && (
                                        <div style={{ padding: '0 20px 16px 56px' }} className="animate-in">
                                            <p style={{ fontSize: 14, color: '#ddd', lineHeight: 1.7 }}>{item.desc}</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* HOW IT WORKS — no numbers */}
                        <div className="animate-in" style={{ marginBottom: 36, animationDelay: '0.18s' }}>
                            <p className="plaak" style={{ fontSize: 28, marginBottom: 20 }}>HOW IT WORKS</p>
                            {[
                                ['Answer honestly', 'Each question unlocks the next. Do not skip ahead.'],
                                ['AI Coach reviews', 'After each step, an AI coach challenges weak thinking.'],
                                ['Transition screens', 'Brutal Truth + Peer Proof deepen your understanding.'],
                                ['Submit your canvas', 'Review all answers in one view. Download as PDF.'],
                            ].map(([title, desc], i) => (
                                <div key={i} style={{ marginBottom: 16 }}>
                                    <p style={{ fontWeight: 600, fontSize: 14, marginBottom: 2 }}>{title}</p>
                                    <p style={{ fontSize: 13, color: '#ddd', lineHeight: 1.6 }}>{desc}</p>
                                </div>
                            ))}
                        </div>

                        {/* MISTAKES TO AVOID */}
                        <div className="animate-in" style={{ marginBottom: 36, animationDelay: '0.22s' }}>
                            <p className="plaak" style={{ fontSize: 28, color: '#DC2626', marginBottom: 20 }}>MISTAKES TO AVOID</p>
                            {[
                                'Rushing through — the quality of your output determines execution quality.',
                                'Being vague — "grow revenue" is not a vision. Be specific.',
                                'Ignoring team input — every voice strengthens the definitions.',
                                'Choosing easy over impactful — if it doesn\'t change your trajectory, replace it.',
                            ].map((item, i) => (
                                <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
                                    <span style={{ color: '#DC2626', fontSize: 14, marginTop: 1, flexShrink: 0 }}>&bull;</span>
                                    <p style={{ fontSize: 14, lineHeight: 1.6 }}>{item}</p>
                                </div>
                            ))}
                        </div>

                        <button onClick={onStart} className="animate-in plaak"
                            style={{ width: '100%', padding: '20px', background: '#FFF469', color: '#000', border: 'none', fontSize: 20, cursor: 'pointer', letterSpacing: '0.03em', transition: 'opacity 0.2s', animationDelay: '0.28s' }}>
                            START &rarr;
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    // ── NumField + Lever — stable components ──────────────────────────────
    function NumField({ label, hint, field, prefix, suffix, max, value, onChange }) {
        return (
            <div className="field-group">
                <label className="field-label">{label}</label>
                {hint && <p className="field-sub">{hint}</p>}
                <div style={{ position: 'relative' }}>
                    {prefix && <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', color: '#999', fontSize: 15, pointerEvents: 'none' }}>{prefix}</span>}
                    <input type="number" className="field-input"
                        style={{ paddingLeft: prefix ? 32 : 16, paddingRight: suffix ? 36 : 16 }}
                        value={value}
                        onChange={e => onChange(field, e.target.value)}
                        placeholder="0"
                        min="0"
                        max={max}
                    />
                    {suffix && <span style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)', color: '#999', fontSize: 15, pointerEvents: 'none' }}>{suffix}</span>}
                </div>
            </div>
        );
    }

    function Lever({ label, field, unit, min, max, step, value, onChange }) {
        return (
            <div style={{ marginBottom: 20 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                    <span style={{ fontSize: 14, fontWeight: 600 }}>{label}</span>
                    <span style={{ fontFamily: "'Monument', monospace", fontSize: 13, color: '#000', fontWeight: 'bold' }}>
                        {value > 0 ? '+' : ''}{value}{unit}
                    </span>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                    onChange={e => onChange(field, parseFloat(e.target.value))}
                    style={{ width: '100%', accentColor: '#000', height: 4, cursor: 'pointer' }}
                />
            </div>
        );
    }

    function RatingBtn({ label, value, selected, color, onClick }) {
        return (
            <button onClick={onClick} style={{
                padding: '6px 14px',
                border: `2px solid ${selected ? color : '#E0E0E0'}`,

                fontSize: 11,
                letterSpacing: '0.05em',
                cursor: 'pointer',
                transition: 'all 0.15s',

                whiteSpace: 'nowrap',
            }}>{label}</button>

    }

    // ── STEP 1: Strategic Foundation — progressive reveal, NO closing box ─
    function Step1({ data, updateData }) {
        const visionDone = (data.visionStatement || '').trim().length >= 20;
        const challengesDone = (data.currentChallenges || '').trim().length >= 20;
        return (
            <div className="step-content animate-in">
                <p className="step-indicator">STEP 1 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Strategic Foundation</h1>
                    <p className="step-hint">Define your strategic direction. Each question unlocks the next.</p>

                    <textarea className="field-textarea" style={{ minHeight: 120 }}
                        value={data.visionStatement}

                    <div className="field-group animate-in" style={{ marginTop: 32 }}>

                        <p className="field-sub">What is blocking progress right now? Be honest about the obstacles.</p>
                        <textarea className="field-textarea"
                            value={data.currentChallenges}
                            onChange={e => updateData('currentChallenges', e.target.value)}
                            placeholder="e.g. Slow decision-making, unclear priorities across departments..."
                            maxLength={400}
                        />
                        <p className="field-help">{(data.currentChallenges || '').length}/400</p>
                    </div>
                )}

                {visionDone && challengesDone && (
                    <div className="field-group animate-in" style={{ marginTop: 32 }}>
                        <label className="field-label">Target Outcome</label>
                        <p className="field-sub">What does success look like in 90 days?</p>
                        <textarea className="field-textarea"
                            value={data.targetOutcome}
                            onChange={e => updateData('targetOutcome', e.target.value)}
                            placeholder="e.g. Clear strategic priorities communicated to all teams, 3 key initiatives launched..."
                            maxLength={400}
                        />
                        <p className="field-help">{(data.targetOutcome || '').length}/400</p>
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 2: Market Calculator — inputs then results, growth on sub-step
    function Step2({ data, updateData, subStep, setSubStep }) {
        const customers = parseFloat(data.totalCustomers) || 0;
        const avgRev = parseFloat(data.avgRevenue) || 0;
        const purchases = parseFloat(data.purchasesPerYear) || 0;
        const margin = parseFloat(data.grossMargin) || 0;
        const marketSize = customers * avgRev * purchases;
        const profitPool = marketSize * (margin / 100);
        const hasCalc = customers > 0 && avgRev > 0 && purchases > 0 && margin > 0;

        const priceImpact = marketSize * (data.priceIncrease / 100);
        const volumeImpact = marketSize * (data.volumeGrowth / 100);
        const costSavings = (marketSize - profitPool) * (data.costReduction / 100);
        const newRevenue = marketSize + priceImpact + volumeImpact;
        const newProfit = profitPool + priceImpact + volumeImpact + costSavings;

        // Sub-step 0 = inputs + result, sub-step 1 = growth scenario
        if (subStep === 1) {
            return (
                <div className="step-content animate-in" key="growth">
                    <p className="step-indicator">STEP 2 OF {CONFIG.TOTAL_STEPS} — GROWTH SCENARIO</p>
                    <div className="opening-box">
                        <h1 className="step-heading">Growth Scenario</h1>
                        <p className="step-hint">Use the sliders to model what-if scenarios. See how price, volume, and cost changes impact your revenue and profit.</p>
                    </div>

                    {/* Current numbers reminder — same size as inputs section */}
                    <div style={{ background: '#F9F9F9', padding: '24px 28px', marginBottom: 28, display: 'flex', gap: 48, flexWrap: 'wrap' }}>
                        <div style={{ flex: 1 }}>
                            <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', letterSpacing: '0.08em' }}>MARKET SIZE</span>
                            <p className="plaak" style={{ fontSize: 48 }}>{fmt(marketSize)}</p>
                        </div>
                        <div style={{ flex: 1 }}>
                            <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', letterSpacing: '0.08em' }}>PROFIT POOL</span>
                            <p className="plaak" style={{ fontSize: 48 }}>{fmt(profitPool)}</p>
                        </div>
                    </div>

                    <Lever label="Price Increase" field="priceIncrease" unit="%" min={0} max={20} step={0.5} value={data.priceIncrease} onChange={updateData} />
                    <Lever label="Volume Growth" field="volumeGrowth" unit="%" min={0} max={50} step={1} value={data.volumeGrowth} onChange={updateData} />
                    <Lever label="Cost Reduction" field="costReduction" unit="%" min={0} max={30} step={0.5} value={data.costReduction} onChange={updateData} />

                    {(data.priceIncrease > 0 || data.volumeGrowth > 0 || data.costReduction > 0) && (
                        <div className="animate-in" style={{ border: '2px solid #000', marginTop: 28 }}>
                            <div style={{ background: '#000', color: '#fff', padding: '14px 24px' }}>
                                <span style={{ fontFamily: "'Monument', monospace", fontSize: 11, letterSpacing: '0.1em' }}>SCENARIO IMPACT</span>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 0 }}>
                                {[
                                    { label: 'CURRENT', val: fmt(marketSize) },
                                    { label: 'NEW REVENUE', val: fmt(newRevenue) },
                                    { label: 'CHANGE', val: '+' + fmt(newRevenue - marketSize), color: '#16a34a' },
                                ].map((item, i) => (
                                    <div key={i} style={{ padding: '20px 24px', borderRight: i < 2 ? '1px solid #E0E0E0' : 'none' }}>
                                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', letterSpacing: '0.1em', marginBottom: 8 }}>{item.label}</div>
                                        <p className="plaak" style={{ fontSize: 36, color: item.color || '#000' }}>{item.val}</p>
                                    </div>
                                ))}
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 0, borderTop: '1px solid #E0E0E0' }}>
                                {[
                                    { label: 'CURRENT PROFIT', val: fmt(profitPool) },
                                    { label: 'NEW PROFIT', val: fmt(newProfit) },
                                    { label: 'ADDITIONAL', val: '+' + fmt(newProfit - profitPool), color: '#16a34a' },
                                ].map((item, i) => (
                                    <div key={i} style={{ padding: '20px 24px', borderRight: i < 2 ? '1px solid #E0E0E0' : 'none' }}>
                                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', letterSpacing: '0.1em', marginBottom: 8 }}>{item.label}</div>
                                        <p className="plaak" style={{ fontSize: 36, color: item.color || '#000' }}>{item.val}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        return (
            <div className="step-content animate-in" key="inputs">
                <p className="step-indicator">STEP 2 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Market Calculator</h1>
                    <p className="step-hint">Enter your core market data. The tool calculates your total market size in real time.</p>
                </div>

                <div className="field-split">
                    <NumField label="Total Customers" hint="Total addressable customers in your market" field="totalCustomers" value={data.totalCustomers} onChange={updateData} />
                    <NumField label="Avg Revenue per Customer" hint="Annual revenue per customer" field="avgRevenue" prefix="€" value={data.avgRevenue} onChange={updateData} />
                </div>
                <div className="field-split">
                    <NumField label="Purchases per Year" hint="Average transactions per customer annually" field="purchasesPerYear" value={data.purchasesPerYear} onChange={updateData} />
                    <NumField label="Gross Margin" hint="Your gross profit margin" field="grossMargin" suffix="%" max="100" value={data.grossMargin} onChange={updateData} />
                </div>

                {hasCalc && (
                    <div className="animate-in" style={{ background: '#000', color: '#fff', padding: '40px 36px', marginBottom: 28 }}>
                        {/* Market Size + Profit Pool side by side, each with formula underneath */}
                        <div style={{ display: 'flex', gap: 48 }}>
                            <div style={{ flex: 1 }}>
                                <p style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#FFF469', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 12 }}>[ TOTAL MARKET SIZE ]</p>
                                <p className="plaak" style={{ fontSize: 48, color: '#fff', lineHeight: 1, marginBottom: 16 }}>{fmt(marketSize)}</p>
                                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, flexWrap: 'wrap' }}>
                                    <span className="plaak" style={{ fontSize: 24, color: '#fff' }}>{customers.toLocaleString()}</span>
                                    <span style={{ fontSize: 12, color: '#ddd' }}>customers</span>
                                    <span className="plaak" style={{ fontSize: 24, color: '#FFF469' }}>&times;</span>
                                    <span className="plaak" style={{ fontSize: 24, color: '#fff' }}>{fmt(avgRev)}</span>
                                    <span style={{ fontSize: 12, color: '#ddd' }}>avg</span>
                                    <span className="plaak" style={{ fontSize: 24, color: '#FFF469' }}>&times;</span>
                                    <span className="plaak" style={{ fontSize: 24, color: '#fff' }}>{purchases}</span>
                                    <span style={{ fontSize: 12, color: '#ddd' }}>purchases/yr</span>
                                </div>
                            </div>
                            <div style={{ flex: 1 }}>
                                <p style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#FFF469', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 12 }}>[ PROFIT POOL ]</p>
                                <p className="plaak" style={{ fontSize: 48, color: '#FFF469', lineHeight: 1, marginBottom: 16 }}>{fmt(profitPool)}</p>
                                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, flexWrap: 'wrap' }}>
                                    <span className="plaak" style={{ fontSize: 24, color: '#FFF469' }}>{fmt(marketSize)}</span>
                                    <span style={{ fontSize: 12, color: '#ddd' }}>market size</span>
                                    <span className="plaak" style={{ fontSize: 24, color: '#FFF469' }}>&times;</span>
                                    <span className="plaak" style={{ fontSize: 24, color: '#FFF469' }}>{fmtPct(margin)}</span>
                                    <span style={{ fontSize: 12, color: '#ddd' }}>margin</span>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 3: Priority Matrix — NO closing box ─────────────────────────
    function Step3({ data, updateData }) {
        const priorities = data.priorities;
        const filled = priorities.filter(p => (p.name || '').trim()).length;
        const allScored = priorities.filter(p => (p.name || '').trim() && p.impact > 0 && p.ease > 0).length;
        const allFilled = filled >= 5;

        const updatePriority = (idx, field, val) => {
            const next = priorities.map((p, i) => i === idx ? { ...p, [field]: val } : p);
            updateData('priorities', next);
        };
        const addRow = () => {
            if (priorities.length < 10) updateData('priorities', [...priorities, { name: '', impact: 0, ease: 0 }]);
        };
        const removeRow = (idx) => {
            if (priorities.length <= 3) return;
            updateData('priorities', priorities.filter((_, i) => i !== idx));
        };

        const IMPACT_OPTS = [
            { label: 'Low',  val: 1, color: '#DC2626' },
            { label: 'Med',  val: 2, color: '#f59e0b' },
            { label: 'High', val: 3, color: '#22c55e' },
        ];
        const EASE_OPTS = [
            { label: 'Hard', val: 1, color: '#DC2626' },
            { label: 'Med',  val: 2, color: '#f59e0b' },
            { label: 'Easy', val: 3, color: '#22c55e' },
        ];

        const scored = priorities
            .map((p, i) => ({ ...p, idx: i, score: priorityScore(p) }))
            .filter(p => (p.name || '').trim())
            .sort((a, b) => b.score - a.score);

        return (
            <div className="step-content animate-in">
                <p className="step-indicator">STEP 3 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Priority Matrix</h1>
                    <p className="step-hint">List your initiatives, then rate each by impact and ease. Score = (Impact &times; 2) + Ease. Max: 9.</p>
                </div>

                {priorities.map((p, idx) => {
                    const score = priorityScore(p);
                    const isTop3 = (p.name || '').trim() && scored.findIndex(s => s.idx === idx) < 3;
                    return (
                        <div key={idx} style={{
                            marginBottom: 16, padding: '20px 24px',
                            background: isTop3 ? '#FFFDE7' : '#fff',
                            border: `2px solid ${isTop3 ? '#FFF469' : '#E0E0E0'}`,
                            transition: 'all 0.2s',
                        }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: (p.name || '').trim() ? 12 : 0 }}>
                                <span className="plaak" style={{ fontSize: 20, color: '#000', minWidth: 28 }}>{String(idx+1).padStart(2,'0')}</span>
                                <input type="text" className="field-input" style={{ padding: '10px 14px', fontSize: 15, flex: 1 }}
                                    value={p.name}
                                    onChange={e => updatePriority(idx, 'name', e.target.value)}
                                    placeholder={idx === 0 ? 'e.g. Launch new product line' : idx === 1 ? 'e.g. Hire senior developer' : 'Add an initiative...'}
                                />
                                <div style={{
                                    fontFamily: "'Plaak', sans-serif", fontSize: 24, fontWeight: 'bold',
                                    color: score >= 7 ? '#000' : score >= 5 ? '#000' : score > 0 ? '#666' : '#ddd',
                                    background: score >= 7 ? '#FFF469' : score >= 5 ? '#F0F0F0' : 'transparent',
                                    padding: '4px 12px', minWidth: 52, textAlign: 'center', transition: 'all 0.2s',
                                }}>{score > 0 ? score : '\u2014'}</div>
                                <button onClick={() => removeRow(idx)} disabled={priorities.length <= 3}
                                    style={{ background: 'transparent', border: 'none', fontSize: 20, color: '#ccc', cursor: priorities.length <= 3 ? 'not-allowed' : 'pointer', opacity: priorities.length <= 3 ? 0.3 : 1 }}>&times;</button>
                            </div>
                            {(p.name || '').trim() && (
                                <div style={{ display: 'flex', alignItems: 'center', gap: 24, paddingLeft: 40 }} className="animate-in">
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', textTransform: 'uppercase', letterSpacing: '0.08em', minWidth: 50 }}>Impact</span>
                                        <div style={{ display: 'flex', gap: 4 }}>
                                            {IMPACT_OPTS.map(o => (
                                                <RatingBtn key={o.val} label={o.label} value={o.val} selected={p.impact === o.val} color={o.color}
                                                    onClick={() => updatePriority(idx, 'impact', o.val)} />
                                            ))}
                                        </div>
                                    </div>
                                    <div style={{ width: 1, height: 24, background: '#E0E0E0', flexShrink: 0 }}></div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', textTransform: 'uppercase', letterSpacing: '0.08em', minWidth: 50 }}>Ease</span>
                                        <div style={{ display: 'flex', gap: 4 }}>
                                            {EASE_OPTS.map(o => (
                                                <RatingBtn key={o.val} label={o.label} value={o.val} selected={p.ease === o.val} color={o.color}
                                                    onClick={() => updatePriority(idx, 'ease', o.val)} />
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                })}

                {priorities.length < 10 && (
                    <button onClick={addRow} style={{ marginTop: 4, background: 'transparent', border: '2px dashed #E0E0E0', padding: '12px 24px', fontFamily: "'Monument', monospace", fontSize: 11, color: '#999', cursor: 'pointer', letterSpacing: '0.06em', transition: 'all 0.2s', width: '100%' }}
                        onMouseOver={e => { e.target.style.borderColor = '#000'; e.target.style.color = '#000'; }}
                        onMouseOut={e => { e.target.style.borderColor = '#E0E0E0'; e.target.style.color = '#999'; }}>
                        + Add Initiative
                    </button>
                )}

                {allFilled && allScored >= 3 && (
                    <div style={{ marginTop: 24, border: '2px solid #000', padding: 20 }} className="animate-in">
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 11, color: '#000', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 16, fontWeight: 'bold' }}>TOP 3 BY SCORE</div>
                        {scored.slice(0, 3).map((p, rank) => (
                            <div key={rank} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '10px 0', borderBottom: rank < 2 ? '1px solid #F0F0F0' : 'none' }}>
                                <span className="plaak" style={{ fontSize: 24, color: '#000' }}>{rank+1}</span>
                                <span style={{ fontSize: 15, flex: 1, fontWeight: 600 }}>{p.name}</span>
                                <span className="plaak" style={{ fontSize: 20, color: '#000' }}>{p.score}</span>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // ── STEP 4: Sprint Checklist — yellow bg, Riforma numbers, specific fix instructions
    function Step4({ data, updateData }) {
        const { checklist } = data;
        const questions = [
            { key: 'q1', text: 'We have a clearly articulated vision statement that the entire team can recite.', fix: 'Go back to Step 1 and sharpen your vision statement until every team member can repeat it.' },
            { key: 'q2', text: 'Our top priorities are ranked by impact and ease, not by who shouted loudest.', fix: 'Revisit Step 3 and re-score your priorities using only the Impact × 2 + Ease formula.' },
            { key: 'q3', text: 'Every initiative has a named owner and a measurable 90-day target.', fix: 'Assign a specific person and a concrete 90-day metric to each of your top 3 priorities.' },
            { key: 'q4', text: 'We have identified what we will STOP doing to make room for the top priorities.', fix: 'List at least 2 current activities or projects you will stop or pause to free up capacity.' },
        ];
        const noItems = questions.filter(q => checklist[q.key] === false);
        const allAnswered = questions.every(q => checklist[q.key] !== null);
        const setAnswer = (key, val) => updateData('checklist', { ...checklist, [key]: val });

        return (
            <div className="step-content animate-in" style={{ paddingBottom: 0 }}>
                <p className="step-indicator">STEP 4 OF {CONFIG.TOTAL_STEPS}</p>
                <div className="opening-box">
                    <h1 className="step-heading">Sprint Checklist</h1>
                    <p className="step-hint">Confirm your team has genuinely completed each item. Be honest — partial credit is worse than no credit.</p>
                </div>

                <div style={{ background: '#FFF469', padding: '24px 28px' }}>
                    {questions.map((q, i) => (
                        <div key={q.key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, padding: '16px 0', borderBottom: i < questions.length - 1 ? '1px solid rgba(0,0,0,0.1)' : 'none' }}>
                            <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start', flex: 1 }}>
                                <span style={{ fontSize: 28, fontWeight: 700, color: '#000', marginTop: -2, minWidth: 36, fontFamily: "'Riforma', sans-serif" }}>{String(i+1).padStart(2,'0')}</span>
                                <p style={{ fontSize: 15, lineHeight: 1.5 }}>{q.text}</p>
                            </div>
                            <div className="checklist-toggle">
                                <button className={`checklist-btn ${checklist[q.key] === true ? 'selected-yes' : ''}`}
                                    onClick={() => setAnswer(q.key, true)}>YES</button>
                                <button className={`checklist-btn ${checklist[q.key] === false ? 'selected-no' : ''}`}
                                    onClick={() => setAnswer(q.key, false)}>NO</button>
                            </div>
                        </div>
                    ))}
                </div>

                {/* Specific fix instructions for NO items */}
                {allAnswered && noItems.length > 0 && (
                    <div style={{ background: '#FEF2F2', borderLeft: '4px solid #DC2626', padding: '16px 20px', marginTop: 16 }}>
                        <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 8, color: '#DC2626' }}>Action required before continuing:</p>
                        {noItems.map(q => (
                            <div key={q.key} style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                                <span style={{ color: '#DC2626', flexShrink: 0 }}>&bull;</span>
                                <p style={{ fontSize: 14, color: '#333', lineHeight: 1.6 }}>{q.fix}</p>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // ── Canvas Step ───────────────────────────────────────────────────────
    function CanvasStep({ data }) {
        const [caseStudyOpen, setCaseStudyOpen] = useState(false);
        const scored = data.priorities
            .filter(p => (p.name || '').trim())
            .map(p => ({ ...p, score: priorityScore(p) }))
            .sort((a, b) => b.score - a.score);

        const customers = parseFloat(data.totalCustomers) || 0;
        const avgRev = parseFloat(data.avgRevenue) || 0;
        const purchases = parseFloat(data.purchasesPerYear) || 0;
        const margin = parseFloat(data.grossMargin) || 0;
        const marketSize = customers * avgRev * purchases;
        const profitPool = marketSize * (margin / 100);
        const hasMarket = marketSize > 0;

        const checkQuestions = [
            'Vision statement the team can recite',
            'Priorities ranked by impact and ease',
            'Named owner + 90-day target per initiative',
            'Identified what to STOP doing',
        ];

        return (
            <div className="step-content animate-in">
                <p className="step-indicator">CANVAS</p>
                <div className="opening-box">
                    <h1 className="step-heading">Your Canvas</h1>
                    <p className="step-hint">Review your complete output, then submit.</p>
                </div>

                {/* Unified canvas block — no white gaps, grey dividers */}
                <div style={{ border: '1px solid #E0E0E0' }}>
                    {/* Vision */}
                    <div style={{ padding: '24px 28px', borderBottom: '1px solid #E0E0E0' }}>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#000', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 10 }}>YOUR VISION</div>
                        <p className="plaak" style={{ fontSize: 28, lineHeight: 1.4, color: '#000' }}>{data.visionStatement || '—'}</p>
                    </div>

                    {/* Challenges + Outcome */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', borderBottom: '1px solid #E0E0E0' }}>
                        <div style={{ padding: '20px 24px', borderRight: '1px solid #E0E0E0' }}>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#DC2626', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>CHALLENGES</div>
                            <p style={{ fontSize: 14, lineHeight: 1.6, color: '#333' }}>{data.currentChallenges || '—'}</p>
                        </div>
                        <div style={{ padding: '20px 24px' }}>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#16a34a', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>TARGET OUTCOME</div>
                            <p style={{ fontSize: 14, lineHeight: 1.6, color: '#333' }}>{data.targetOutcome || '—'}</p>
                        </div>
                    </div>

                    {/* Market data */}
                    {hasMarket && (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', borderBottom: '1px solid #E0E0E0' }}>
                            <div style={{ padding: '20px 24px', borderRight: '1px solid #E0E0E0' }}>
                                <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#000', letterSpacing: '0.1em', marginBottom: 8 }}>MARKET SIZE</div>
                                <p className="plaak" style={{ fontSize: 36, color: '#000' }}>{fmt(marketSize)}</p>
                            </div>
                            <div style={{ padding: '20px 24px' }}>
                                <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#000', letterSpacing: '0.1em', marginBottom: 8 }}>PROFIT POOL</div>
                                <p className="plaak" style={{ fontSize: 36, color: '#000' }}>{fmt(profitPool)}</p>
                            </div>
                        </div>
                    )}

                    {/* Top priorities */}
                    {scored.length > 0 && (
                        <div style={{ borderBottom: '1px solid #E0E0E0' }}>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 'bold', padding: '16px 24px 0' }}>TOP PRIORITIES</div>
                            {scored.slice(0, 5).map((p, i) => (
                                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '14px 24px', borderTop: '1px solid #E0E0E0', marginTop: i === 0 ? 8 : 0 }}>
                                    <span className="plaak" style={{ fontSize: 32, color: '#000', minWidth: 36 }}>{i + 1}</span>
                                    <span style={{ fontSize: 16, flex: 1 }}>{p.name}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Readiness check */}
                    <div>
                        <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 'bold', padding: '16px 24px 0' }}>READINESS CHECK</div>
                        {['q1', 'q2', 'q3', 'q4'].map((key, i) => (
                            <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 24px', borderTop: '1px solid #E0E0E0', marginTop: i === 0 ? 8 : 0 }}>
                                <span style={{
                                    width: 20, height: 20, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 'bold', flexShrink: 0,
                                    background: data.checklist[key] === true ? '#000' : data.checklist[key] === false ? '#DC2626' : '#E0E0E0',
                                    color: data.checklist[key] === null ? '#999' : '#fff',
                                }}>{data.checklist[key] === true ? '\u2713' : data.checklist[key] === false ? '\u2717' : '\u2014'}</span>
                                <span style={{ fontSize: 14, color: '#333' }}>{checkQuestions[i]}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Case study — expandable */}
                <div style={{ border: '1px solid #E0E0E0', marginBottom: 16 }}>
                    <div onClick={() => setCaseStudyOpen(!caseStudyOpen)}
                        style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 20px', cursor: 'pointer', background: '#F9F9F9' }}>
                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 'bold' }}>CASE STUDY</span>
                        <span style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#000', letterSpacing: '0.06em' }}>{caseStudyOpen ? 'CLOSE' : 'VIEW CASE STUDY'}</span>
                    </div>
                    {caseStudyOpen && (
                        <div style={{ padding: '16px 20px' }} className="animate-in">
                            <p style={{ fontSize: 14, lineHeight: 1.8, color: '#555' }}>
                            <div style={{ fontFamily: "'Monument', monospace", fontSize: 10, color: '#666', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>LUXOTICA GROUP — EYEWEAR INDUSTRY</div>
                            <p style={{ fontSize: 15, lineHeight: 1.8, color: '#333', marginBottom: 16 }}>
                                When Luxottica's CEO Andrea Guerra took over in 2004, the company had a clear vision but fragmented priorities. They were the world's largest eyewear manufacturer, yet their market share was only 12% of a $65B global market.
                            </p>
                            <p style={{ fontSize: 15, lineHeight: 1.8, color: '#333', marginBottom: 16 }}>
                                Guerra used a simple framework: score every growth initiative by strategic impact (how much market share it could capture) and execution ease (how quickly it could be done with existing resources). Three priorities surfaced clearly:
                            </p>
                            <div style={{ background: '#F9F9F9', padding: '16px 20px', marginBottom: 16 }}>
                                <div style={{ display: 'flex', gap: 12, marginBottom: 8 }}>
                                    <span className="plaak" style={{ fontSize: 20, minWidth: 24 }}>1</span>
                                    <p style={{ fontSize: 14, color: '#333' }}><strong>Vertical integration</strong> — acquire retail chains (LensCrafters, Sunglass Hut) to control the full value chain. Impact: 9. Ease: 6. Score: 24.</p>
                                </div>
                                <div style={{ display: 'flex', gap: 12, marginBottom: 8 }}>
                                    <span className="plaak" style={{ fontSize: 20, minWidth: 24 }}>2</span>
                                    <p style={{ fontSize: 14, color: '#333' }}><strong>License premium brands</strong> — sign Chanel, Prada, Dolce & Gabbana. Impact: 8. Ease: 7. Score: 23.</p>
                                </div>
                                <div style={{ display: 'flex', gap: 12 }}>
                                    <span className="plaak" style={{ fontSize: 20, minWidth: 24 }}>3</span>
                                    <p style={{ fontSize: 14, color: '#333' }}><strong>Expand insurance partnerships</strong> — integrate EyeMed into the retail experience. Impact: 7. Ease: 8. Score: 22.</p>
                                </div>
                            </div>
                            <p style={{ fontSize: 15, lineHeight: 1.8, color: '#333', marginBottom: 16 }}>
                                By 2014, Luxottica's market share had grown from 12% to over 25%, and revenue tripled from $4.2B to $10.5B. The key was not doing more — it was doing only 3 things extremely well.
                            </p>
                            <div style={{ borderLeft: '4px solid #FFF469', paddingLeft: 16, marginTop: 16 }}>
                                <p style={{ fontSize: 14, fontStyle: 'italic', color: '#555', lineHeight: 1.6 }}>
                                    "The hardest part was saying no to everything else. We had 40 initiatives on the board. We killed 37 of them. That's when the company started moving." — Andrea Guerra, CEO Luxottica (2004-2014)
                                </p>
                            </div>
                            </p>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ── Success Page ──────────────────────────────────────────────────────
    function SuccessPage() {
        return (
            <div style={{ minHeight: '100vh', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ textAlign: 'center', maxWidth: 480, padding: '0 32px' }} className="animate-in">
                    <div style={{ width: 80, height: 80, borderRadius: '50%', background: '#16a34a', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 24px' }}>
                        <span style={{ color: '#fff', fontSize: 36 }}>&#10003;</span>
                    </div>
                    <h1 className="plaak" style={{ fontSize: 40, marginBottom: 12 }}>SUBMISSION COMPLETE</h1>
                    <p style={{ fontSize: 16, color: '#666', lineHeight: 1.7, marginBottom: 32 }}>
                        Your answers have been saved. Your guru will review them before your next session.
                    </p>
                    <div style={{ background: '#F9F9F9', padding: '20px 24px', textAlign: 'left', marginBottom: 32 }}>
                        <p style={{ fontFamily: "'Monument', monospace", fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#666', marginBottom: 12 }}>WHAT'S NEXT</p>
                        <div style={{ display: 'flex', gap: 12, marginBottom: 12 }}>
                            <span style={{ fontWeight: 700, minWidth: 20 }}>1</span>
                            <p style={{ fontSize: 14, color: '#333', lineHeight: 1.6 }}>Download your canvas as PDF and share it with your team.</p>
                        </div>
                        <div style={{ display: 'flex', gap: 12, marginBottom: 12 }}>
                            <span style={{ fontWeight: 700, minWidth: 20 }}>2</span>
                            <p style={{ fontSize: 14, color: '#333', lineHeight: 1.6 }}>Continue to the next sprint section when it unlocks.</p>
                        </div>
                        <div style={{ display: 'flex', gap: 12 }}>
                            <span style={{ fontWeight: 700, minWidth: 20 }}>3</span>
                            <p style={{ fontSize: 14, color: '#333', lineHeight: 1.6 }}>Prepare for your guru meeting — they will review your answers and challenge your thinking.</p>
                        </div>
                    </div>
                    <a href="/dashboard" style={{ fontFamily: "'Monument', monospace", fontSize: 13, color: '#000', letterSpacing: '0.06em', textDecoration: 'underline' }}>&larr; BACK TO DASHBOARD</a>
                </div>
            </div>
        );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
        const [step, setStep]               = useState(0);
        const [data, setData]               = useState(makeDefaultData());
        const [submitStatus, setSubmitStatus] = useState('idle');
        const [s2Sub, setS2Sub]             = useState(0); // Step 2 sub-step: 0=inputs, 1=growth

        const totalSteps = CONFIG.TOTAL_STEPS;

        const updateData = useCallback((field, val) => {
            setData(prev => ({ ...prev, [field]: val }));
        }, []);

        const canProceed = () => {
            if (step === 1) {
                return (data.visionStatement || '').trim().length >= 20
                    && (data.currentChallenges || '').trim().length >= 20
                    && (data.targetOutcome || '').trim().length >= 20;
            }
            if (step === 2) {
                if (s2Sub === 0) {
                    return parseFloat(data.totalCustomers) > 0
                        && parseFloat(data.avgRevenue) > 0
                        && parseFloat(data.purchasesPerYear) > 0
                        && parseFloat(data.grossMargin) > 0;
                }
                return true; // growth scenario is optional
            }
            if (step === 3) {
                return data.priorities.filter(p => (p.name || '').trim() && p.impact > 0 && p.ease > 0).length >= 3;
            }
            if (step === 4) {
                return ['q1','q2','q3','q4'].every(k => data.checklist[k] !== null);
            }
            return true;
        };

        const handleNext = () => {
            if (!canProceed()) return;
            // Step 2 sub-step: inputs → growth
            if (step === 2 && s2Sub === 0) { setS2Sub(1); return; }
            setStep(step + 0.5);
        };

        const handleTransitionNext = () => {
            const next = Math.floor(step) + 1;
            if (Math.floor(step) === totalSteps) {
                setStep('canvas');
            } else {
                setStep(next);
                if (next === 2) setS2Sub(0); // reset sub-step
            }
        };

        const handleBack = () => {
            if (step === 'canvas') { setStep(totalSteps); return; }
            if (step === 2 && s2Sub === 1) { setS2Sub(0); return; }
            if (step === 1) { setStep(0); return; }
            setStep(step - 1);
            if (step - 1 === 2) setS2Sub(1); // go back to growth screen
        };

        const handleSubmit = () => {
            setSubmitStatus('success');
        };

        const isWizardStep = Number.isInteger(step) && step >= 1 && step <= totalSteps;
        const isTransition = !Number.isInteger(step) && step > 0.5 && step !== 'canvas';

        if (submitStatus === 'success') return <SuccessPage />;

        return (
            <div className="tool-frame">
                {(step === 0 || step === 0.5) && (
                    <CoverIntro onStart={() => setStep(1)} />
                )}

                {isTransition && (
                    <TransitionScreen stepNum={Math.floor(step)} totalSteps={totalSteps} onNext={handleTransitionNext} />
                )}

                {(isWizardStep || step === 'canvas') && (
                    <div className="tool-inner">
                        <div className="wizard-layout">
                            <div className="wizard-main" style={step === 4 ? { background: '#FFF469' } : {}}>
                                <MobileStepBar currentStep={typeof step === 'number' ? step : totalSteps + 1} totalSteps={totalSteps} />
                                <div style={{ flex: 1 }}>
                                    {step === 1 && <Step1 data={data} updateData={updateData} />}
                                    {step === 2 && <Step2 data={data} updateData={updateData} subStep={s2Sub} setSubStep={setS2Sub} />}
                                    {step === 3 && <Step3 data={data} updateData={updateData} />}
                                    {step === 4 && <Step4 data={data} updateData={updateData} />}
                                    {step === 'canvas' && <CanvasStep data={data} />}
                                </div>
                                <div className="wizard-footer" style={step === 4 ? { background: '#FFF469', borderTopColor: 'rgba(0,0,0,0.1)' } : {}}>
                                    <button className="btn-wiz-back" onClick={handleBack}>&larr; BACK</button>
                                    {step !== 'canvas' ? (
                                        <button className="btn-wiz-next" onClick={handleNext} disabled={!canProceed()}>
                                            {step === 2 && s2Sub === 0 ? 'GROWTH SCENARIO \u2192' : 'NEXT \u2192'}
                                        </button>
                                    ) : (
                                        <button className="btn-wiz-next" onClick={handleSubmit}>
                                            SUBMIT ANSWERS &rarr;
                                        </button>
                                    )}
                                </div>
                            </div>
                            <WizardSidebar currentStep={step} data={data} />
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
