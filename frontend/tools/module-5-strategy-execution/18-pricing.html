<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategy Driven Pricing | Fast Track Program</title>

  <!-- React & ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase -->
  <script src="../../shared/js/tool-db.js"></script>
  <script src="../../shared/js/ai-challenge.js"></script>
  <script src="../../shared/js/dependency-injection.js"></script>
    <link rel="stylesheet" href="../../shared/css/cognitive-load.css">
    <script src="../../shared/js/cognitive-load.js"></script>
    <script src="../../js/tool-access-control.js"></script>

  <!-- jsPDF + html2canvas for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Font preloading to prevent FOUT -->
  <link rel="preload" href="Plaak3Trial-43-Bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="RiformaLL-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="MonumentGrotesk-Mono.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    /* === FONT FACES === */
    @font-face { font-family: 'Plaak'; src: url('Plaak3Trial-43-Bold.woff2') format('woff2'); font-weight: bold; font-display: swap; }
    @font-face { font-family: 'Riforma'; src: url('RiformaLL-Regular.woff2') format('woff2'); font-weight: normal; font-display: swap; }
    @font-face { font-family: 'Riforma'; src: url('RiformaLL-Regular.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Monument'; src: url('MonumentGrotesk-Mono.woff2') format('woff2'); font-display: swap; }

    /* === BASE RESET === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Riforma', -apple-system, sans-serif;
      font-size: 16px;
      color: #000;
      background: #000;
      -webkit-font-smoothing: antialiased;
    }

    /* === CUSTOM SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #000; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
    * { scrollbar-width: thin; scrollbar-color: #000 transparent; }

    /* === TYPOGRAPHY HELPERS === */
    .plaak { font-family: 'Plaak', sans-serif; font-weight: bold; letter-spacing: -0.01em; line-height: 1.2; }
    .monument { font-family: 'Monument', monospace; letter-spacing: 0.05em; }
    .riforma-bold { font-family: 'Riforma', sans-serif; font-weight: bold; }

    /* === LAYOUT FRAME === */
    .tool-frame { background: #fff; min-height: 100vh; }
    .tool-inner { background: #fff; min-height: 100vh; }

    /* === WIZARD LAYOUT === */
    .wizard-layout { display: flex; min-height: 100vh; }
    .wizard-main { flex: 1; display: flex; flex-direction: column; min-height: 100vh; background: #fff; padding: 0 48px; }
    .wizard-content { max-width: 100%; padding: 40px 0; flex: 1; }

    /* === SIDEBAR === */
        .wizard-sidebar { width: 280px; background: #1a1a1a; min-height: 100vh; padding: 48px 32px; display: flex; flex-direction: column; position: sticky; top: 0; align-self: flex-start; height: 100vh; overflow-y: auto; }
        .sidebar-tool-num { font-family: 'Monument', monospace; font-size: 10px; color: #fff; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
        .sidebar-tool-title { font-family: 'Plaak', sans-serif; font-size: 22px; color: #fff; margin-bottom: 32px; line-height: 1.1; }
        .sidebar-step { padding: 8px 0; border-bottom: 1px solid #2a2a2a; cursor: default; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
        .sidebar-step:last-child { border-bottom: none; }
        .sidebar-step-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; flex-shrink: 0; transition: background 0.2s; }
        .sidebar-step-dot.active { background: #FFF469; }
        .sidebar-step-dot.done { background: #4ade80; }
        .sidebar-step-label { font-family: 'Monument', monospace; font-size: 10px; letter-spacing: 0.08em; color: #555; text-transform: uppercase; transition: color 0.2s; }
        .sidebar-step-label.active { color: #FFF469; }
        .sidebar-step-label.done { color: #4ade80; }

    /* === STEP HEADER === */
    .step-indicator {
      font-family: 'Monument', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6B7280;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .step-time {
      font-family: 'Monument', monospace;
      font-size: 11px;
      color: #6B7280;
    }
    .step-heading {
      font-family: 'Plaak', sans-serif;
      font-weight: bold;
      font-size: 32px;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: #000;
      margin-bottom: 6px;
    }
    .step-hint {
      font-size: 16px;
      color: #6B7280;
      line-height: 1.5;
      margin: 0 0 32px 0;
    }

    /* === FORM ELEMENTS === */
    .field-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 16px;
      color: #000;
      margin-bottom: 8px;
    }
    .field-required { color: #DC2626; font-weight: 700; }

    .field-input {
      width: 100%;
      height: 44px;
      padding: 8px 16px;
      font-family: 'Riforma', sans-serif;
      font-size: 16px;
      color: #000;
      background: #fff;
      border: 1px solid #E5E7EB;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field-input:focus {
      outline: none;
      border-color: #000;
    }
    .field-input.has-error {
      border: 2px solid #DC2626;
      padding-right: 40px;
    }
    .field-input.has-error:focus {
      border-color: #DC2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
    }

    .field-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px 16px;
      font-family: 'Riforma', sans-serif;
      font-size: 16px;
      color: #000;
      background: #fff;
      border: 1px solid #E5E7EB;
      resize: none !important;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field-textarea:focus {
      outline: none;
      border-color: #000;
    }
    .field-textarea.has-error {
      border: 2px solid #DC2626;
    }
    .field-textarea.has-error:focus {
      border-color: #DC2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
    }

    .field-help {
      font-size: 14px;
      color: #6B7280;
      margin-top: 4px;
      line-height: 1.5;
    }
    .field-error-msg {
      font-size: 14px;
      font-weight: 600;
      color: #DC2626;
      margin-top: 4px;
      line-height: 1.4;
    }
    .field-group {
      margin-bottom: 24px;
    }
    .field-group:last-child { margin-bottom: 0; }
    .field-section { margin-bottom: 32px; }

    /* === STEP CONTENT (legacy alias) === */
    .step-content { max-width: 100%; padding: 40px 0; flex: 1; }

    /* (legacy ft-* classes removed — using field-* + CognitiveLoad components) */

    /* === BUTTON FOOTER === */
    .wizard-footer { display: flex; justify-content: space-between; align-items: center; padding: 24px 48px; border-top: 1px solid #E5E7EB; background: #fff; }
    .btn-wiz-back { background: transparent; border: 2px solid #d1d5db; color: #6b7280; padding: 12px 28px; font-family: 'Monument', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-wiz-back:hover { border-color: #000; color: #000; }
    .btn-wiz-next { background: #000; color: #fff; border: 2px solid #000; padding: 12px 36px; font-family: 'Monument', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-wiz-next:hover:not(:disabled) { background: #FFF469; color: #000; border-color: #FFF469; }
    .btn-wiz-next:disabled { background: #E0E0E0; color: #9CA3AF; border-color: #E0E0E0; cursor: not-allowed; }
    .opening-box { margin-bottom: 32px; }

    /* === CLOSING MESSAGE === */
    .closing-box {
      border-top: 1px solid #E5E7EB;
      padding: 20px 0 0 0;
      margin-top: 8px;
      text-align: center;
    }
    .closing-box p { font-size: 14px; color: #6B7280; }
    .closing-box .closing-title {
      font-family: 'Monument', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #000;
      margin-bottom: 6px;
    }

    /* === MOBILE STEP BAR === */
    .mobile-step-bar { display: none; padding: 12px 16px; border-bottom: 1px solid #E5E7EB; background: #F3F4F6; }
    .mobile-step-bar .bar-text { font-family: 'Monument', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6B7280; margin-bottom: 6px; }
    .mobile-progress { height: 3px; background: #E5E7EB; width: 100%; }
    .mobile-progress-fill { height: 100%; background: #000; transition: width 0.3s ease; }

    /* === CANVAS STYLES === */
    .numbered-section { background: #000; color: #fff; padding: 8px 14px; font-size: 14px; font-weight: bold; letter-spacing: 0.5px; display: inline-block; font-family: 'Monument', monospace; }

    /* === ANIMATIONS === */
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-in { animation: fadeSlideIn 0.3s ease-out; }

    /* === PRINT === */
    @media print { .no-print { display: none !important; } }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .wizard-sidebar { display: none; }
      .mobile-step-bar { display: block; }
      .wizard-main { padding: 0 24px; }
      .wizard-content { padding: 24px 0; }
      .step-heading { font-size: 24px; }
      .wizard-footer { padding: 12px 16px; }
    }
    @media (max-width: 480px) {
      .step-heading { font-size: 20px; }
      .wizard-content { padding: 20px 0; }
    }

    /* === TOOL-SPECIFIC: Character Counter === */
    .char-counter {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }
    .char-counter.invalid {
      color: #EF4444;
    }
    textarea::placeholder {
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, Fragment } = React;

    // Configuration
    const CONFIG = {
      TOOL_SLUG: 'pricing',
      TOOL_TITLE: 'STRATEGY DRIVEN PRICING',
      TOOL_SUBTITLE: 'Set pricing based on real customer value and willingness to pay.',
      COVER_IMAGE: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=1600&q=80',
      AUTOSAVE_DELAY: 2000
    };

    // Make Supabase client globally available for dependency injection
    // Initialize ToolDB and dependency injection
    ToolDB.init(CONFIG.TOOL_SLUG);
        ToolAccessControl.init(CONFIG.TOOL_SLUG);

        // Initialize cognitive load components
        window.CognitiveLoad && CognitiveLoad.init('pricing', {"insights":["Pricing is the most powerful profit lever. A 1% price increase drives ~11% profit increase.","Value-based pricing beats cost-plus pricing every time."],"caseStudy":{"before":"A software startup offered 20 features at a single monthly fee with no user feedback on real value. Hourly billing meant minimal profit and continuous haggling with customers over scope and deliverables.","after":"After applying the Fast Track pricing method, they identified 5 key features from top 10 prospects, created a Core plan (3 must-haves) and a Pro plan (2 premium add-ons). Core hit 80% of users; Pro cost 50% more for power users who valued advanced functions. Average deal size increased 35%.","quote":"We stopped guessing and started asking what customers would actually pay for. The moment we set our anchor price first and built the product around it, our margins jumped and customer satisfaction went up because we delivered exactly what they valued."}});
        const { FastTrackInsight, ScienceBox, WarningBox, CaseStudy, ScienceBookmarkIcon, ToolGuideDrawer } = CognitiveLoad.components;

    /* VP-style transition content between steps */
    const TRANSITION_CONTENT = {
        1: {
            title: 'FEATURES CLASSIFIED.',
            text: "You've identified what customers will actually pay for. Now set your price anchor before building anything.",
            brutalTruth: "Most companies classify features based on internal assumptions, not customer data. If your 'Must-Have' label came from engineering pride rather than WTP evidence, your entire pricing strategy is built on sand. Simon (2015) found that companies using data-driven feature classification set prices 15-25% more accurately.",
            peerProof: "McKinsey research across 1,200 companies shows that a 1% improvement in price generates an 8.7% increase in operating profits on average — nearly 50% more than a 1% fall in variable costs. Getting feature classification right is the foundation."
        },
        2: {
            title: 'ANCHOR SET.',
            text: "Your price position is locked. Now design 2-3 tiers that capture different willingness-to-pay segments.",
            brutalTruth: "Tversky & Kahneman's anchoring research shows the first number a customer sees becomes their reference point. If you let competitors set that anchor for you, you've already lost the pricing war. Your anchor must be justified by value, not apologized for.",
            peerProof: "Ariely, Loewenstein & Prelec (2003) at MIT found that deliberate price anchors influenced willingness to pay by up to 60-80%. Companies that set high anchors and justify them with value capture 15-30% more revenue."
        },
        3: {
            title: 'TIERS DESIGNED.',
            text: "Your bundles are structured. Now align every feature to your price anchor and prove the value.",
            brutalTruth: "The decoy effect shows that a strategically positioned third option can increase selection of your target tier by 40%. But if your tiers aren't clearly differentiated — if customers can't summarize each in one sentence — you've created confusion, not choice.",
            peerProof: "Nagle & Muller (2017) found that companies limiting themselves to 2-3 clearly differentiated tiers achieve 30% higher conversion rates than those with complex multi-tier structures. Simplified choice reduces decision paralysis."
        },
        4: {
            title: 'VALUE ALIGNED.',
            text: "Features map to price. Now build the execution plan that turns strategy into profit.",
            brutalTruth: "Anderson, Narus & Van Rossum (2006, HBR) found that companies able to quantify their value proposition in monetary terms win deals at 3x the rate of competitors who cannot. If you can't show the ROI math, your price will always feel arbitrary.",
            peerProof: "Companies that explicitly connect features to measurable outcomes — time saved, revenue boosted, risk reduced — achieve premium positioning 2.5x more often than those selling features alone."
        },
        5: {
            title: 'STRATEGY COMPLETE.',
            text: "Your pricing strategy is ready. Pilot, measure, and iterate — pricing is a living weapon, not a one-time decision.",
            brutalTruth: "Hinterhuber (2008) found that companies running structured pricing pilots before full rollout achieved 23% higher profit improvements than those who launched changes organization-wide without testing. Set it once and forget it = lost revenue.",
            peerProof: "A Bain & Company study found that companies with formal pricing review cadences (quarterly or better) maintained 5-8% higher margins over 3 years compared to peers who treated pricing as a one-time decision."
        }
    };

    /* ============================================================
       SHARED COMPONENTS
       ============================================================ */

    function CheckIcon({ color = "#fff", size = 16 }) {
        return <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>;
    }

    function ItemNavigator({ items, currentIdx, setIdx, onAdd, addLabel, isFilled }) {
        return (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap', marginBottom: 20 }}>
                {items.map((_, i) => {
                    const filled = isFilled ? isFilled(items[i]) : false;
                    const active = i === currentIdx;
                    return (
                        <button key={i} onClick={() => setIdx(i)}
                            style={{
                                width: 36, height: 36,
                                border: active ? '2px solid #000' : '2px solid #D1D5DB',
                                background: active ? '#000' : filled ? '#E5E7EB' : '#fff',
                                color: active ? '#FFF469' : filled ? '#374151' : '#9CA3AF',
                                fontFamily: "'Monument', monospace", fontSize: 13, fontWeight: 700,
                                cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                transition: 'all 0.15s ease'
                            }}
                        >{i + 1}</button>
                    );
                })}
                {onAdd && (
                    <button onClick={onAdd}
                        style={{
                            height: 36, padding: '0 14px',
                            border: '2px dashed #D1D5DB', background: '#fff', color: '#6B7280',
                            fontFamily: "'Monument', monospace", fontSize: 11, fontWeight: 700,
                            cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4,
                            transition: 'all 0.15s ease'
                        }}
                        onMouseOver={e => { e.currentTarget.style.borderColor = '#000'; e.currentTarget.style.color = '#000'; }}
                        onMouseOut={e => { e.currentTarget.style.borderColor = '#D1D5DB'; e.currentTarget.style.color = '#6B7280'; }}
                    >{addLabel || '+ ADD'}</button>
                )}
            </div>
        );
    }

    function ButtonFooter({ onBack, onNext, nextLabel = 'Next', showBack = true, disabled = false }) {
        return (
            <div className="wizard-footer no-print">
                {showBack ? <button className="btn-wiz-back" onClick={onBack}>&larr; Back</button> : <div />}
                <button className="btn-wiz-next" disabled={disabled} onClick={onNext}>{nextLabel} &rarr;</button>
            </div>
        );
    }

    function MobileStepBar({ currentStep, totalSteps }) {
        const total = totalSteps || 5;
        const progress = currentStep >= 999 ? 100 : Math.round((currentStep / total) * 100);
        return (
            <div className="mobile-step-bar no-print">
                <div className="bar-text">Step {Math.min(currentStep, total)} of {total}</div>
                <div className="mobile-progress"><div className="mobile-progress-fill" style={{ width: `${progress}%` }} /></div>
            </div>
        );
    }

    function DependencyContext({ deps }) {
        if (!deps || deps.length === 0) return null;
        return (
            <div style={{ marginBottom: '24px' }}>
                <div style={{ fontFamily: "'Monument', monospace", fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.05em', color: '#666', marginBottom: '8px' }}>
                    CONTEXT FROM PREVIOUS TOOLS
                </div>
                {deps.map((dep, i) => (
                    <div key={i} style={{ background: '#FFF9E0', border: '1px solid #F0E68C', borderLeft: '3px solid #DAA520', padding: '12px 16px', marginBottom: '8px', fontSize: '14px' }}>
                        <div style={{ fontWeight: 600, marginBottom: '4px', color: '#333' }}>{dep.label}</div>
                        <div style={{ color: '#555', whiteSpace: 'pre-wrap' }}>{dep.value}</div>
                    </div>
                ))}
            </div>
        );
    }

    function CoachFeedbackPanel() {
        const [expanded, setExpanded] = useState(false);
        const [feedback, setFeedback] = useState(null);

        useEffect(() => {
            const check = () => {
                if (window.AIChallenge && window.AIChallenge.getLastFeedback) {
                    setFeedback(window.AIChallenge.getLastFeedback(CONFIG.TOOL_SLUG));
                }
            };
            check();
            const interval = setInterval(check, 2000);
            return () => clearInterval(interval);
        }, []);

        if (!feedback) return null;

        return (
            <div style={{ marginTop: 24, borderTop: '1px solid #333', paddingTop: 16 }}>
                <button
                    onClick={() => setExpanded(!expanded)}
                    style={{ background: 'none', border: 'none', color: '#FFF469', cursor: 'pointer', fontFamily: "'Monument', monospace", fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.05em', display: 'flex', alignItems: 'center', gap: 6, padding: 0, width: '100%' }}
                >
                    <span style={{ transform: expanded ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform 0.2s', display: 'inline-block' }}>&#9654;</span>
                    COACH FEEDBACK
                </button>
                {expanded && (
                    <div style={{ marginTop: 10, fontSize: 12, color: '#ccc', lineHeight: 1.5 }}>
                        {feedback.type === 'approved' && (
                            <p style={{ color: '#FFF469' }}>{feedback.message}</p>
                        )}
                        {feedback.type === 'challenges' && (
                            <>
                                {feedback.encouragement && <p style={{ color: '#FFF469', marginBottom: 8 }}>{feedback.encouragement}</p>}
                                {feedback.challenges && feedback.challenges.map((ch, i) => (
                                    <div key={i} style={{ marginBottom: 8, paddingLeft: 8, borderLeft: '2px solid #555' }}>
                                        <div style={{ fontSize: 10, color: '#999', marginBottom: 2 }}>{ch.question_text || ch.question_key}</div>
                                        <div>{ch.feedback}</div>
                                    </div>
                                ))}
                            </>
                        )}
                    </div>
                )}
            </div>
        );
    }

    function WizardSidebar({ currentStep }) {
        const steps = [
            { num: 1, label: 'Feature Classification' },
            { num: 2, label: 'Price Anchor Selection' },
            { num: 3, label: 'Tier Bundle Design' },
            { num: 4, label: 'Price-To-Value Alignment' },
            { num: 5, label: 'Implementation Plan' },
        ];
        const cur = typeof currentStep === 'number' ? Math.floor(currentStep) : 0;
        return (
            <div className="wizard-sidebar no-print">
                <div className="sidebar-tool-num">SPRINT 18</div>
                <div className="sidebar-tool-title">PRICING STRATEGY</div>
                {steps.map(s => {
                    const isActive = cur === s.num;
                    const isDone = cur > s.num;
                    return (
                        <div key={s.num} className="sidebar-step" style={{ opacity: isDone || isActive ? 1 : 0.5 }}>
                            <div className={`sidebar-step-dot ${isActive ? 'active' : isDone ? 'done' : ''}`} />
                            <span className={`sidebar-step-label ${isActive ? 'active' : isDone ? 'done' : ''}`}>{s.label}</span>
                        </div>
                    );
                })}
            </div>
        );
    }

    // Main App Component
    function PricingApp() {
            const [deps, setDeps] = useState([]);
      const [step, setStep] = useState(0);
      const [authState, setAuthState] = useState({ loading: true, authenticated: false, error: null });
      const [aiReviewing, setAiReviewing] = useState(false);
      const [aiMessage, setAiMessage] = useState('');
      const [submitStatus, setSubmitStatus] = useState(null);
      const [submitMessage, setSubmitMessage] = useState('');
      const [featureIdx, setFeatureIdx] = useState(0);
      const [tierIdx, setTierIdx] = useState(0);
      const [actionIdx, setActionIdx] = useState(0);

      const [data, setData] = useState({
        // Step 1: Feature Classification
        features: [
          { id: 1, name: '', category: 'must-have', wtpImpact: '', rationale: '' }
        ],

        // Step 2: Price Anchor Selection
        anchorType: '',
        targetSegment: '',
        competitorBenchmark: '',
        anchorPrice: '',
        anchorRationale: '',

        // Step 3: Tier Bundle Design
        tiers: [
          { id: 1, name: '', price: '', features: '', targetCustomer: '', margin: '' }
        ],

        // Step 4: Price-to-Value Alignment
        mustHaveFeatures: '',
        niceToHaveFeatures: '',
        killerFeatures: '',
        valueProposition: '',

        // Step 5: Implementation Plan
        pricingActions: [
          { id: 1, action: '', owner: '', deadline: '', expectedImpact: '' }
        ],
        pilotPlan: '',
        successMetrics: ''
      });

            useEffect(() => {
                async function loadDeps() {
                    const userId = localStorage.getItem('ft_user_id');
                    if (!userId || !window.ToolDB || !window.DependencyInjection) return;
                    try {
                        await ToolDB.whenReady();
                        const config = DependencyInjection.getDependenciesConfig();
                        const toolConfig = config[CONFIG.TOOL_SLUG];
                        if (!toolConfig || !toolConfig.fields) return;
                        const loaded = [];
                        for (const field of toolConfig.fields) {
                            const val = await ToolDB.getDependency(userId, field.source_field);
                            if (val) {
                                loaded.push({ label: field.display_label || field.source_field, value: window.DependencyInjection ? DependencyInjection.formatValue(val) : (typeof val === 'object' ? JSON.stringify(val, null, 2) : String(val)) });
                            }
                        }
                        setDeps(loaded);
                    } catch (err) {
                        console.warn('[' + CONFIG.TOOL_SLUG + '] Failed to load dependencies:', err);
                    }
                }
                loadDeps();
            }, []);

      // Auth check
      useEffect(() => {
        ToolDB.whenReady().then(async () => {
          const uid = await ToolDB.identifyUser();
          if (!uid) {
            setAuthState({ loading: false, authenticated: false, error: 'No active session found.' });
            return;
          }
          setAuthState({ loading: false, authenticated: true, error: null });
        }).catch(() => {
          setAuthState({ loading: false, authenticated: false, error: 'Authentication failed.' });
        });
      }, []);

      // Load from localStorage
      useEffect(() => {
        const saved = localStorage.getItem('pricing-tool-data');
        if (saved) {
          try {
            const savedData = JSON.parse(saved);
            setData(savedData);
          } catch (e) {
            console.error('Error loading saved data:', e);
          }
        }
      }, []);

      // Auto-save every 2 seconds
      useEffect(() => {
        const interval = setInterval(() => {
          localStorage.setItem('pricing-tool-data', JSON.stringify(data));
        }, 2000);
        return () => clearInterval(interval);
      }, [data]);

      const updateData = (field, value) => {
        setData({ ...data, [field]: value });
      };

      const addFeature = () => {
        const newFeature = { id: Date.now(), name: '', category: 'must-have', wtpImpact: '', rationale: '' };
        const updated = [...data.features, newFeature];
        updateData('features', updated);
        setFeatureIdx(updated.length - 1);
      };

      const removeFeature = (id) => {
        if (data.features.length > 1) {
          const updated = data.features.filter(f => f.id !== id);
          updateData('features', updated);
          setFeatureIdx(prev => Math.min(prev, updated.length - 1));
        }
      };

      const updateFeature = (id, field, value) => {
        const updated = data.features.map(f => f.id === id ? { ...f, [field]: value } : f);
        updateData('features', updated);
      };

      const addTier = () => {
        if (data.tiers.length < 3) {
          const newTier = { id: Date.now(), name: '', price: '', features: '', targetCustomer: '', margin: '' };
          const updated = [...data.tiers, newTier];
          updateData('tiers', updated);
          setTierIdx(updated.length - 1);
        }
      };

      const removeTier = (id) => {
        if (data.tiers.length > 1) {
          const updated = data.tiers.filter(t => t.id !== id);
          updateData('tiers', updated);
          setTierIdx(prev => Math.min(prev, updated.length - 1));
        }
      };

      const updateTier = (id, field, value) => {
        const updated = data.tiers.map(t => t.id === id ? { ...t, [field]: value } : t);
        updateData('tiers', updated);
      };

      const addAction = () => {
        const newAction = { id: Date.now(), action: '', owner: '', deadline: '', expectedImpact: '' };
        const updated = [...data.pricingActions, newAction];
        updateData('pricingActions', updated);
        setActionIdx(updated.length - 1);
      };

      const removeAction = (id) => {
        if (data.pricingActions.length > 1) {
          const updated = data.pricingActions.filter(a => a.id !== id);
          updateData('pricingActions', updated);
          setActionIdx(prev => Math.min(prev, updated.length - 1));
        }
      };

      const updateAction = (id, field, value) => {
        const updated = data.pricingActions.map(a => a.id === id ? { ...a, [field]: value } : a);
        updateData('pricingActions', updated);
      };

      /* PRESERVED: AI-gated step navigation */
      const handleStepNext = async (nextStepValue, stepAnswers, stepName) => {
        const userId = localStorage.getItem('ft_user_id');
        if (!userId) {
          setAiMessage('');
          setStep(nextStepValue);
          return;
        }
        setAiReviewing(true);
        try {
          const canProceed = await window.AIChallenge.reviewStep(userId, CONFIG.TOOL_SLUG, stepAnswers, stepName);
          if (canProceed) {
            setAiMessage('');
            setStep(nextStepValue);
          } else {
            setAiMessage(window.AIChallenge?.getLastFeedback?.(CONFIG.TOOL_SLUG)?.suggestion || 'Please expand your answer before continuing.');
          }
        } catch (err) {
          console.warn('[AIChallenge] Error, allowing passage:', err);
          setAiMessage('');
          setStep(nextStepValue);
        } finally {
          setAiReviewing(false);
        }
      };

      // Validation functions
      const isStep1Valid = () => {
        return data.features.some(f => f.name.trim().length >= 2);
      };

      const isStep2Valid = () => {
        return data.anchorType &&
               data.targetSegment.length >= 50 &&
               data.competitorBenchmark.length >= 50 &&
               data.anchorPrice.length >= 5 &&
               data.anchorRationale.length >= 100;
      };

      const isStep3Valid = () => {
        return data.tiers.length >= 2 && data.tiers.length <= 3 && data.tiers.every(t =>
          t.name.trim().length >= 5 &&
          t.price.trim().length >= 3 &&
          t.features.trim().length >= 50 &&
          t.targetCustomer.trim().length >= 30 &&
          t.margin.trim().length >= 3
        );
      };

      const isStep4Valid = () => {
        return data.mustHaveFeatures.length >= 100 &&
               data.niceToHaveFeatures.length >= 50 &&
               data.killerFeatures.length >= 50 &&
               data.valueProposition.length >= 100;
      };

      const isStep5Valid = () => {
        return data.pricingActions.length >= 3 &&
               data.pricingActions.every(a =>
                 a.action.trim().length >= 20 &&
                 a.owner.trim().length >= 5 &&
                 a.deadline.trim().length >= 5 &&
                 a.expectedImpact.trim().length >= 20
               ) &&
               data.pilotPlan.length >= 100 &&
               data.successMetrics.length >= 100;
      };

      const exportPDF = async () => {
        try {
          const canvas = document.getElementById('canvas-content');
          if (!canvas) {
            alert('Canvas not found');
            return;
          }

          // Hide images to avoid CORS
          const images = canvas.querySelectorAll('img');
          const imageStates = [];
          images.forEach(img => {
            imageStates.push({ img, display: img.style.display });
            img.style.display = 'none';
          });

          const canvasImage = await html2canvas(canvas, {
            scale: 2,
            logging: false,
            backgroundColor: '#ffffff'
          });

          // Restore images
          imageStates.forEach(({ img, display }) => {
            img.style.display = display;
          });

          const imgWidth = 190;
          const imgHeight = (canvasImage.height * imgWidth) / canvasImage.width;

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p', 'mm', 'a4');
          const imgData = canvasImage.toDataURL('image/png');

          pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
          pdf.save('strategy-driven-pricing.pdf');
        } catch (error) {
          console.error('PDF export error:', error);
          alert('Failed to export PDF: ' + error.message);
        }
      };

      const handleSubmit = async () => {
        try {
          const userId = localStorage.getItem('ft_user_id');
          if (!userId) {
            alert('User not authenticated. Please return to the dashboard.');
            return;
          }

          const questionMappings = {
            pricing_tiers: data.tiers,
            anchor_price: {
              anchorType: data.anchorType,
              targetSegment: data.targetSegment,
              competitorBenchmark: data.competitorBenchmark,
              anchorPrice: data.anchorPrice,
              anchorRationale: data.anchorRationale
            }
          };

          await window.AIChallenge.submitWithChallenge(userId, CONFIG.TOOL_SLUG, questionMappings, {
            onReviewStart: () => { setSubmitMessage('AI coach is reviewing...'); },
            onRevise: () => { setSubmitStatus(null); setSubmitMessage(''); setStep(5); },
            onSubmitAnyway: () => { setSubmitStatus('success'); setSubmitMessage('Submission saved successfully!'); },
            onError: (err) => { setSubmitStatus('error'); setSubmitMessage('Failed to save: ' + err.message); }
          });
        } catch (error) {
          console.error('Submit error:', error);
          alert('Submission failed: ' + error.message);
        }
      };

      return (
        <div className="tool-frame">
          <div className="tool-inner">
            {/* Loading */}
            {authState.loading && (
              <div style={{ minHeight: '100vh', background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#555', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Loading…</div>
              </div>
            )}

            {/* Auth required */}
            {!authState.loading && !authState.authenticated && (
              <div style={{ minHeight: '100vh', background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ textAlign: 'center', color: '#fff', padding: '0 32px', maxWidth: 640 }}>
                  <h1 className="plaak" style={{ fontSize: 48, marginBottom: 24 }}>AUTHENTICATION REQUIRED</h1>
                  <p style={{ fontSize: 20, marginBottom: 32 }}>Please access this tool from your LearnWorlds course.</p>
                  <p style={{ fontSize: 16, color: '#999' }}>{authState.error || 'No active session found'}</p>
                </div>
              </div>
            )}

            {/* Step 0: Cover */}
            {step === 0 && authState.authenticated && (
              <div style={{ minHeight: '100vh', background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>
                <div style={{ position: 'absolute', inset: 0, backgroundImage: `url(${CONFIG.COVER_IMAGE})`, backgroundSize: 'cover', backgroundPosition: 'center', opacity: 0.4 }} />
                <div style={{ position: 'relative', textAlign: 'center', color: '#fff', padding: '0 32px' }} className="animate-in">
                  <div style={{ fontFamily: "'Monument', monospace", fontSize: 12, color: '#FFF469', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 24 }}>
                    SPRINT 18 / MODULE 5 — STRATEGY &amp; EXECUTION
                  </div>
                  <h1 className="plaak" style={{ fontSize: 80, marginBottom: 16 }}>{CONFIG.TOOL_TITLE}</h1>
                  <p style={{ fontSize: 18, color: '#ccc', marginBottom: 48, maxWidth: 560, margin: '0 auto 48px' }}>{CONFIG.TOOL_SUBTITLE}</p>
                  <button onClick={() => setStep(0.5)}
                    style={{ background: '#fff', color: '#000', border: 'none', padding: '16px 48px', fontSize: 16, fontFamily: "'Monument', monospace", letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer', transition: 'all 0.2s' }}
                    onMouseOver={e => { e.target.style.background = '#FFF469'; }}
                    onMouseOut={e => { e.target.style.background = '#fff'; }}>
                    START
                  </button>
                </div>
              </div>
            )}

            {/* Step 0.5: Intro */}
            {step === 0.5 && (
              <IntroPage onNext={() => { setFeatureIdx(0); setStep(1); }} />
            )}

            {/* Steps 1-5: Wizard */}
            {Number.isInteger(step) && step >= 1 && step <= 5 && (
              <div className="wizard-layout">
                <div className="wizard-main">
                  <MobileStepBar currentStep={step} totalSteps={5} />

                  <div style={{ flex: 1 }} className="animate-in">
                    {step === 1 && <><DependencyContext deps={deps} /><Step1Page data={data} updateFeature={updateFeature} addFeature={addFeature} removeFeature={removeFeature} featureIdx={featureIdx} setFeatureIdx={setFeatureIdx} /></>}
                    {step === 2 && <Step2Page data={data} updateData={updateData} />}
                    {step === 3 && <Step3Page data={data} updateTier={updateTier} addTier={addTier} removeTier={removeTier} tierIdx={tierIdx} setTierIdx={setTierIdx} />}
                    {step === 4 && <Step4Page data={data} updateData={updateData} />}
                    {step === 5 && <Step5Page data={data} updateData={updateData} updateAction={updateAction} addAction={addAction} removeAction={removeAction} actionIdx={actionIdx} setActionIdx={setActionIdx} />}
                  </div>

                  <ButtonFooter
                    onBack={() => {
                      if (step === 1) {
                        if (featureIdx > 0) { setFeatureIdx(featureIdx - 1); }
                        else { setStep(0); }
                      } else if (step === 2) {
                        setStep(1); setFeatureIdx(data.features.length - 1);
                      } else if (step === 3) {
                        if (tierIdx > 0) { setTierIdx(tierIdx - 1); }
                        else { setStep(2); }
                      } else if (step === 4) {
                        setStep(3); setTierIdx(data.tiers.length - 1);
                      } else if (step === 5) {
                        if (actionIdx > 0) { setActionIdx(actionIdx - 1); }
                        else { setStep(4); }
                      } else {
                        setStep(step - 1);
                      }
                    }}
                    onNext={() => {
                      if (step === 1) {
                        if (featureIdx < data.features.length - 1) { setFeatureIdx(featureIdx + 1); return; }
                        if (!isStep1Valid()) return;
                        handleStepNext(1.5, { features: data.features }, 'Feature Classification');
                      } else if (step === 2) {
                        if (!isStep2Valid()) return;
                        handleStepNext(2.5, { anchorType: data.anchorType, targetSegment: data.targetSegment, competitorBenchmark: data.competitorBenchmark, anchorPrice: data.anchorPrice, anchorRationale: data.anchorRationale }, 'Price Anchor Selection');
                      } else if (step === 3) {
                        if (tierIdx < data.tiers.length - 1) { setTierIdx(tierIdx + 1); return; }
                        if (!isStep3Valid()) return;
                        handleStepNext(3.5, { tiers: data.tiers }, 'Tier Bundle Design');
                      } else if (step === 4) {
                        if (!isStep4Valid()) return;
                        handleStepNext(4.5, { mustHaveFeatures: data.mustHaveFeatures, niceToHaveFeatures: data.niceToHaveFeatures, killerFeatures: data.killerFeatures, valueProposition: data.valueProposition }, 'Price-to-Value Alignment');
                      } else if (step === 5) {
                        if (actionIdx < data.pricingActions.length - 1) { setActionIdx(actionIdx + 1); return; }
                        if (!isStep5Valid()) return;
                        handleStepNext(5.5, { pricingActions: data.pricingActions, pilotPlan: data.pilotPlan, successMetrics: data.successMetrics }, 'Implementation Plan');
                      }
                    }}
                    disabled={aiReviewing}
                    nextLabel={aiReviewing ? 'AI Coach Reviewing...' : step === 5 ? 'View Canvas' : 'Next'}
                    showBack={true}
                  />
                  {aiMessage && <div style={{color:'#dc2626', fontSize:'13px', marginTop:'8px', padding:'8px 12px 8px 32px', background:'#fef2f2', borderRadius:'6px'}}>{aiMessage}</div>}
                </div>
                <WizardSidebar currentStep={step} />
              </div>
            )}

            {/* Transition screens between steps */}
            {[1.5, 2.5, 3.5, 4.5, 5.5].includes(step) && (() => {
              const completedStep = Math.floor(step);
              const nextStep = completedStep === 5 ? 6 : completedStep + 1;
              const t = TRANSITION_CONTENT[completedStep];
              return (
                <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', overflowY: 'auto' }}>
                  <div style={{ maxWidth: 640, padding: '0 32px', textAlign: 'center', color: '#fff' }} className="animate-in">
                    <div className="monument" style={{ fontSize: 12, color: '#FFF469', letterSpacing: '0.1em', marginBottom: 16 }}>
                      STEP {completedStep} OF 5 COMPLETE
                    </div>
                    <h1 className="plaak" style={{ fontSize: 48, marginBottom: 12 }}>{t.title}</h1>
                    <p style={{ fontSize: 16, color: '#ccc', marginBottom: 48 }}>{t.text}</p>

                    <div style={{ background: '#111', border: '1px solid #333', borderLeft: '4px solid #FFF469', padding: '20px 24px', marginBottom: 24, textAlign: 'left' }}>
                      <span className="monument" style={{ fontSize: 10, color: '#FFF469', display: 'block', marginBottom: 8 }}>BRUTAL TRUTH</span>
                      <p style={{ fontSize: 14, color: '#ccc', lineHeight: 1.7 }}>{t.brutalTruth}</p>
                    </div>

                    <div style={{ background: '#111', border: '1px solid #333', borderLeft: '4px solid #666', padding: '20px 24px', marginBottom: 48, textAlign: 'left' }}>
                      <span className="monument" style={{ fontSize: 10, color: '#999', display: 'block', marginBottom: 8 }}>PEER PROOF</span>
                      <p style={{ fontSize: 14, color: '#ccc', lineHeight: 1.7, fontStyle: 'italic' }}>{t.peerProof}</p>
                    </div>

                    <button
                      onClick={() => {
                        if (nextStep === 1) setFeatureIdx(0);
                        if (nextStep === 3) setTierIdx(0);
                        if (nextStep === 5) setActionIdx(0);
                        setStep(nextStep);
                      }}
                      style={{ background: '#fff', color: '#000', border: 'none', padding: '16px 48px', fontSize: 16, fontFamily: "'Monument', monospace", letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer', transition: 'all 0.2s ease' }}
                      onMouseOver={e => { e.target.style.background = '#FFF469'; }}
                      onMouseOut={e => { e.target.style.background = '#fff'; }}
                    >CONTINUE</button>
                  </div>
                </div>
              );
            })()}

            {/* Step 6: Canvas */}
            {step === 6 && (
              <CanvasPage
                data={data}
                onExport={exportPDF}
                onSubmit={handleSubmit}
              />
            )}
          </div>
        </div>
      );
    }

    // Intro Page Component
    function IntroPage({ onNext }) {
      return (
        <div style={{ background: '#000', color: '#fff', minHeight: '100vh', padding: '64px' }}>
          <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
            <h1 className="plaak animate-in" style={{ fontSize: '100px', marginBottom: '64px' }}>BEFORE WE START</h1>

            {/* Sprint Info */}
            <div className="animate-in" style={{ marginBottom: '48px', animationDelay: '0.08s' }}>
              <h2 className="plaak" style={{ fontSize: '48px', color: '#FFF469', marginBottom: '24px' }}>SPRINT INFO</h2>
              <div style={{ background: '#fff', color: '#000', padding: '32px' }}>
                <p style={{ fontSize: '22px', fontWeight: 'bold', marginBottom: '16px' }}>Sprint 18: Strategy Driven Pricing</p>
                <p style={{ fontSize: '18px', lineHeight: 1.6, marginBottom: '16px' }}>
                  A 1–2% price tweak can beat extensive cost-cutting. This sprint helps you set value-based price anchors and finalize product bundles based on actual willingness to pay data.
                </p>
                <div style={{ borderLeft: '4px solid #000', paddingLeft: '16px', fontStyle: 'italic', fontSize: '16px' }}>
                  Pricing is the most powerful profit lever. A 1% price increase drives ~11% profit increase on average.
                </div>
              </div>
            </div>

            {/* Purpose */}
            <div className="animate-in" style={{ marginBottom: '48px', animationDelay: '0.1s' }}>
              <h2 className="plaak" style={{ fontSize: '48px', marginBottom: '24px' }}>PURPOSE</h2>
              <div style={{ borderLeft: '4px solid #fff', paddingLeft: '24px', marginBottom: '24px' }}>
                <p style={{ fontSize: '28px', fontStyle: 'italic', marginBottom: '8px' }}>"Price before product, always."</p>
                <p style={{ fontSize: '18px', color: '#999' }}>— Hermann Simon, Confessions of the Pricing Man</p>
              </div>
              <p style={{ fontSize: '22px', lineHeight: 1.6, marginBottom: '16px' }}>
                Most companies build products first, then set prices — leaving money on the table. Set your anchor price FIRST based on willingness to pay, then build the product around it.
              </p>
              <p style={{ fontSize: '18px', color: '#999' }}>
                McKinsey research across 1,200 companies: a 1% improvement in price generates an 8.7% increase in operating profits on average.
              </p>
            </div>

            {/* Mistakes to Avoid */}
            <div className="animate-in" style={{ marginBottom: '48px', animationDelay: '0.2s' }}>
              <h2 className="plaak" style={{ fontSize: '48px', color: '#FFF469', marginBottom: '24px' }}>MISTAKES TO AVOID</h2>
              <ul style={{ fontSize: '20px', listStyle: 'none', padding: 0 }}>
                {[
                  'Too many tiers — keep to 2–3 max for clarity.',
                  'Guessing price instead of using WTP data or pilot tests.',
                  "Overcomplicating features — if it doesn't increase WTP, it's noise."
                ].map((item, i) => (
                  <li key={i} style={{ display: 'flex', alignItems: 'flex-start', marginBottom: '16px' }}>
                    <span style={{ fontSize: '32px', marginRight: '16px', lineHeight: 1, flexShrink: 0 }}>•</span>
                    <span>{item}</span>
                  </li>
                ))}
              </ul>
            </div>

            {/* The Journey */}
            <div className="animate-in" style={{ marginBottom: '64px', animationDelay: '0.3s' }}>
              <h2 className="plaak" style={{ fontSize: '48px', marginBottom: '32px' }}>THE JOURNEY</h2>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '16px', textAlign: 'center' }}>
                {[
                  ['01', 'FEATURE CLASSIFICATION', 'Classify by willingness to pay'],
                  ['02', 'PRICE ANCHOR', 'Set the price position'],
                  ['03', 'TIER BUNDLES', 'Design 2–3 bundles'],
                  ['04', 'VALUE ALIGNMENT', 'Map price to value delivered'],
                  ['05', 'IMPLEMENTATION', 'Action plan & pilot']
                ].map(([num, title, sub]) => (
                  <div key={num} style={{ border: '2px solid #fff', padding: '20px 12px' }}>
                    <div className="plaak" style={{ fontSize: '52px', marginBottom: '12px' }}>{num}</div>
                    <p style={{ fontWeight: 'bold', marginBottom: '6px', fontSize: '13px' }}>{title}</p>
                    <p style={{ fontSize: '12px', color: '#999' }}>{sub}</p>

    // Step 1: Feature Classification
    function Step1Page({ data, updateFeature, addFeature, removeFeature, featureIdx, setFeatureIdx }) {
      const feature = data.features[featureIdx] || data.features[0];
      return (
        <div className="wizard-content animate-in">
            <div className="opening-box">
            <div className="step-indicator"><span>STEP 01 OF 5 &middot; FEATURE {featureIdx + 1} OF {data.features.length}</span><span className="step-time">~8 min</span></div>
            <h2 className="step-heading">FEATURE CLASSIFICATION</h2>
            <p className="step-hint">Classify 5+ features by willingness to pay: Must-Have, Nice-to-Have, or Killer.</p>
            </div>

            <ScienceBox>
              Hermann Simon's research in "Confessions of the Pricing Man" demonstrates that a 1% price increase can drive ~11% increase in operating profit. McKinsey found that a 1% improvement in price generates 8.7% increase in operating profits. Structured feature classification based on WTP data reduces pricing errors by 25-40% (Nagle &amp; Muller, 2017).
            </ScienceBox>

            <div style={{ borderLeft: '4px solid #FFF469', paddingLeft: '24px', marginBottom: '32px' }}>
              <p style={{ fontSize: '18px', fontStyle: 'italic', lineHeight: 1.6 }}>
                "Must-Have features are essential -- customers won't buy if missing. Nice-to-Have items are moderately valued. Killer features are what customers don't place value on -- remove them."
              </p>
            </div>

            <p style={{ fontSize: '16px', color: '#6B7280', marginBottom: '24px', lineHeight: 1.6 }}>
              Use your WTP data from Sprint 17 to classify features. Focus on what customers will actually pay for, not internal assumptions about value.
            </p>

            {/* Feature Navigator */}
            <ItemNavigator
              items={data.features}
              currentIdx={featureIdx}
              setIdx={setFeatureIdx}
              onAdd={addFeature}
              addLabel="+ ADD FEATURE"
              isFilled={(f) => f.name.trim().length >= 2}
            />

            {/* Single Feature Card */}
            <div style={{ background: '#F9FAFB', border: '2px solid #E5E7EB', padding: '24px', marginBottom: '24px' }} className="animate-in">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' }}>
                <h4 className="riforma-bold" style={{ fontSize: '20px' }}>Feature {featureIdx + 1}</h4>

                  </div>
                  <div style={{ background: '#FEF2F2', padding: '16px', borderLeft: '4px solid #DC2626' }}>
                    <p className="riforma-bold" style={{ fontSize: '18px', marginBottom: '8px' }}>Killer Features (Remove)</p>
                    <p style={{ fontSize: '15px', overflowWrap: 'break-word' }}>{(data.killerFeatures || '').substring(0, 150)}...</p>
                  </div>
                </div>
              </div>

              {/* Value Proposition */}
              <div style={{ marginBottom: '40px' }}>
                <h2 className="riforma-bold" style={{ fontSize: '28px', marginBottom: '16px' }}>Value Proposition</h2>
                <div style={{ background: '#FEFCE8', padding: '24px', border: '4px solid #FACC15' }}>
                  <p style={{ fontSize: '18px', overflowWrap: 'break-word' }}>{data.valueProposition}</p>
                </div>
              </div>

              {/* Implementation Actions */}
              <div>
                <h2 className="riforma-bold" style={{ fontSize: '28px', marginBottom: '16px' }}>Next Actions</h2>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                  {(data.pricingActions || []).slice(0, 5).map((action, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'flex-start', fontSize: '15px' }}>
                      <span className="riforma-bold" style={{ marginRight: '12px' }}>{i + 1}.</span>
                      <div style={{ minWidth: 0, overflowWrap: 'break-word' }}>
                        <p className="riforma-bold">{action.action}</p>
                        <p style={{ fontSize: '14px', color: '#6B7280' }}>{action.owner} - {action.deadline}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ marginTop: '48px', paddingTop: '32px', borderTop: '2px solid #E5E7EB', textAlign: 'center', fontSize: '14px', color: '#9CA3AF' }}>
                <p>Generated: {new Date().toLocaleDateString()}</p>
                <p style={{ marginTop: '4px' }}>Fast Track Sprint 18 - Strategy Driven Pricing</p>
              </div>
            </div>

            {/* Action Buttons */}
            <div style={{ display: 'flex', gap: '24px', marginBottom: '24px' }}>
              <button onClick={onExport} className="btn-wiz-next" style={{ flex: 1 }}>
                EXPORT PDF
              </button>
              <button onClick={onSubmit} className="btn-wiz-next" style={{ flex: 1 }}>
                SUBMIT
              </button>
            </div>

            {/* Case Study */}
            <CaseStudy
                before={"A professional services firm used hourly billing with cost-plus margins. They had 20 service features at a single monthly fee with no data on which features customers actually valued. Continuous haggling over scope eroded margins, and one-size-fits-all pricing left money on the table with enterprise clients while losing price-sensitive smaller accounts."}
                after={"After applying the Fast Track pricing method, they packaged outcomes ('Cut your downtime 50% in 3 months') instead of hours, and created a Core tier (3 must-have services) and a Pro tier (2 premium add-ons). Core hit 80% of clients; Pro commanded 50% more for power users who valued advanced support. Average deal size increased 35% and client retention improved because the price narrative was tied directly to measurable ROI."}
                quote={"We had been pricing our costs for years instead of pricing our value. The moment we set the anchor price first based on what customers would actually pay, everything changed -- our margins jumped, our sales conversations became easier, and clients stopped haggling because they could see the ROI was 3x their investment."}
            />
          </div>
        </div>
      );
    }

    /* TransitionScreen, ProgressIndicator, HelpButton are now inline in PricingApp render using TRANSITION_CONTENT */

    // Render App
        ReactDOM.render(<PricingApp />, document.getElementById('root'));
  </script>
</body>
</html>
